apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleet-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: fleet-controller
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: fleet-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fleet-controller
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: fleet-controller
        image: '{{ .Values.image.registry }}/{{ .Values.image.repository }}@{{ .Values.image.digest }}'
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 256Mi
        env:
        - name: AZURE_TOKEN_CREDENTIALS
          value: "WorkloadIdentityCredential"
        args:
        - controller
        - --cloud-environment
        - '{{ .Values.cloudEnvironmentName }}'
        - --region
        - '{{ .Values.region }}'
        - --cosmos-url
        - '{{ .Values.cosmos.url }}'
        - --cosmos-name
        - '{{ .Values.cosmos.name }}'
        - --kube-namespace
        - '{{ .Values.controller.namespace }}'
        ports:
        - name: healthz
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 8081
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /healthz
            port: healthz
          initialDelaySeconds: 5
          periodSeconds: 5
