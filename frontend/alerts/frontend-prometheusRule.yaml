apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    app.kubernetes.io/name: kube-prometheus
    app.kubernetes.io/part-of: kube-prometheus
    prometheus: k8s
    role: alert-rules
  name: frontend-monitoring-rules
  namespace: monitoring
spec:
  groups:
  - name: frontend
    rules:
    - alert: FrontendLatency
      expr: |
        histogram_quantile(0.95, rate(frontend_http_requests_duration_seconds_bucket[1h])) > 5
      for: 15m
      labels:
        severity: info
      annotations:
        description: 'The 95th percentile of frontend request latency has exceeded 5 seconds over the past hour.'
        runbook_url: 'TBD'
        summary: 'Frontend latency is high: 95th percentile exceeds 5 seconds'
    - alert: FrontendClusterServiceErrorRate
      expr: |
        (sum by (cluster) (max without(prometheus_replica) (rate(frontend_clusters_service_client_request_count{code=~"4..|5.."}[1h]))))
        /
        (sum by (cluster) (max without(prometheus_replica) (rate(frontend_clusters_service_client_request_count[1h]))))
        > 0.05
      for: 5m
      labels:
        severity: info
      annotations:
        description: 'The Frontend Cluster Service 5xx error rate is above 5% for the last hour. Current value: {{ $value | humanizePercentage }}.'
        runbook_url: 'TBD'
        summary: 'High 4xx|5xx Error Rate on Frontend Cluster Service'
    - alert: FrontendHighAuditLogErrorRate
      expr: |
        (
          sum by (cluster) (rate(otel_audit_log_send_errors_total{job="aro-hcp-frontend-metrics"}[1h]))
          /
          sum by (cluster) (rate(otel_audit_log_records_total{job="aro-hcp-frontend-metrics"}[1h]))
        ) > 0.05
      for: 5m
      labels:
        severity: info
      annotations:
        summary: "High Frontend audit log error rate."
        runbook_url: 'TBD'
        description: "Audit log error rate is above 5% for the last hour. Current value: {{ $value | humanizePercentage }}."
    - alert: FrontendAuditLogConnectionDegraded
      expr: |
        otel_audit_log_connection_degraded{job="aro-hcp-frontend-metrics"} == 1
      for: 5m
      labels:
        severity: info
      annotations:
        summary: "Frontend audit log connection is degraded."
        runbook_url: 'TBD'
        description: "The frontend failed to connect to the audit server and is running with a no-op audit client. No audit logs are being sent."
