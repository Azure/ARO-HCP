rule_files:
- frontend-prometheusRule.yaml
evaluation_interval: 1m
tests:
# Test: FrontendLatency 95th percentile does not exceed 5 seconds
# Test: FrontendLatency Less than 5% of requests exceed 5 seconds
- interval: 1m
  input_series:
  - series: 'frontend_http_requests_duration_seconds_bucket{le="0.1"}'
    values: '0+60x10'
  - series: 'frontend_http_requests_duration_seconds_bucket{le="0.5"}'
    values: '0+60x20'
  - series: 'frontend_http_requests_duration_seconds_bucket{le="1"}'
    values: '0+60x30'
  - series: 'frontend_http_requests_duration_seconds_bucket{le="5"}'
    values: '0+60x190'
  - series: 'frontend_http_requests_duration_seconds_bucket{le="+Inf"}'
    values: '0+60x200'
  alert_rule_test:
  - eval_time: 60m
    alertname: FrontendLatency
    exp_alerts: []
# Test: FrontendClusterServiceErrorRate above 5%
- interval: 1m
  input_series:
  - series: 'frontend_clusters_service_client_request_count{code="500"}'
    values: "0 6x10" # 6 per minute → 6 / 106 ≈ 5.66%
  - series: 'frontend_clusters_service_client_request_count{code="200"}'
    values: "0 100x10" # 100 per minute from minute 1 to 10
  alert_rule_test:
  - eval_time: 10m # At this point, the condition has held for 10 minutes
    alertname: FrontendClusterServiceErrorRate
    exp_alerts:
    - exp_labels:
        severity: info
      exp_annotations:
        description: 'The Frontend Cluster Service 5xx error rate is above 5% for the last hour. Current value: 5.66%.'
        runbook_url: 'TBD'
        summary: 'High 4xx|5xx Error Rate on Frontend Cluster Service'
# Test: FrontendClusterServiceErrorRate below 5%
- interval: 1m
  input_series:
  - series: 'frontend_clusters_service_client_request_count{code="500"}'
    values: "0 2x10" # 2 / 102 ≈ 1.96%
  - series: 'frontend_clusters_service_client_request_count{code="200"}'
    values: "0 100x10" # 100 per minute from minute 1 to 10
  alert_rule_test:
  - eval_time: 10m # At this point, the condition has held for 10 minutes
    alertname: FrontendClusterServiceErrorRate
    exp_alerts: []
# Test: FrontendHighAuditLogErrorRate above 5%
- interval: 1m
  input_series:
  - series: 'otel_audit_log_send_errors_total{job="aro-hcp-frontend-metrics"}'
    values: "0+6x70" # 6 errors per minute for 70 minutes
  - series: 'otel_audit_log_records_total{job="aro-hcp-frontend-metrics"}'
    values: "0+100x70" # 100 records per minute → 6/100 = 6%
  alert_rule_test:
  - eval_time: 65m
    alertname: FrontendHighAuditLogErrorRate
    exp_alerts:
    - exp_labels:
        severity: info
      exp_annotations:
        summary: "High Frontend audit log error rate."
        runbook_url: 'TBD'
        description: "Audit log error rate is above 5% for the last hour. Current value: 6%."
# Test: FrontendHighAuditLogErrorRate below 5%
- interval: 1m
  input_series:
  - series: 'otel_audit_log_send_errors_total{job="aro-hcp-frontend-metrics"}'
    values: "0+2x70" # 2 errors per minute for 70 minutes
  - series: 'otel_audit_log_records_total{job="aro-hcp-frontend-metrics"}'
    values: "0+100x70" # 100 records per minute → 2/100 = 2%
  alert_rule_test:
  - eval_time: 65m
    alertname: FrontendHighAuditLogErrorRate
    exp_alerts: []
# Test: FrontendAuditLogConnectionDegraded fires when degraded
- interval: 1m
  input_series:
  - series: 'otel_audit_log_connection_degraded{job="aro-hcp-frontend-metrics"}'
    values: "1x10" # degraded for 10 minutes
  alert_rule_test:
  - eval_time: 10m
    alertname: FrontendAuditLogConnectionDegraded
    exp_alerts:
    - exp_labels:
        job: aro-hcp-frontend-metrics
        severity: info
      exp_annotations:
        summary: "Frontend audit log connection is degraded."
        runbook_url: 'TBD'
        description: "The frontend failed to connect to the audit server and is running with a no-op audit client. No audit logs are being sent."
# Test: FrontendAuditLogConnectionDegraded does not fire when healthy
- interval: 1m
  input_series:
  - series: 'otel_audit_log_connection_degraded{job="aro-hcp-frontend-metrics"}'
    values: "0x10" # healthy for 10 minutes
  alert_rule_test:
  - eval_time: 10m
    alertname: FrontendAuditLogConnectionDegraded
    exp_alerts: []
