ConfigPath: ../../config/rendered/dev/dev/westus3.yaml
TopologyDir: ../..
Replace:
- Regex: 'sha256.[a-fA-F0-9]{64}'
  Replacement: 'sha256:1234567890'
ResourceLimitsAllowlist:
- DaemonSet/arobit-forwarder/fluentbit # upstream fluent-bit chart sets limits
- DaemonSet/arobit-forwarder/mdsd-cert-watchdog # upstream arobit chart sets limits
- Job/*/fleet-registration # fleet registration job name varies by environment
- Deployment/*/kube-state-metrics # upstream kube-state-metrics chart sets limits
- Deployment/prometheus-operator/kube-prometheus-stack # upstream prometheus-operator chart sets limits
- Job/prometheus-admission-*/create # upstream prometheus-operator admission webhook jobs
- Job/prometheus-admission-*/patch # upstream prometheus-operator admission webhook jobs
