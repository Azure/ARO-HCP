ConfigPath: ../../config/rendered/dev/dev/westus3.yaml
TopologyDir: ../..
Replace:
- Regex: 'sha256.[a-fA-F0-9]{64}'
  Replacement: 'sha256:1234567890'
# Components exempt from requiring resources.requests.memory
ResourceRequestsAllowlist:
# Standing exemptions
- DaemonSet/*/acrpull # acrpull standing exemption
- DaemonSet/arobit-forwarder/fluentbit # arobit-fluentbit standing exemption
- DaemonSet/*/fluentbit # arobit-fluentbit standing exemption (pattern match)
- Deployment/*/mce # mce standing exemption
- Job/*/mce # mce standing exemption
# Upstream charts - currently missing requests
- Deployment/*/kube-state-metrics # upstream kube-state-metrics chart
- Deployment/prometheus-operator/kube-prometheus-stack # upstream prometheus-operator chart
- Job/prometheus-admission-*/create # upstream prometheus-operator admission webhook jobs
- Job/prometheus-admission-*/patch # upstream prometheus-operator admission webhook jobs
# Current violations - containers missing resources.requests.memory
- DaemonSet/arobit-forwarder/mdsd-clusterlogs
- DaemonSet/set-kubelet-parameters-for-scale/kubelet-parameters
- Deployment/admin-api-certificate-refresher/init-container-msg-container-init
- Deployment/frontend-certificate-refresher/init-container-msg-container-init
- Deployment/maestro/maestro-server-migration
