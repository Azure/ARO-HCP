- Deployment/postgres-breakglass/postgres
- Deployment/secrets-store-sync-controller-manager/manager
- Deployment/sessiongate-certificate-refresher/init-container-msg-container-init
- Job/delete-sc-pre-upgrade/delete-sc
- Job/finalize-mce/finalize
