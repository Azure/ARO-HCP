# Example cleanup-sweeper policy implementing the intended legacy behavior:
# - Global default: delete RGs older than 2 days.
# - Always skip managed resource groups (ManagedBy is set).
# - persist=true normally protects RGs from 2-day deletion.
# - Exception for hcp-underlay-pers-*:
#   - delete after 2 days when persist != true
#   - delete after 15 days when persist == true

rgOrdered:
  # Keep known long-lived/shared groups out of rg-ordered deletion candidates.
  excludedResourceGroups:
    - global
    - hcp-kusto-us
    - hcp-automation-rg

  discovery:
    # Rules are evaluated in order; first match wins.
    rules:
      - name: skip-managed-resource-groups
        action: skip
        match:
          any: true
        conditions:
          managedBySet: true

      - name: pers-persist-delete-after-15d
        action: delete
        match:
          namePrefix: "hcp-underlay-pers-"
        conditions:
          tagsEq:
            persist: "true"
        olderThan: "360h"

      - name: pers-non-persist-delete-after-2d
        action: delete
        match:
          namePrefix: "hcp-underlay-pers-"
        conditions:
          tagsNotEq:
            persist: "true"
        olderThan: "48h"

      - name: skip-persist-true-globally
        action: skip
        match:
          any: true
        conditions:
          tagsEq:
            persist: "true"

      - name: global-default-delete-after-2d
        action: delete
        match:
          any: true
        olderThan: "48h"
