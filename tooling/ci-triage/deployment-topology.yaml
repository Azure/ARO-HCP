# The dev→int boundary
# This is the critical handoff point. Code deployed to dev via GitHub Actions
# must be separately picked up by the EV2/ADO pipeline for int/stg/prod.
dev_to_int_boundary:
  mechanism: "sdp-pipelines repo"
  # FILL IN: How does the commit SHA get into sdp-pipelines?
  # Is it automatic? Does someone update Revision.mk manually?
  sha_propagation: "TODO: fill in — how does the ARO-HCP commit reach sdp-pipelines?"
  # FILL IN: Is there a config overlay step?
  config_overlay: "sdp-pipelines/hcp/config.clouds-overlay.yaml"
  notes: >
    This boundary explains why a fix merged to main appears in dev quickly
    but takes longer to reach int. The lag is NOT just deployment time —
    it includes the time for someone/something to update sdp-pipelines.

# Deployment topology — which pipelines run in which order
# (derived from topology.yaml in the repo, reproduced here for agent context)
pipeline_hierarchy:
  - name: "Microsoft.Azure.ARO.HCP.Global"
    scope: "once per environment"
    deploys: "DNS zones, Grafana, MSI, ACRs, image sync"
    children:
      - name: "Microsoft.Azure.ARO.HCP.Geography"
        children:
          - name: "Microsoft.Azure.ARO.HCP.Region"
            scope: "per region"
            deploys: "regional DNS, EventGrid, ACR replication, monitoring, Kusto"
            children:
              - name: "Microsoft.Azure.ARO.HCP.Service.Infra"
                scope: "per SVC cluster"
                deploys: "SVC AKS, KeyVault, CosmosDB, Prometheus, Istio"
                service_deployments:
                  - "Maestro Server"
                  - "Cluster Service"
                  - "Backend (RP)"
                  - "Frontend (RP)"
                  - "SessionGate"
                  - "Admin API"
              - name: "Microsoft.Azure.ARO.HCP.Management.Infra"
                scope: "per MGMT cluster"
                deploys: "MGMT AKS, KeyVaults, storage, Prometheus"
                service_deployments:
                  - "Velero"
                  - "Secret Sync Controller"
                  - "ACM + MCE"
                  - "HyperShift Operator"
                  - "Maestro Agent"
                  - "Route Monitor Operator"
              - name: "Microsoft.Azure.ARO.HCP.Monitoring"
                scope: "per region"
              - name: "Microsoft.Azure.ARO.HCP.E2E"
                scope: "per region"
                notes: "gates SDP progression to next region group"

# Reasoning shortcuts for the agent
inference_rules:
  - pattern: "failure in int with onset date D, then same failure in stg with onset D+N"
    inference: "code regression propagating through promotion flow; N is the int→stg promotion lag"
  - pattern: "failure in prod only, not in int or stg"
    inference: "prod-specific issue: scale, multi-tenancy, config, or prod-only deployment"
  - pattern: "failure in int only, not in stg or prod"
    inference: "recent code change not yet promoted, OR int-specific environment issue"
  - pattern: "failure in all envs simultaneously"
    inference: "shared dependency or platform-wide issue, not a code regression"
  - pattern: "failure appears in dev presubmit but not in int periodic"
    inference: "dev and int use different deployment paths; check if the code has reached int yet"
