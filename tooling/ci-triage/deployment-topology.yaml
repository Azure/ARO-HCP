# ARO-HCP Deployment Topology Reference
# Used by ci-triage agent to reason about environment relationships,
# deployment promotion, and failure propagation.
#
# IMPORTANT: This file encodes operational knowledge that cannot be derived
# from the repo alone. Keep it updated when the deployment process changes.

# Environment promotion chain — code flows through these in order.
# Each environment has different deployment drivers, timing, and gating.
promotion_flow:
  - env: dev
    cloud: dev
    tenant: redhat
    deployment_driver: github_actions
    # GitHub Actions runs on push to main (publish-service-images → aro-hcp-cd)
    trigger: automatic_on_merge
    # Images build and deploy within minutes of merge
    typical_lag_from_merge: "~10-20 minutes"
    gating: none
    prow_jobs:
      presubmit: pull-ci-Azure-ARO-HCP-main-e2e-parallel
      periodic: null  # no periodic for dev
    notes: >
      Dev is the first environment to receive changes. GitHub Actions builds
      images and deploys to the integrated dev AKS cluster automatically.
      Failures here block nothing downstream — int/stg/prod use a separate
      deployment path (EV2).

  - env: int
    cloud: public
    tenant: msit_corp
    deployment_driver: ev2_via_ado
    # FILL IN: What triggers the int deployment?
    # Options: automatic after dev passes? manual PR to sdp-pipelines?
    # periodic schedule? manual ADO pipeline run?
    trigger: "TODO: fill in — what triggers int deployment?"
    # FILL IN: How long after merge to main does code typically reach int?
    typical_lag_from_merge: "TODO: fill in (hours? days?)"
    gating:
      # gatePromotion: true in EV2 — Prow E2E results gate promotion to stg
      prow_gates_promotion: true
    prow_jobs:
      presubmit: pull-ci-Azure-ARO-HCP-main-integration-e2e-parallel
      periodic: periodic-ci-Azure-ARO-HCP-main-periodic-integration-e2e-parallel
    sippy_view: aro-integration
    notes: >
      First MSFT-tenant environment. Deployed via EV2 through sdp-pipelines.
      Uses OneCert, ARM integration, MISE. Prow E2E results gate promotion
      to stg. This is where most regressions are first caught in prod-like
      conditions.

  - env: stg
    cloud: public
    tenant: ame
    deployment_driver: ev2_via_ado
    # FILL IN: Is stg promotion automatic after int Prow passes?
    # Or does it require manual approval?
    trigger: "TODO: fill in — automatic after int gates pass, or manual?"
    # FILL IN: Typical lag from int to stg
    typical_lag_from_int: "TODO: fill in (hours? days?)"
    gating:
      # FILL IN: Does stg have its own gate, or just inherits from int?
      approval_required: "TODO: fill in"
      approval_group: "TM-AzureRedHatOpenshift-HCP-Leads"
    prow_jobs:
      presubmit: pull-ci-Azure-ARO-HCP-main-stage-e2e-parallel
      periodic: periodic-ci-Azure-ARO-HCP-main-periodic-stage-e2e-parallel
    sippy_view: aro-stage
    multi_tenant: true
    notes: >
      Pre-production environment. Multi-tenant like prod. Uses MSI-RP.
      If a failure appears in stg but not int, check for multi-tenancy
      or scale-related issues that don't manifest in single-tenant int.

  - env: prod
    cloud: public
    tenant: ame
    deployment_driver: ev2_via_ado
    # FILL IN: How does prod promotion work?
    trigger: "TODO: fill in — manual approval? automatic after stg?"
    # FILL IN: Typical lag from stg to prod
    typical_lag_from_stg: "TODO: fill in (hours? days?)"
    gating:
      approval_required: true
      approval_group: "TM-AzureRedHatOpenshift-HCP-Leads"
      saw_device_required: true
    prow_jobs:
      presubmit: pull-ci-Azure-ARO-HCP-main-prod-e2e-parallel
      periodic: periodic-ci-Azure-ARO-HCP-main-periodic-prod-e2e-parallel
    sippy_view: aro-production
    multi_tenant: true
    notes: >
      Production. Last to receive changes. If a failure appears in prod
      with onset N days after int, that matches the promotion lag and
      confirms a code regression propagating through environments.

