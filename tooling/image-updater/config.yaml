images:
  # Maestro image
  maestro:
    group: hypershift-stack
    source:
      image: quay.io/redhat-user-workloads/maestro-rhtap-tenant/maestro/maestro
      tagPattern: "^[a-f0-9]{40}$"
    targets:
    - jsonPath: defaults.maestro.image.digest
      filePath: ../../config/config.yaml
  # Maestro Agent Sidecar image
  maestro-agent-sidecar:
    group: hypershift-stack
    source:
      image: mcr.microsoft.com/azurelinux/base/nginx
      tagPattern: "^\\d+\\.\\d+\\.\\d+-\\d+-azl\\d+\\.\\d+\\.\\d+$"
      multiArch: true
    targets:
    - jsonPath: defaults.maestro.agent.sidecar.image.digest
      filePath: ../../config/config.yaml
  # Hypershift image
  hypershift:
    group: hypershift-stack
    source:
      image: quay.io/redhat-services-prod/crt-redhat-acm-tenant/hypershift/hypershift-operator
      tag: "latest"
      multiArch: true # Use multi-arch manifest
      useAuth: true
      keyVault:
        url: "https://arohcpdev-global.vault.azure.net/"
        secretName: "component-sync-pull-secret"
    targets:
    - jsonPath: defaults.hypershift.image.digest
      filePath: ../../config/config.yaml
  # HyperShift shared ingress HAProxy image
  hypershift-shared-ingress:
    group: hypershift-stack
    source:
      image: quay.io/redhat-user-workloads/crt-redhat-acm-tenant/hypershift-shared-ingress-main
      tag: "0903f6b78a608541892ecbe8005899a91bda9ad5"
      multiArch: true
    targets:
    - jsonPath: defaults.hypershift.sharedIngressImage.digest
      filePath: ../../config/config.yaml
  # Clusters Service image
  clusters-service:
    group: cs
    source:
      image: quay.io/app-sre/aro-hcp-clusters-service
      tag: "latest"
      versionLabel: "vcs-ref"
      useAuth: true
      keyVault:
        url: "https://arohcpdev-global.vault.azure.net/"
        secretName: "component-sync-pull-secret"
    targets:
    - jsonPath: defaults.clustersService.image.digest
      filePath: ../../config/config.yaml
  # Kube Events image
  kubeEvents:
    group: obs-agents
    source:
      image: kubernetesshared.azurecr.io/shared/kube-events
      tagPattern: "^\\d+\\.\\d+$"
    targets:
    - jsonPath: defaults.kubeEvents.image.digest
      filePath: ../../config/config.yaml
  # ACM images
  acm-operator:
    group: hypershift-stack
    source:
      image: quay.io/redhat-user-workloads/crt-redhat-acm-tenant/acm-operator-bundle-acm-217
      tagPattern: "^v2\\.17\\.\\d+-\\d+$"
      repoVersionUpgrade:
        repoPrefix: "acm-operator-bundle-acm-"
    targets:
    - jsonPath: defaults.acm.operator.bundle.digest
      filePath: ../../config/config.yaml
  acm-mce:
    group: hypershift-stack
    source:
      image: quay.io/redhat-user-workloads/crt-redhat-acm-tenant/mce-operator-bundle-mce-217
      tagPattern: "^v2\\.17\\.\\d+-\\d+$"
      repoVersionUpgrade:
        repoPrefix: "mce-operator-bundle-mce-"
    targets:
    - jsonPath: defaults.acm.mce.bundle.digest
      filePath: ../../config/config.yaml
  # AKS Runtime Image
  aksCommandRuntime:
    group: platform-utils
    source:
      image: mcr.microsoft.com/aks/command/runtime
      tagPattern: "^master\\.\\d+\\.\\d+$"
      multiArch: true
    targets:
    - jsonPath: defaults.aksCommandRuntime.image.digest
      filePath: ../../config/config.yaml
  # MSI-Acrpull image
  acrPull:
    group: platform-utils
    source:
      image: mcr.microsoft.com/aks/msi-acrpull
      tagPattern: "^v\\d+\\.\\d+\\.\\d+$"
    targets:
    - jsonPath: defaults.acrPull.image.digest
      filePath: ../../config/config.yaml
  # Arobit images
  arobit-forwarder:
    group: obs-agents
    source:
      image: mcr.microsoft.com/oss/v2/fluent/fluent-bit
      tagPattern: "^v\\d+\\.\\d+\\.\\d+(-\\d+)?$"
      multiArch: true # This image only publishes multi-arch manifests
    targets:
    - jsonPath: defaults.arobit.forwarder.image.digest
      filePath: ../../config/config.yaml
  arobit-mdsd:
    group: obs-agents
    source:
      image: mcr.microsoft.com/geneva/distroless/mdsd
      tagPattern: "^\\d+\\.\\d+\\.\\d+-\\d+-\\d+$"
      multiArch: true # This image only publishes multi-arch manifests
    targets:
    - jsonPath: defaults.arobit.mdsd.image.digest
      filePath: ../../config/config.yaml
  # Secret Sync Controller image
  secretSyncController:
    group: platform-utils
    source:
      image: registry.k8s.io/secrets-store-sync/controller
      tagPattern: "^v\\d+\\.\\d+\\.\\d+$"
      multiArch: true # This image only publishes multi-arch manifests
    targets:
    - jsonPath: defaults.secretSyncController.image.digest
      filePath: ../../config/config.yaml
  # Secret Sync Azure Provider
  secretSyncProvider:
    group: platform-utils
    source:
      image: mcr.microsoft.com/oss/v2/azure/secrets-store/provider-azure
      tagPattern: "^v\\d+\\.\\d+\\.\\d+(-\\d+)?$"
      multiArch: true
    targets:
    - jsonPath: defaults.secretSyncController.providerImage.digest
      filePath: ../../config/config.yaml
  # Image Sync
  imageSync:
    group: aro-deps
    source:
      image: arohcpsvcdev.azurecr.io/image-sync/oc-mirror
      tagPattern: "^[a-f0-9]{7}$"
      useAuth: true
    targets:
    - jsonPath: defaults.imageSync.ocMirror.image.digest
      filePath: ../../config/config.yaml
  # Prometheus images
  prometheus-operator:
    group: prom-stack
    source:
      image: mcr.microsoft.com/oss/v2/prometheus/prometheus-operator
      tagPattern: "^v\\d+\\.\\d+\\.\\d+-?\\d?$"
      multiArch: true # This image only publishes multi-arch manifests
    targets:
    - jsonPath: defaults.svc.prometheus.prometheusOperator.image.sha
      filePath: ../../config/config.yaml
    - jsonPath: defaults.mgmt.prometheus.prometheusOperator.image.sha
      filePath: ../../config/config.yaml
  prometheus:
    group: prom-stack
    source:
      image: mcr.microsoft.com/oss/v2/prometheus/prometheus
      tagPattern: "^v\\d+\\.\\d+\\.\\d+-?\\d?$"
      multiArch: true # This image only publishes multi-arch manifests
    targets:
    - jsonPath: defaults.svc.prometheus.prometheusSpec.image.sha
      filePath: ../../config/config.yaml
    - jsonPath: defaults.mgmt.prometheus.prometheusSpec.image.sha
      filePath: ../../config/config.yaml
  prometheus-config-reloader:
    group: prom-stack
    source:
      image: mcr.microsoft.com/oss/v2/prometheus/prometheus-config-reloader
      tagPattern: "^v\\d+\\.\\d+\\.\\d+-?\\d?$"
      multiArch: true # This image only publishes multi-arch manifests
    targets:
    - jsonPath: defaults.svc.prometheus.prometheusConfigReloader.image.sha
      filePath: ../../config/config.yaml
    - jsonPath: defaults.mgmt.prometheus.prometheusConfigReloader.image.sha
      filePath: ../../config/config.yaml
  kube-state-metrics:
    group: prom-stack
    source:
      image: mcr.microsoft.com/oss/v2/kubernetes/kube-state-metrics
      tagPattern: "^v\\d+\\.\\d+\\.\\d+(-\\d+)?$"
      multiArch: true # This image only publishes multi-arch manifests
    targets:
    - jsonPath: defaults.svc.prometheus.kubeStateMetrics.image.digest
      filePath: ../../config/config.yaml
    - jsonPath: defaults.mgmt.prometheus.kubeStateMetrics.image.digest
      filePath: ../../config/config.yaml
  # Velero images
  velero-server:
    group: velero
    source:
      image: registry.stage.redhat.io/oadp/oadp-velero-rhel9
      tagPattern: "^\\d+\\.\\d+\\.\\d+$"
      multiArch: true
      useAuth: true
      keyVault:
        url: "https://arohcpdev-global.vault.azure.net/"
        secretName: "component-sync-pull-secret"
    targets:
    - jsonPath: defaults.velero.server.digest
      filePath: ../../config/config.yaml
  velero-azure-plugin:
    group: velero
    source:
      image: registry.stage.redhat.io/oadp/oadp-velero-plugin-for-microsoft-azure-rhel9
      tagPattern: "^\\d+\\.\\d+\\.\\d+$"
      multiArch: true
      useAuth: true
      keyVault:
        url: "https://arohcpdev-global.vault.azure.net/"
        secretName: "component-sync-pull-secret"
    targets:
    - jsonPath: defaults.velero.azurePlugin.digest
      filePath: ../../config/config.yaml
  velero-hypershift-plugin:
    group: velero
    source:
      image: registry.stage.redhat.io/oadp/oadp-hypershift-velero-plugin-rhel9
      tagPattern: "^\\d+\\.\\d+\\.\\d+$"
      multiArch: true
      useAuth: true
      keyVault:
        url: "https://arohcpdev-global.vault.azure.net/"
        secretName: "component-sync-pull-secret"
    targets:
    - jsonPath: defaults.velero.hypershiftPlugin.digest
      filePath: ../../config/config.yaml
  # Kube Webhook Certgen (Ingress NGINX)
  kube-webhook-certgen:
    group: prom-stack
    source:
      image: registry.k8s.io/ingress-nginx/kube-webhook-certgen
      tagPattern: "^v\\d+\\.\\d+\\.\\d+$"
      multiArch: true # This image only publishes multi-arch manifests
    targets:
    - jsonPath: defaults.svc.prometheus.admissionWebhook.patch.image.sha
      filePath: ../../config/config.yaml
    - jsonPath: defaults.mgmt.prometheus.admissionWebhook.patch.image.sha
      filePath: ../../config/config.yaml
  # Thanos sidecar image for Prometheus
  thanos:
    group: prom-stack
    source:
      image: quay.io/thanos/thanos
      tagPattern: "^v\\d+\\.\\d+\\.\\d+$"
      multiArch: true
    targets:
    - jsonPath: defaults.svc.prometheus.thanos.image.sha
      filePath: ../../config/config.yaml
    - jsonPath: defaults.mgmt.prometheus.thanos.image.sha
      filePath: ../../config/config.yaml
  # Istio istioctl version from GitHub latest release (istio/istio).
  # istioctl is backward-compatible with older control planes and is only used
  # for `istioctl tag set` in the deployment pipeline.
  istio-istioctl:
    group: istio
    source:
      githubLatestRelease: "istio/istio"
    targets:
    - jsonPath: defaults.svc.istio.istioctlVersion
      filePath: ../../config/config.yaml
