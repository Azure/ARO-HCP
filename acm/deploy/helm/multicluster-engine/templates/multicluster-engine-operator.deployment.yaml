        - name: OPERAND_IMAGE_BACKPLANE_OPERATOR
          value: '{{ .Values.imageRegistry }}/{{ .Values.imageRootRepository }}/backplane-rhel9-operator@sha256:dc60c4a33bcecc9b5ca6e29e1dfefa941779daf91e8ebeaee4d41b7d23d31530'
        - name: OPERAND_IMAGE_CLUSTER_API_PROVIDER_AGENT
