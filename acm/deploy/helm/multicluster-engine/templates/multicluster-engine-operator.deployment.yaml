        - name: OPERAND_IMAGE_CLUSTER_API_PROVIDER_AGENT
          value: '{{ .Values.imageRegistry }}/{{ .Values.imageRootRepository }}/cluster-api-provider-agent-rhel9@sha256:885eb69f1ad9605d8641d10523e644abe33b382fb8501e8797f1d46d63db203a'
        - name: OPERAND_IMAGE_CLUSTER_API_PROVIDER_AWS_RHEL9
