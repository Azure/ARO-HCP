        - name: OPERAND_IMAGE_BACKPLANE_OPERATOR
          value: '{{ .Values.imageRegistry }}/{{ .Values.imageRootRepository }}/backplane-rhel9-operator@sha256:f8ec92b2ecff7e48be04a758fadcb196135ae6cf1be0b45c9a0d9e55843bcaf2'
        - name: OPERAND_IMAGE_CLUSTER_API_PROVIDER_AGENT
