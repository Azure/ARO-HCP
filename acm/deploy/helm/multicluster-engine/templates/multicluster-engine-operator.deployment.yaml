        - name: OPERAND_IMAGE_BACKPLANE_OPERATOR
          value: '{{ .Values.imageRegistry }}/{{ .Values.imageRootRepository }}/backplane-rhel9-operator@sha256:c074f2b4cc8c3a48b9345f6bfb3e539ac4275d40b44c2b6a464c176de734c306'
        - name: OPERAND_IMAGE_CLUSTER_API_PROVIDER_AGENT
