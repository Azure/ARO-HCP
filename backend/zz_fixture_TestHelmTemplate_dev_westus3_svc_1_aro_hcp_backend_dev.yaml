# Source: backend/templates/backend.deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: aro-hcp-backend
  name: aro-hcp-backend
  namespace: 'aro-hcp'
spec:
  progressDeadlineSeconds: 600
  replicas: 2
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: aro-hcp-backend
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: aro-hcp-backend
        azure.workload.identity/use: "true"
      annotations:
        checksum/backendservicekeyvault: 'd76b8f7a5cfa15bb0951ea1e9fd6cac34015808f8c7816410ae96b0c19a9d375'
        checksum/azureruntimeconfig: '40e0cf247edb3f1d1eb59cd97663f8ab2cf029da7a96716ee8916d38ac9fb0e5'
        checksum/operatorsmanagedidentitiesconfig: 'f27cfce0998e1678bdcebd4bf6aa3118d69bdf79775bd2824bc7a267d2ae92cf'
    spec:
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: 'topology.kubernetes.io/zone'
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: aro-hcp-backend
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: aro-hcp-backend
      serviceAccountName: 'backend'
      volumes:
      - name: backend-service-key-vault
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: backend-service-key-vault
      - name: azure-runtime-config
        configMap:
          name: backend-azure-runtime-config
      - name: operators-managed-identities-config
        configMap:
          name: backend-operators-managed-identities-config
      containers:
      - name: aro-hcp-backend
        image: 'arohcpsvcdev.azurecr.io/arohcpbackend@sha256:1234567890'
        imagePullPolicy: Always
        args:
        - "--clusters-service-url"
        - "http://clusters-service.clusters-service.svc.cluster.local:8000"
        - "--azure-runtime-config-path"
        - "/configs/azure-runtime-config/config.yaml"
        - "--azure-first-party-application-certificate-bundle-path"
        - "/secrets/backend-service-key-vault/fpa-cert-bundle"
        - "--azure-first-party-application-client-id"
        - "b3cb2fab-15cb-4583-ad06-f91da9bfe2d1"
        - "--maestro-source-environment-identifier"
        - "arohcpdev"
        - "--exit-on-panic=true"
        # MI Mock flags. They should only be set in ARO-HCP environments where Microsoft's Managed Identities Dataplane service is not available.
        - "--insecure-ignore-user-azure-managed-identities-that-need-managed-identities-dataplane-available-and-use-mock"
        - "--insecure-azure-managed-identity-mock-certificate-bundle-path"
        - "/secrets/backend-service-key-vault/mi-mock-cert-bundle"
        - "--insecure-azure-managed-identity-mock-client-id"
        - "e8723db7-9b9e-46a4-9f7d-64d75c3534f0"
        - "--insecure-azure-managed-identity-mock-principal-id"
        - "d6b62dfa-87f5-49b3-bbcb-4a687c4faa96"
        - "--insecure-azure-managed-identity-mock-tenant-id"
        - "64dc69e4-d083-49fc-9569-ebece1dd1408"
        - "--operators-managed-identities-config-path"
        - "/configs/operators-managed-identities-config/config.yaml"
        env:
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: DB_NAME
        - name: DB_URL
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: DB_URL
        - name: LOCATION
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: LOCATION
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: ""
        - name: OTEL_TRACES_EXPORTER
          value: ""
        - name: AZURE_TOKEN_CREDENTIALS
          value: "WorkloadIdentityCredential"
        ports:
        - containerPort: 8081
          protocol: TCP
        - containerPort: 8083
          protocol: TCP
        resources:
          limits:
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 500Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8083
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: backend-service-key-vault
          mountPath: "/secrets/backend-service-key-vault"
        - name: azure-runtime-config
          mountPath: /configs/azure-runtime-config
          readOnly: true
        - name: operators-managed-identities-config
          mountPath: /configs/operators-managed-identities-config
          readOnly: true
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
