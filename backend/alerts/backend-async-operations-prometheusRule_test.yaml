rule_files:
- backend-async-operations-prometheusRule.yaml
evaluation_interval: 1m
tests:
# ========================================
# Cluster create: threshold 1200s (20 min)
# ========================================
# Test: fires when cluster create exceeds 20 minutes
- interval: 1m
  input_series:
  - series: 'backend_resource_operation_start_time_seconds{resource_id="/sub/1/cluster/a", subscription_id="sub-1", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters", operation_type="create", phase="provisioning", cluster="mgmt-1"}'
    values: "0+0x25"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/1/cluster/a", subscription_id="sub-1", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters", operation_type="create", phase="provisioning", cluster="mgmt-1"}'
    values: "1+0x25"
  alert_rule_test:
  # At 21m, time()=1260 > 1200 threshold
  - eval_time: 21m
    alertname: BackendAsyncOperationClusterCreateStuck
    exp_alerts:
    - exp_labels:
        resource_id: "/sub/1/cluster/a"
        subscription_id: "sub-1"
        resource_type: "microsoft.redhatopenshift/hcpopenshiftclusters"
        operation_type: "create"
        phase: "provisioning"
        cluster: "mgmt-1"
        severity: "3"
      exp_annotations:
        correlationId: 'BackendAsyncOperationStuck/mgmt-1//sub/1/cluster/a'
        summary: 'Cluster create operation stuck'
        description: 'Cluster create operation for /sub/1/cluster/a has been running for over 20 minutes and is currently in provisioning phase (e2e timeout: ClusterCreationTimeout).'
        runbook_url: TBD
# Test: does not fire when cluster create is under 20 minutes
- interval: 1m
  input_series:
  - series: 'backend_resource_operation_start_time_seconds{resource_id="/sub/1/cluster/b", subscription_id="sub-1", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters", operation_type="create", phase="provisioning", cluster="mgmt-1"}'
    values: "0+0x20"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/1/cluster/b", subscription_id="sub-1", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters", operation_type="create", phase="provisioning", cluster="mgmt-1"}'
    values: "1+0x20"
  alert_rule_test:
  # At 19m, time()=1140 < 1200 threshold
  - eval_time: 19m
    alertname: BackendAsyncOperationClusterCreateStuck
    exp_alerts: []
# Test: does not fire when cluster create has succeeded
- interval: 1m
  input_series:
  - series: 'backend_resource_operation_start_time_seconds{resource_id="/sub/1/cluster/c", subscription_id="sub-1", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters", operation_type="create", phase="succeeded", cluster="mgmt-1"}'
    values: "0+0x25"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/1/cluster/c", subscription_id="sub-1", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters", operation_type="create", phase="succeeded", cluster="mgmt-1"}'
    values: "1+0x25"
  alert_rule_test:
  - eval_time: 21m
    alertname: BackendAsyncOperationClusterCreateStuck
    exp_alerts: []
# Test: deduplicates across prometheus replicas (only one alert instance)
- interval: 1m
  input_series:
  - series: 'backend_resource_operation_start_time_seconds{resource_id="/sub/1/cluster/d", subscription_id="sub-1", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters", operation_type="create", phase="provisioning", cluster="mgmt-1", prometheus_replica="prometheus-k8s-0"}'
    values: "0+0x25"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/1/cluster/d", subscription_id="sub-1", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters", operation_type="create", phase="provisioning", cluster="mgmt-1", prometheus_replica="prometheus-k8s-0"}'
    values: "1+0x25"
  - series: 'backend_resource_operation_start_time_seconds{resource_id="/sub/1/cluster/d", subscription_id="sub-1", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters", operation_type="create", phase="provisioning", cluster="mgmt-1", prometheus_replica="prometheus-k8s-1"}'
    values: "0+0x25"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/1/cluster/d", subscription_id="sub-1", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters", operation_type="create", phase="provisioning", cluster="mgmt-1", prometheus_replica="prometheus-k8s-1"}'
    values: "1+0x25"
  alert_rule_test:
  - eval_time: 21m
    alertname: BackendAsyncOperationClusterCreateStuck
    exp_alerts:
    - exp_labels:
        resource_id: "/sub/1/cluster/d"
        subscription_id: "sub-1"
        resource_type: "microsoft.redhatopenshift/hcpopenshiftclusters"
        operation_type: "create"
        phase: "provisioning"
        cluster: "mgmt-1"
        severity: "3"
      exp_annotations:
        correlationId: 'BackendAsyncOperationStuck/mgmt-1//sub/1/cluster/d'
        summary: 'Cluster create operation stuck'
        description: 'Cluster create operation for /sub/1/cluster/d has been running for over 20 minutes and is currently in provisioning phase (e2e timeout: ClusterCreationTimeout).'
        runbook_url: TBD
