apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    app.kubernetes.io/name: kube-prometheus
    app.kubernetes.io/part-of: kube-prometheus
    prometheus: k8s
    role: alert-rules
  name: backend-nodepool-monitoring-rules
  namespace: monitoring
spec:
  groups:
  - name: backend-nodepool
    rules:
    - alert: BackendNodePoolOperationErrorRate
      expr: |
        (sum by (cluster) (rate(backend_failed_operations_total{type="poll_node_pool"}[1h])))
        /
        (sum by (cluster) (rate(backend_operations_total{type="poll_node_pool"}[1h])))
        > 0.05
      for: 5m
      labels:
        severity: info
      annotations:
        description: 'The Backend node pool operation error rate is above 5% for the last hour. Current value: {{ $value | humanizePercentage }}.'
        runbook_url: 'TBD'
        summary: 'High error rate on Backend Node Pool operations'
    - alert: BackendNodePoolScalingDuration
      expr: |
        histogram_quantile(0.95, sum by (le, cluster) (rate(backend_operations_duration_seconds_bucket{type="poll_node_pool"}[1h]))) > 2
      for: 15m
      labels:
        severity: info
      annotations:
        description: 'The 95th percentile of node pool scaling operation duration has exceeded 2 seconds over the past hour.'
        runbook_url: 'TBD'
        summary: 'Node pool scaling operations are taking too long: 95th percentile exceeds 2 seconds'
    - alert: BackendNodePoolUpdateRetryRate
      expr: |
        rate(workqueue_retries_total{name="OperationNodePoolUpdate"}[30m]) > 0.05
      for: 10m
      labels:
        severity: info
      annotations:
        description: 'The OperationNodePoolUpdate controller retry rate has exceeded 3 retries/minute over the last 30 minutes. This affects RESIZE (replica count changes) and ADJUST (labels/taints/drain grace period) operations.'
        runbook_url: 'TBD'
        summary: 'High retry rate on node pool update (resize/adjust) operations'
    - alert: BackendNodePoolDeleteRetryRate
      expr: |
        rate(workqueue_retries_total{name="OperationNodePoolDelete"}[30m]) > 0.05
      for: 10m
      labels:
        severity: info
      annotations:
        description: 'The OperationNodePoolDelete controller retry rate has exceeded 3 retries/minute over the last 30 minutes. This affects node pool DELETE operations.'
        runbook_url: 'TBD'
        summary: 'High retry rate on node pool delete operations'
