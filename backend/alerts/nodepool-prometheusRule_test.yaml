rule_files:
- nodepool-prometheusRule.yaml
evaluation_interval: 1m
tests:
# Test: BackendNodePoolOperationErrorRate above 5%
- interval: 1m
  input_series:
  - series: 'backend_failed_operations_total{type="poll_node_pool"}'
    values: "0 6x10" # 6 failures per minute → 6 / 100 = 6%
  - series: 'backend_operations_total{type="poll_node_pool"}'
    values: "0 100x10" # 100 operations per minute
  alert_rule_test:
  - eval_time: 10m
    alertname: BackendNodePoolOperationErrorRate
    exp_alerts:
    - exp_labels:
        severity: info
      exp_annotations:
        description: 'The Backend node pool operation error rate is above 5% for the last hour. Current value: 6%.'
        runbook_url: 'TBD'
        summary: 'High error rate on Backend Node Pool operations'
# Test: BackendNodePoolOperationErrorRate below 5%
- interval: 1m
  input_series:
  - series: 'backend_failed_operations_total{type="poll_node_pool"}'
    values: "0 2x10" # 2 failures per minute → 2 / 100 = 2%
  - series: 'backend_operations_total{type="poll_node_pool"}'
    values: "0 100x10"
  alert_rule_test:
  - eval_time: 10m
    alertname: BackendNodePoolOperationErrorRate
    exp_alerts: []
# Test: BackendNodePoolScalingDuration above 2 seconds (multi-pod: all requests > 5s)
# Both pod-1 and pod-2 only put requests in +Inf bucket, so after sum by (le, cluster)
# the aggregated p95 = +Inf > 2s
- interval: 1m
  input_series:
  - series: 'backend_operations_duration_seconds_bucket{le="0.25",type="poll_node_pool",pod="pod-1",cluster="cl1"}'
    values: '0x20'
  - series: 'backend_operations_duration_seconds_bucket{le="0.5",type="poll_node_pool",pod="pod-1",cluster="cl1"}'
    values: '0x20'
  - series: 'backend_operations_duration_seconds_bucket{le="1",type="poll_node_pool",pod="pod-1",cluster="cl1"}'
    values: '0x20'
  - series: 'backend_operations_duration_seconds_bucket{le="2",type="poll_node_pool",pod="pod-1",cluster="cl1"}'
    values: '0x20'
  - series: 'backend_operations_duration_seconds_bucket{le="5",type="poll_node_pool",pod="pod-1",cluster="cl1"}'
    values: '0x20'
  - series: 'backend_operations_duration_seconds_bucket{le="+Inf",type="poll_node_pool",pod="pod-1",cluster="cl1"}'
    values: '0+60x20'
  - series: 'backend_operations_duration_seconds_bucket{le="0.25",type="poll_node_pool",pod="pod-2",cluster="cl1"}'
    values: '0x20'
  - series: 'backend_operations_duration_seconds_bucket{le="0.5",type="poll_node_pool",pod="pod-2",cluster="cl1"}'
    values: '0x20'
  - series: 'backend_operations_duration_seconds_bucket{le="1",type="poll_node_pool",pod="pod-2",cluster="cl1"}'
    values: '0x20'
  - series: 'backend_operations_duration_seconds_bucket{le="2",type="poll_node_pool",pod="pod-2",cluster="cl1"}'
    values: '0x20'
  - series: 'backend_operations_duration_seconds_bucket{le="5",type="poll_node_pool",pod="pod-2",cluster="cl1"}'
    values: '0x20'
  - series: 'backend_operations_duration_seconds_bucket{le="+Inf",type="poll_node_pool",pod="pod-2",cluster="cl1"}'
    values: '0+60x20'
  alert_rule_test:
  - eval_time: 20m
    alertname: BackendNodePoolScalingDuration
    exp_alerts:
    - exp_labels:
        severity: info
        cluster: cl1
      exp_annotations:
        description: 'The 95th percentile of node pool scaling operation duration has exceeded 2 seconds over the past hour.'
        runbook_url: 'TBD'
        summary: 'Node pool scaling operations are taking too long: 95th percentile exceeds 2 seconds'
# Test: BackendNodePoolScalingDuration below 2 seconds (multi-pod: all requests < 0.25s)
# Both pods put all requests in le="0.25" bucket, aggregated p95 ≈ 0.24s < 2s
- interval: 1m
  input_series:
  - series: 'backend_operations_duration_seconds_bucket{le="0.25",type="poll_node_pool",pod="pod-1",cluster="cl1"}'
    values: '0+100x20'
  - series: 'backend_operations_duration_seconds_bucket{le="0.5",type="poll_node_pool",pod="pod-1",cluster="cl1"}'
    values: '0+100x20'
  - series: 'backend_operations_duration_seconds_bucket{le="1",type="poll_node_pool",pod="pod-1",cluster="cl1"}'
    values: '0+100x20'
  - series: 'backend_operations_duration_seconds_bucket{le="2",type="poll_node_pool",pod="pod-1",cluster="cl1"}'
    values: '0+100x20'
  - series: 'backend_operations_duration_seconds_bucket{le="5",type="poll_node_pool",pod="pod-1",cluster="cl1"}'
    values: '0+100x20'
  - series: 'backend_operations_duration_seconds_bucket{le="+Inf",type="poll_node_pool",pod="pod-1",cluster="cl1"}'
    values: '0+100x20'
  - series: 'backend_operations_duration_seconds_bucket{le="0.25",type="poll_node_pool",pod="pod-2",cluster="cl1"}'
    values: '0+100x20'
  - series: 'backend_operations_duration_seconds_bucket{le="0.5",type="poll_node_pool",pod="pod-2",cluster="cl1"}'
    values: '0+100x20'
  - series: 'backend_operations_duration_seconds_bucket{le="1",type="poll_node_pool",pod="pod-2",cluster="cl1"}'
    values: '0+100x20'
  - series: 'backend_operations_duration_seconds_bucket{le="2",type="poll_node_pool",pod="pod-2",cluster="cl1"}'
    values: '0+100x20'
  - series: 'backend_operations_duration_seconds_bucket{le="5",type="poll_node_pool",pod="pod-2",cluster="cl1"}'
    values: '0+100x20'
  - series: 'backend_operations_duration_seconds_bucket{le="+Inf",type="poll_node_pool",pod="pod-2",cluster="cl1"}'
    values: '0+100x20'
  alert_rule_test:
  - eval_time: 20m
    alertname: BackendNodePoolScalingDuration
    exp_alerts: []
