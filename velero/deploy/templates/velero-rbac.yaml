# Additional RBAC for the velero service account created by velero install
# The velero CLI-generated RBAC is insufficient for node-agent operations
# These are regular resources (not hooks) so they're created before the install job.
# ClusterRoleBindings can reference ServiceAccounts that don't exist yet.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: velero-cluster-role
  labels:
    component: velero
rules:
# Core resources needed by velero and node-agent
- apiGroups: [""]
  resources:
  - pods
  - persistentvolumes
  - persistentvolumeclaims
  - nodes
  - events
  - secrets
  - configmaps
  - serviceaccounts
  - namespaces
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Apps resources
- apiGroups: ["apps"]
  resources:
  - deployments
  - daemonsets
  - replicasets
  - statefulsets
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Batch resources for backup/restore jobs
- apiGroups: ["batch"]
  resources:
  - jobs
  - cronjobs
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# RBAC resources
- apiGroups: ["rbac.authorization.k8s.io"]
  resources:
  - clusterroles
  - clusterrolebindings
  - roles
  - rolebindings
  verbs: ["get", "list", "watch"]
# Velero CRDs
- apiGroups: ["velero.io"]
  resources: ["*"]
  verbs: ["*"]
# CSI snapshot resources
- apiGroups: ["snapshot.storage.k8s.io"]
  resources:
  - volumesnapshots
  - volumesnapshotcontents
  - volumesnapshotclasses
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Storage resources
- apiGroups: ["storage.k8s.io"]
  resources:
  - storageclasses
  - volumeattachments
  verbs: ["get", "list", "watch"]
# API extensions for CRD management
- apiGroups: ["apiextensions.k8s.io"]
  resources:
  - customresourcedefinitions
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: velero-cluster-role-binding
  labels:
    component: velero
subjects:
- kind: ServiceAccount
  name: velero
  namespace: '{{ .Release.Namespace }}'
roleRef:
  kind: ClusterRole
  name: velero-cluster-role
  apiGroup: rbac.authorization.k8s.io
