# Source: arobit/templates/forwarder-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: arobit-forwarder
  namespace: 'arobit'
  labels:
    app.kubernetes.io/name: arobit-forwarder
    app.kubernetes.io/instance: 'helmtest-mdsd-and-kusto-enabled-svc'
data:
  fluent-bit.conf: |
    @INCLUDE /forwarder/etc/service.conf

    @INCLUDE /forwarder/etc/input.conf

    @INCLUDE /forwarder/etc/filter.conf
    @INCLUDE /forwarder/etc/output.conf
  service.conf: |
    [SERVICE]
        Flush                     1
        Log_Level                 info
        Parsers_File              /fluent-bit/etc/parsers.conf
        Parsers_File              /forwarder/etc/parsers_custom.conf
        Plugins_File              /fluent-bit/etc/plugins.conf
        HTTP_Server               On
        storage.path              /var/fluent-bit/flb-storage
        storage.max_chunks_up     128
        storage.backlog.mem_limit 15M
        storage.metrics           on
        storage.delete_irrecoverable_chunks on
        scheduler.cap             600
        Grace                     30
        # Based on the HC_Period, if the error number > HC_Errors_Count or the retry failure > HC_Retry_Failure_Count, fluent bit is considered as unhealthy.
        Health_Check              On
        HC_Errors_Count           5
        HC_Retry_Failure_Count    5
        HC_Period                 60
  parsers_custom.conf: |
    [PARSER]
        Name        containerlogs
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
        Time_Keep   On

  input.conf: |
    [INPUT]
        Name              tail
        Alias             tail.container
        Tag               kubernetes.*
        Path              /var/log/containers/*.log
        Exclude_Path      /var/log/containers/*log-tailer*,/var/log/containers/*geneva-logger*,/var/log/containers/*arobit*
        multiline.parser  cri
        # Docker_Mode       On
        # Parser            none
        DB                /var/log/flb-tail.db
        DB.sync           normal
        DB.locking        true
        Refresh_Interval  15
        Read_from_Head    On
        Buffer_Chunk_Size 32K
        Buffer_Max_Size   256K
        Skip_Long_Lines   On
        storage.type      filesystem
        Threaded          On

    [INPUT]
        Name              forward
        Alias             input.forward
        Listen            0.0.0.0
        Port              24224
        Buffer_Chunk_Size 128K
        Buffer_Max_Size   2M
        Mem_Buf_Limit     50M

    [INPUT]
        Name            fluentbit_metrics
        Alias           metrics.fluentbit
        Tag             metrics.fluentbit
        scrape_interval 15

    [INPUT]
        Name   opentelemetry
        Alias  otlp
        Listen 0.0.0.0
        Port   4318
        Mem_Buf_Limit 50M

    [INPUT]
        Name            systemd
        Alias           systemd
        Tag             systemd.*
        Systemd_Filter  _SYSTEMD_UNIT=containerd.service
        Systemd_Filter  _SYSTEMD_UNIT=kubelet.service
        Read_From_Tail  On
        Strip_Underscores On
        DB              /var/fluent-bit/flb-storage/flb-systemdb.db
        Threaded          On
        storage.type      filesystem
  filter.conf: |
    [FILTER]
        Name modify
        Match systemd.*
        Add environment dev
        Add region westus3
        Add cluster dev-westus3-svc-1

    [FILTER]
        Name modify
        Match kubernetes.var.log.containers.*
        Add environment dev
        Add region westus3
        Add cluster dev-westus3-svc-1

    [FILTER]
        Name                kubernetes
        Alias               filter.kubernetes
        Match               kubernetes.var.log.containers.*
        Kube_Tag_Prefix     kubernetes.var.log.containers.
        Annotations         Off
        K8S-Logging.Exclude On
        Kube_Meta_Cache_TTL 300
        Buffer_Size         64k

    [FILTER]
        # Only re-tag ocm-* namespaces (minority of traffic). Non-ocm records keep
        # their original kubernetes.* tag and flow directly to outputs — no copy needed.
        Name            rewrite_tag
        Alias           filter.namespace_router
        Match           kubernetes.var.log.containers.*
        Rule            $kubernetes['namespace_name'] ^ocm-.* ocm.logs false
        Emitter_Name    re_emitted_namespace_router
        Emitter_Mem_Buf_Limit  20M
        Emitter_Storage.type   filesystem

    [FILTER]
        Name            rewrite_tag
        Alias           filter.container_name_router
        Match           kubernetes.var.log.containers.*
        Rule            $kubernetes['container_name'] ^aro-hcp-frontend* aro-hcp-frontend.logs true
        Rule            $kubernetes['container_name'] ^aro-hcp-backend* aro-hcp-backend.logs true
        Rule            $kubernetes['container_name'] ^clusters-service* clusters-service.logs true
        Rule            $kubernetes['container_name'] ^kube-events* kube-events.logs true
        Emitter_Name    re_emitted_container_name_router
        Emitter_Mem_Buf_Limit  20M
        Emitter_Storage.type   filesystem

    [FILTER]
        # Parse the log key and make it a json object again under $
        Name Parser
        Match_regex (aro-hcp-(frontend|backend)|kube-events|clusters-service)\.logs
        Key_Name log
        Parser containerlogs
        Preserve_Key On
        Reserve_Data On
  output.conf: |
    [OUTPUT]
        Name  prometheus_exporter
        Alias exporter.fluentbit
        Match metrics.fluentbit
        Host  0.0.0.0
        Port  9090

    [OUTPUT]
        Match aro-hcp-frontend.logs
        Name azure_kusto
        Retry_Limit 5
        auth_type workload_identity
        tenant_id __tenantId__
        client_id __msiClientId__
        workload_identity_token_file ${AZURE_FEDERATED_TOKEN_FILE}
        Ingestion_Endpoint __kustoDataIngestionUri__
        Database_Name ServiceLogs
        Table_Name frontendLogs
        ingestion_mapping_reference ingestionMapping
        buffer_dir "/var/kusto"
        azure_kusto_buffer_key frontendLogs
        buffering_enabled           true 
        upload_timeout              1m
        upload_file_size            16M
        buffer_file_delete_early    false
        unify_tag                   true
        store_dir_limit_size        1.8GB
        blob_uri_length             128
        scheduler_max_retries       9
        delete_on_max_upload_error  true
        io_timeout                  60s

    [OUTPUT]
        Match aro-hcp-backend.logs
        Name azure_kusto
        Retry_Limit 5
        auth_type workload_identity
        tenant_id __tenantId__
        client_id __msiClientId__
        workload_identity_token_file ${AZURE_FEDERATED_TOKEN_FILE}
        Ingestion_Endpoint __kustoDataIngestionUri__
        Database_Name ServiceLogs
        Table_Name backendLogs
        ingestion_mapping_reference ingestionMapping
        azure_kusto_buffer_key backendLogs
        buffer_dir "/var/kusto"
        buffering_enabled           true 
        upload_timeout              1m
        upload_file_size            16M
        buffer_file_delete_early    false
        unify_tag                   true
        store_dir_limit_size        1.8GB
        blob_uri_length             128
        scheduler_max_retries       9
        delete_on_max_upload_error  true
        io_timeout                  60s

    [OUTPUT]
        Match clusters-service.logs
        Name azure_kusto
        Retry_Limit 5
        auth_type workload_identity
        tenant_id __tenantId__
        client_id __msiClientId__
        workload_identity_token_file ${AZURE_FEDERATED_TOKEN_FILE}
        Ingestion_Endpoint __kustoDataIngestionUri__
        Database_Name ServiceLogs
        Table_Name clustersServiceLogs
        ingestion_mapping_reference ingestionMapping
        azure_kusto_buffer_key clustersServiceLogs
        buffer_dir "/var/kusto"
        buffering_enabled           true 
        upload_timeout              1m
        upload_file_size            16M
        buffer_file_delete_early    false
        unify_tag                   true
        store_dir_limit_size        1.8GB
        blob_uri_length             128
        scheduler_max_retries       9
        delete_on_max_upload_error  true
        io_timeout                  60s
    [OUTPUT]
        Match kubernetes.*
        Name azure_kusto
        Retry_Limit 5
        auth_type workload_identity
        tenant_id __tenantId__
        client_id __msiClientId__
        workload_identity_token_file ${AZURE_FEDERATED_TOKEN_FILE}
        Ingestion_Endpoint __kustoDataIngestionUri__
        Database_Name ServiceLogs
        Table_Name containerLogs
        ingestion_mapping_reference ingestionMapping
        azure_kusto_buffer_key containerLogs
        buffer_dir "/var/kusto"
        buffering_enabled           true 
        upload_timeout              1m
        upload_file_size            16M
        buffer_file_delete_early    false
        unify_tag                   true
        store_dir_limit_size        1.8GB
        blob_uri_length             128
        scheduler_max_retries       9
        delete_on_max_upload_error  true
        io_timeout                  60s

    [OUTPUT]
        Match kube-events.logs
        Name azure_kusto
        Retry_Limit 5
        auth_type workload_identity
        tenant_id __tenantId__
        client_id __msiClientId__
        workload_identity_token_file ${AZURE_FEDERATED_TOKEN_FILE}
        Ingestion_Endpoint __kustoDataIngestionUri__
        Database_Name ServiceLogs
        Table_Name kubernetesEvents
        ingestion_mapping_reference ingestionMapping
        azure_kusto_buffer_key kubernetesEvents
        buffer_dir "/var/kusto"
        buffering_enabled           true 
        upload_timeout              1m
        upload_file_size            16M
        buffer_file_delete_early    false
        unify_tag                   true
        store_dir_limit_size        1.8GB
        blob_uri_length             128
        scheduler_max_retries       9
        delete_on_max_upload_error  true
        io_timeout                  60s

  output-mdsd.conf: |
    # Forward logs to mdsd instance (default port)
    [OUTPUT]
        Name  forward
        Alias forward.mdsd.other
        Match mdsd-other.logs
        Host  127.0.0.1
        Port  5001
        Tag   akskubesystem

    [OUTPUT]
        Match systemd.*
        Name azure_kusto
        Retry_Limit 5
        auth_type workload_identity
        tenant_id __tenantId__
        client_id __msiClientId__
        workload_identity_token_file ${AZURE_FEDERATED_TOKEN_FILE}
        Ingestion_Endpoint __kustoDataIngestionUri__
        Database_Name ServiceLogs
        Table_Name systemdLogs
        ingestion_mapping_reference ingestionMapping
        azure_kusto_buffer_key systemdLogs
        buffer_dir "/var/kusto"
        buffering_enabled           true 
        upload_timeout              1m
        upload_file_size            16M
        buffer_file_delete_early    false
        unify_tag                   true
        store_dir_limit_size        1.8GB
        blob_uri_length             128
        scheduler_max_retries       9
        delete_on_max_upload_error  true
        io_timeout                  60s
