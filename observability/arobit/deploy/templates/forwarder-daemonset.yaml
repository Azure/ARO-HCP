---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: arobit-forwarder
  namespace: '{{ .Release.Namespace }}'
  labels:
    app.kubernetes.io/name: arobit-forwarder
    app.kubernetes.io/instance: '{{ .Release.Name }}'
    ## Istio Labels: https://istio.io/docs/ops/deployment/requirements/
    app: arobit-forwarder
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: arobit-forwarder
      app.kubernetes.io/instance: '{{ .Release.Name }}'
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 100%
  template:
    metadata:
      labels:
        app.kubernetes.io/name: arobit-forwarder
        app.kubernetes.io/instance: '{{ .Release.Name }}'
        app: arobit-forwarder
        azure.workload.identity/use: "true"
      annotations:
        checksum/configmap: {{ include (print $.Template.BasePath "/forwarder-configmap.yaml") . | sha256sum }}
    spec:
      priorityClassName: service-lifecycle-critical
      serviceAccountName: '{{ .Values.forwarder.serviceAccountName }}'
      shareProcessNamespace: true
      containers:
        - name: fluentbit
          image: {{ .Values.forwarder.fluentbit.image.registry }}/{{ .Values.forwarder.fluentbit.image.repository }}@{{ .Values.forwarder.fluentbit.image.digest }}
          imagePullPolicy: '{{ .Values.forwarder.fluentbit.image.pullPolicy }}'
          command:
            - /fluent-bit/bin/fluent-bit
          args:
            - -c
            - /forwarder/etc/fluent-bit.conf
          ports:
            - name: http
              containerPort: 2020
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: forward
              containerPort: 24224
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
            successThreshold: 1
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            runAsUser: 0
            runAsGroup: 0
            capabilities:
              drop: ['ALL']
          resources:
            requests:
              cpu: {{ .Values.forwarder.fluentbit.resources.requests.cpu }}
              memory: {{ .Values.forwarder.fluentbit.resources.requests.memory }}
{{- if ne .Values.forwarder.fluentbit.resources.limits.memory "unlimited" }}
            limits:
              memory: {{ .Values.forwarder.fluentbit.resources.limits.memory }}
{{- end }}
          volumeMounts:
            - name: var-kusto
              mountPath: /var/kusto
            - name: var-log
              mountPath: /var/log
            - name: machine-id
              mountPath: /etc/machine-id
              readOnly: true
            - name: flb-storage
              mountPath: /var/fluent-bit/flb-storage
            - name: var-lib-docker-containers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: flb-config
              mountPath: /forwarder/etc
              readOnly: true
        {{- if and .Values.forwarder.mdsd.enabled (eq .Values.forwarder.clusterType "mgmt") }}
            - name: shoebox-mappings
              mountPath: /shoebox-config
              readOnly: true
        - name: mdsd-clusterlogs
          image: {{ .Values.forwarder.mdsd.image.registry }}/{{ .Values.forwarder.mdsd.image.repository }}@{{ .Values.forwarder.mdsd.image.digest }}
          imagePullPolicy: '{{ .Values.forwarder.mdsd.image.pullPolicy }}'
          # AROSLSRE-879: defensively wait for the Geneva auth cert before exec'ing
          # mdsd. The AKS secrets-store CSI driver can lose the initial
          # NodePublishVolume race, leaving /geneva/geneva_auth/ empty; mdsd then
          # panics with "No certificate was found that matched SAN" on every
          # restart. The mdsd-cert-watchdog sidecar below recovers stuck pods by
          # deleting them; this wrapper keeps the normal startup race window quiet.
          # Upstream bug: kubernetes-sigs/secrets-store-csi-driver#1051
          # Upstream fix: kubernetes-sigs/secrets-store-csi-driver#2025 (in flight)
          # Remove this wrapper once #2025 lands and AKS ships the fixed driver.
          # Polls for a non-empty cert file (mdsd does its own X.509 + SAN
          # validation), then exec's the real entrypoint. If the cert never
          # appears we exit non-zero so the kubelet restart counter increments and
          # existing container-restart alerts still fire. Uses /bin/sh and
          # /bin/sleep, both present in the distroless mdsd image (the watchdog
          # sidecar already uses /bin/sleep directly). Timeout and poll interval
          # are sourced from the watchdog's chart values so the two recovery
          # windows stay coordinated when tuned.
          command:
            - /bin/sh
            - -c
            - |
              CERT=/geneva/geneva_auth/gcscert.pem
              WAITED=0
              while [ "$WAITED" -lt "$TIMEOUT_SECONDS" ]; do
                if [ -s "$CERT" ]; then
                  echo "[mdsd-init] Geneva auth cert present after ${WAITED}s; exec'ing mdsd"
                  exec /start_mdsd.sh
                fi
                echo "[mdsd-init] Geneva auth cert not yet mounted at ${CERT} (waited ${WAITED}s of ${TIMEOUT_SECONDS}s)"
                sleep "$INTERVAL_SECONDS"
                WAITED=$((WAITED + INTERVAL_SECONDS))
              done
              echo "[mdsd-init] Giving up after ${TIMEOUT_SECONDS}s; Geneva auth cert never appeared at ${CERT}. This usually means the CSI driver lost the initial mount race; see AROSLSRE-879. Exiting to trigger container restart."
              exit 1
          env:
            - name: TIMEOUT_SECONDS
              value: '{{ .Values.forwarder.watchdog.timeoutSeconds }}'
            - name: INTERVAL_SECONDS
              value: '{{ .Values.forwarder.watchdog.intervalSeconds }}'
            - name: MONITORING_GCS_AUTH_ID
              value: '{{ .Values.forwarder.mdsd.geneva.clusterLogsSan }}'
            - name: MONITORING_GCS_AUTH_ID_TYPE
              value: AuthKeyVault
            - name: MDSD_AKV_CERTIFICATE_STORE_PATH
              value: /geneva/geneva_auth
            - name: MONITORING_CONFIG_VERSION
              value: '{{ .Values.forwarder.mdsd.geneva.configVersion }}'
            - name: MONITORING_GCS_ACCOUNT
              value: '{{ .Values.forwarder.mdsd.geneva.clusterLogsAccountName }}'
            - name: MONITORING_GCS_ENVIRONMENT
              value: '{{ .Values.forwarder.mdsd.geneva.environment }}'
            - name: MONITORING_GCS_NAMESPACE
              value: '{{ .Values.forwarder.mdsd.geneva.clusterLogsNamespace }}'
            - name: MONITORING_GCS_REGION
              value: '{{ .Values.forwarder.mdsd.geneva.region }}'
            - name: DOCKER_LOGGING
              value: 'true'
            - name: FLUENTD_PORT
              value: '5002'
            - name: GCS_AUTOMATIC_CONFIGURATION
              value: '1'
            - name: GCS_AUTOMATIC_CONFIG_RUNTIME
              value: '-A'
            - name: MDSD_BACKPRESSURE_MONITOR_FREQ_SEC
              value: '5'
            - name: MDSD_BACKPRESSURE_MONITOR_MEMORY_THRESHOLD_IN_MB
              value: '1000'
            - name: MDSD_COMPRESSION_ALGORITHM
              value: 'lz4'
            - name: MDSD_COMPRESSION_LEVEL
              value: '4'
            - name: MDSD_DAEMON_TEMPORARY_ELEVATION_DISABLED
              value: 'true'
            - name: MDSD_DEBUG_LOG_FLAGS
              value: '-T 0x00'
            - name: MDSD_LOG_OPTIONS
              value: '-D'
            - name: MDSD_MSGPACK_ARRAY_SIZE_ITEMS
              value: '10480000'
            - name: MDSD_MSGPACK_MAP_SIZE_ITEMS
              value: '10480000'
            - name: MDSD_MSGPACK_NESTING_LEVEL
              value: '10'
            - name: MDSD_MSGPACK_SEND_ACK
              value: '0'
            - name: MDSD_MSGPACK_SORT_COLUMNS
              value: '1'
            - name: MDSD_PORT
              value: '0'
            - name: MDSD_TCMALLOC_RELEASE_FREQ_SEC
              value: '1'
            - name: MDSD_USE_LOCAL_PERSISTENCY
              value: 'false'
            - name: MONITORING_MAX_EVENT_RATE
              value: '100000'
            - name: MONITORING_ROLE
              value: '{{ .Values.forwarder.mdsd.geneva.role }}'
            - name: MONITORING_TENANT
              value: '{{ .Values.forwarder.mdsd.geneva.region }}'
          lifecycle:
            preStop:
              exec:
                command:
                - "/bin/sleep"
                - "45"
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            runAsUser: 0
            runAsGroup: 0
            capabilities:
              add: []
              drop: []
          volumeMounts:
            - name: mdsd-run-clusterlogs
              mountPath: /var/run/mdsd/
            - name: cacrt-host
              mountPath: /etc/ssl/certs/ca-certificates.crt
              readOnly: true
            - mountPath: /geneva/geneva_auth/
              name: geneva-certs-clusterlogs
              readOnly: true
        - name: mdsd-cert-watchdog
          # AROSLSRE-879: the AKS secrets-store CSI driver can lose the initial
          # NodePublishVolume mount race during DaemonSet rollouts, leaving
          # /geneva/geneva_auth/ empty for the rest of the pod's lifetime.
          # Pod-level CSI mounts are not retried on container restart, so the
          # mdsd polling wrapper alone cannot recover; the pod has to be
          # recreated to get another shot at NodePublishVolume.
          #
          # This watchdog waits for the cert to appear and, if it doesn't
          # within the bounded window, asks the K8s API to delete this pod so
          # the DaemonSet recreates it. The namespace-scoped Role grants only
          # pods:delete (see forwarder-watchdog-rbac.yaml).
          image: {{ .Values.forwarder.watchdog.image.registry }}/{{ .Values.forwarder.watchdog.image.repository }}@{{ .Values.forwarder.watchdog.image.digest }}
          imagePullPolicy: '{{ .Values.forwarder.watchdog.image.pullPolicy }}'
          command:
            - /bin/sh
            - -c
            - |
              CERT=/geneva/geneva_auth/gcscert.pem
              WAITED=0
              while [ "$WAITED" -lt "$TIMEOUT_SECONDS" ]; do
                if [ -s "$CERT" ]; then
                  echo "[cert-watchdog] Geneva auth cert present at ${CERT} after ${WAITED}s; sleeping idle until pod terminates"
                  exec sleep infinity
                fi
                sleep "$INTERVAL_SECONDS"
                WAITED=$((WAITED + INTERVAL_SECONDS))
              done
              echo "[cert-watchdog] Geneva auth cert never appeared at ${CERT} after ${TIMEOUT_SECONDS}s. The AKS secrets-store CSI driver likely lost the initial NodePublishVolume mount race (AROSLSRE-879). Requesting deletion of pod ${POD_NAMESPACE}/${POD_NAME} so the DaemonSet can recreate it with a fresh CSI mount."
              if kubectl delete pod "$POD_NAME" --namespace "$POD_NAMESPACE" --grace-period=30 --wait=false; then
                echo "[cert-watchdog] Pod delete requested; sleeping idle until kubelet terminates us"
                exec sleep infinity
              fi
              echo "[cert-watchdog] kubectl delete pod failed; exiting non-zero so the kubelet retries us"
              exit 1
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: TIMEOUT_SECONDS
              value: '{{ .Values.forwarder.watchdog.timeoutSeconds }}'
            - name: INTERVAL_SECONDS
              value: '{{ .Values.forwarder.watchdog.intervalSeconds }}'
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            runAsUser: 0
            runAsGroup: 0
            capabilities:
              drop: ['ALL']
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - mountPath: /geneva/geneva_auth/
              name: geneva-certs-clusterlogs
              readOnly: true
        {{- end }}
      terminationGracePeriodSeconds: 45
      tolerations:
      - effect: NoSchedule
        key: infra
        operator: "Equal"
        value: "true"
      volumes:
        - name: var-kusto
          emptyDir:
            sizeLimit: 12Gi
        - name: sp-host
          hostPath:
            type: Directory
            path: /etc/kubernetes/
        - name: flb-storage
          emptyDir: {}
        - name: machine-id
          hostPath:
            path: /etc/machine-id
        - name: var-log
          hostPath:
            path: /var/log
        - name: var-lib-docker-containers
          hostPath:
            path: /var/lib/docker/containers
        - name: cacrt-host
          hostPath:
            type: File
            path: /etc/ssl/certs/ca-certificates.crt
        - name: flb-config
          configMap:
            name: arobit-forwarder
            defaultMode: 0755
        {{- if and .Values.forwarder.mdsd.enabled (eq .Values.forwarder.clusterType "mgmt") }}
        - name: mdsd-run-clusterlogs
          emptyDir: {}
        - name: shoebox-mappings
          configMap:
            name: namespace-resourceid-mapping
            optional: true
        - name: geneva-certs-clusterlogs
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: arobit-secretprovider-clusterlogs
        {{- end }}
