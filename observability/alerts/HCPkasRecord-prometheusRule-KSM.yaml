apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: hcp-kms-recording-rules
  namespace: prometheus
spec:
  groups:
  - name: hcp-kms-recording-rules
    rules:
    # All rules are gated on the raw KSM metric currently being reported.
    # This prevents stale data from deleted clusters.

    # Long-window averages for slow-burn alerts
    - record: hostedClusterAPI_kubeapiserver_available:ratio_avg_30d
      expr: |
        avg by (name, namespace, _id, resource_id, cluster) (avg_over_time(hostedClusterAPI_kubeapiserver_available{status="True"}[30d]))
        and on (name, namespace, _id, resource_id, cluster)
        count by (name, namespace, _id, resource_id, cluster) (hostedClusterAPI_kubeapiserver_available)
    - record: hostedClusterAPI_kubeapiserver_available:ratio_avg_7d
      expr: |
        avg by (name, namespace, _id, resource_id, cluster) (avg_over_time(hostedClusterAPI_kubeapiserver_available{status="True"}[7d]))
        and on (name, namespace, _id, resource_id, cluster)
        count by (name, namespace, _id, resource_id, cluster) (hostedClusterAPI_kubeapiserver_available)
    - record: hostedClusterAPI_kubeapiserver_available:ratio_avg_1d
      expr: |
        avg by (name, namespace, _id, resource_id, cluster) (avg_over_time(hostedClusterAPI_kubeapiserver_available{status="True"}[1d]))
        and on (name, namespace, _id, resource_id, cluster)
        count by (name, namespace, _id, resource_id, cluster) (hostedClusterAPI_kubeapiserver_available)
    - record: hostedClusterAPI_kubeapiserver_available:ratio_avg_3d
      expr: |
        avg by (name, namespace, _id, resource_id, cluster) (avg_over_time(hostedClusterAPI_kubeapiserver_available{status="True"}[3d]))
        and on (name, namespace, _id, resource_id, cluster)
        count by (name, namespace, _id, resource_id, cluster) (hostedClusterAPI_kubeapiserver_available)
    # Short-window sum_over_time for burn-rate calculations
    - record: hostedClusterAPI_kubeapiserver_available:sum_over_time_30m
      expr: |
        sum by (name, namespace, _id, resource_id, cluster) (sum_over_time(hostedClusterAPI_kubeapiserver_available{status="True"}[30m]))
        and on (name, namespace, _id, resource_id, cluster)
        count by (name, namespace, _id, resource_id, cluster) (hostedClusterAPI_kubeapiserver_available)
    - record: hostedClusterAPI_kubeapiserver_available:sum_over_time_1h
      expr: |
        sum by (name, namespace, _id, resource_id, cluster) (sum_over_time(hostedClusterAPI_kubeapiserver_available{status="True"}[1h]))
        and on (name, namespace, _id, resource_id, cluster)
        count by (name, namespace, _id, resource_id, cluster) (hostedClusterAPI_kubeapiserver_available)
    - record: hostedClusterAPI_kubeapiserver_available:sum_over_time_2h
      expr: |
        sum by (name, namespace, _id, resource_id, cluster) (sum_over_time(hostedClusterAPI_kubeapiserver_available{status="True"}[2h]))
        and on (name, namespace, _id, resource_id, cluster)
        count by (name, namespace, _id, resource_id, cluster) (hostedClusterAPI_kubeapiserver_available)
    - record: hostedClusterAPI_kubeapiserver_available:sum_over_time_6h
      expr: |
        sum by (name, namespace, _id, resource_id, cluster) (sum_over_time(hostedClusterAPI_kubeapiserver_available{status="True"}[6h]))
        and on (name, namespace, _id, resource_id, cluster)
        count by (name, namespace, _id, resource_id, cluster) (hostedClusterAPI_kubeapiserver_available)
    # Short-window count_over_time for burn-rate calculations
    - record: hostedClusterAPI_kubeapiserver_available:count_over_time_30m
      expr: |
        sum by (name, namespace, _id, resource_id, cluster) (count_over_time(hostedClusterAPI_kubeapiserver_available{status="True"}[30m]))
        and on (name, namespace, _id, resource_id, cluster)
        count by (name, namespace, _id, resource_id, cluster) (hostedClusterAPI_kubeapiserver_available)
    - record: hostedClusterAPI_kubeapiserver_available:count_over_time_1h
      expr: |
        sum by (name, namespace, _id, resource_id, cluster) (count_over_time(hostedClusterAPI_kubeapiserver_available{status="True"}[1h]))
        and on (name, namespace, _id, resource_id, cluster)
        count by (name, namespace, _id, resource_id, cluster) (hostedClusterAPI_kubeapiserver_available)
    - record: hostedClusterAPI_kubeapiserver_available:count_over_time_2h
      expr: |
        sum by (name, namespace, _id, resource_id, cluster) (count_over_time(hostedClusterAPI_kubeapiserver_available{status="True"}[2h]))
        and on (name, namespace, _id, resource_id, cluster)
        count by (name, namespace, _id, resource_id, cluster) (hostedClusterAPI_kubeapiserver_available)
    - record: hostedClusterAPI_kubeapiserver_available:count_over_time_6h
      expr: |
        sum by (name, namespace, _id, resource_id, cluster) (count_over_time(hostedClusterAPI_kubeapiserver_available{status="True"}[6h]))
        and on (name, namespace, _id, resource_id, cluster)
        count by (name, namespace, _id, resource_id, cluster) (hostedClusterAPI_kubeapiserver_available)
    # Long-window count_over_time for sample-count guards
    - record: hostedClusterAPI_kubeapiserver_available:count_over_time_1d
      expr: |
        sum by (name, namespace, _id, resource_id, cluster) (count_over_time(hostedClusterAPI_kubeapiserver_available{status="True"}[1d]))
        and on (name, namespace, _id, resource_id, cluster)
        count by (name, namespace, _id, resource_id, cluster) (hostedClusterAPI_kubeapiserver_available)
    - record: hostedClusterAPI_kubeapiserver_available:count_over_time_3d
      expr: |
        sum by (name, namespace, _id, resource_id, cluster) (count_over_time(hostedClusterAPI_kubeapiserver_available{status="True"}[3d]))
        and on (name, namespace, _id, resource_id, cluster)
        count by (name, namespace, _id, resource_id, cluster) (hostedClusterAPI_kubeapiserver_available)
    # SLI rules using 15m offset blackout to exclude newly-provisioned clusters.
    # The offset blackout ensures a cluster existed at least 15 minutes ago before
    # contributing to SLI calculations, preventing provisioning noise from skewing
    # availability metrics. Numerator counts status="True" samples; denominator counts
    # all samples (any status via max by) so downtime is counted as 0, not skipped.
    - record: hostedClusterAPI_kubeapiserver_available:sli_sum_15m
      expr: |
        sum by (name, namespace, _id, resource_id, cluster) (
          sum_over_time(
            (
              hostedClusterAPI_kubeapiserver_available{status="True"}
              and on (name, namespace, _id, resource_id, cluster)
              max by (name, namespace, _id, resource_id, cluster) ((hostedClusterAPI_kubeapiserver_available offset 15m) >= 0)
            )[15m:1m]
          )
        )
        and on (name, namespace, _id, resource_id, cluster)
        count by (name, namespace, _id, resource_id, cluster) (hostedClusterAPI_kubeapiserver_available)
    - record: hostedClusterAPI_kubeapiserver_available:sli_count_15m
      expr: |
        sum by (name, namespace, _id, resource_id, cluster) (
          count_over_time(
            (
              max by (name, namespace, _id, resource_id, cluster) (hostedClusterAPI_kubeapiserver_available)
              and on (name, namespace, _id, resource_id, cluster)
              max by (name, namespace, _id, resource_id, cluster) ((hostedClusterAPI_kubeapiserver_available offset 15m) >= 0)
            )[15m:1m]
          )
        )
        and on (name, namespace, _id, resource_id, cluster)
        count by (name, namespace, _id, resource_id, cluster) (hostedClusterAPI_kubeapiserver_available)
    - record: hostedClusterAPI_kubeapiserver_available:sli_sum_6h
      expr: |
        sum by (name, namespace, _id, resource_id, cluster) (
          sum_over_time(
            (
              hostedClusterAPI_kubeapiserver_available{status="True"}
              and on (name, namespace, _id, resource_id, cluster)
              max by (name, namespace, _id, resource_id, cluster) ((hostedClusterAPI_kubeapiserver_available offset 15m) >= 0)
            )[6h:5m]
          )
        )
        and on (name, namespace, _id, resource_id, cluster)
        count by (name, namespace, _id, resource_id, cluster) (hostedClusterAPI_kubeapiserver_available)
    - record: hostedClusterAPI_kubeapiserver_available:sli_count_6h
      expr: |
        sum by (name, namespace, _id, resource_id, cluster) (
          count_over_time(
            (
              max by (name, namespace, _id, resource_id, cluster) (hostedClusterAPI_kubeapiserver_available)
              and on (name, namespace, _id, resource_id, cluster)
              max by (name, namespace, _id, resource_id, cluster) ((hostedClusterAPI_kubeapiserver_available offset 15m) >= 0)
            )[6h:5m]
          )
        )
        and on (name, namespace, _id, resource_id, cluster)
        count by (name, namespace, _id, resource_id, cluster) (hostedClusterAPI_kubeapiserver_available)
    - record: hostedClusterAPI_kubeapiserver_available:sli_sum_3d
      expr: |
        sum by (name, namespace, _id, resource_id, cluster) (
          sum_over_time(
            (
              hostedClusterAPI_kubeapiserver_available{status="True"}
              and on (name, namespace, _id, resource_id, cluster)
              max by (name, namespace, _id, resource_id, cluster) ((hostedClusterAPI_kubeapiserver_available offset 15m) >= 0)
            )[3d:30m]
          )
        )
        and on (name, namespace, _id, resource_id, cluster)
        count by (name, namespace, _id, resource_id, cluster) (hostedClusterAPI_kubeapiserver_available)
    - record: hostedClusterAPI_kubeapiserver_available:sli_count_3d
      expr: |
        sum by (name, namespace, _id, resource_id, cluster) (
          count_over_time(
            (
              max by (name, namespace, _id, resource_id, cluster) (hostedClusterAPI_kubeapiserver_available)
              and on (name, namespace, _id, resource_id, cluster)
              max by (name, namespace, _id, resource_id, cluster) ((hostedClusterAPI_kubeapiserver_available offset 15m) >= 0)
            )[3d:30m]
          )
        )
        and on (name, namespace, _id, resource_id, cluster)
        count by (name, namespace, _id, resource_id, cluster) (hostedClusterAPI_kubeapiserver_available)
