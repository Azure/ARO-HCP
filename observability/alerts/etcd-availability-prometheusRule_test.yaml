        short_window: 5m
        instance: etcd-0
      exp_annotations:
        description: "etcd instance etcd-0 has 99th percentile peer round-trip time of 0.2048s (threshold: 100ms). Network latency between peers may be affecting cluster performance. Fast burn (1h/5m)."
        summary: "etcd peer round-trip time is high"
        runbook_url: TBD
  - eval_time: 11m
    alertname: EtcdPeerRoundTripTimeHigh6h30m
    exp_alerts: []
  - eval_time: 11m
    alertname: EtcdPeerRoundTripTimeHigh3d
    exp_alerts: []
  - eval_time: 61m
    alertname: EtcdPeerRoundTripTimeHigh6h30m
    exp_alerts:
    - exp_labels:
        alertname: EtcdPeerRoundTripTimeHigh6h30m
        severity: warning
