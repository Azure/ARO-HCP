    exp_alerts:
    - exp_labels:
        alertname: userJourneyEtcdPeerRoundTripTimeHigh3d
        severity: "4"
        long_window: 3d
        short_window: 6h
        instance: etcd-0
      exp_annotations:
        description: "etcd instance etcd-0 has 99th percentile peer round-trip time of 0.2048s (threshold: 100ms). Network latency between peers may be affecting cluster performance. Slow burn (3d)."
        summary: "etcd peer round-trip time is chronically high"
        runbook_url: TBD

# Scenario 2: Normal peer RTT — no tiers fire
- interval: 1m
  input_series:
  - series: 'etcd_network_peer_round_trip_time_seconds_bucket{instance="etcd-1",le="0.0001"}'
    values: "0+50x15"
  - series: 'etcd_network_peer_round_trip_time_seconds_bucket{instance="etcd-1",le="0.0002"}'
    values: "0+90x15"
  - series: 'etcd_network_peer_round_trip_time_seconds_bucket{instance="etcd-1",le="0.0004"}'
