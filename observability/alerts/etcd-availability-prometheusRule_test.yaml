  - series: 'etcd_network_peer_round_trip_time_seconds_bucket{instance="etcd-0",le="+Inf"}'
    values: "0+100x370"
  alert_rule_test:
  # Fast fires at 11m; medium and slow have not yet fired
  - eval_time: 11m
    alertname: userJourneyEtcdPeerRoundTripTimeHigh1h5m
    exp_alerts:
    - exp_labels:
        alertname: userJourneyEtcdPeerRoundTripTimeHigh1h5m
        severity: "3"
        long_window: 1h
        short_window: 5m
        instance: etcd-0
      exp_annotations:
        description: "etcd instance etcd-0 has 99th percentile peer round-trip time of 0.2048s (threshold: 100ms). Network latency between peers may be affecting cluster performance. Fast burn (1h/5m)."
        summary: "etcd peer round-trip time is high"
        runbook_url: TBD
  - eval_time: 11m
    alertname: userJourneyEtcdPeerRoundTripTimeHigh6h30m
    exp_alerts: []
  - eval_time: 11m
    alertname: userJourneyEtcdPeerRoundTripTimeHigh3d
    exp_alerts: []
  # Medium fires at 61m
  - eval_time: 61m
    alertname: userJourneyEtcdPeerRoundTripTimeHigh6h30m
    exp_alerts:
    - exp_labels:
        alertname: userJourneyEtcdPeerRoundTripTimeHigh6h30m
        severity: "3"
        long_window: 6h
        short_window: 30m
        instance: etcd-0
      exp_annotations:
        description: "etcd instance etcd-0 has 99th percentile peer round-trip time of 0.2048s (threshold: 100ms). Network latency between peers may be affecting cluster performance. Medium burn (6h/30m)."
        summary: "etcd peer round-trip time is high"
