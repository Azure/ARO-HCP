    values: "0+40x370"
  - series: 'etcd_network_peer_round_trip_time_seconds_bucket{instance="etcd-0",le="0.0256"}'
    values: "0+50x370"
  - series: 'etcd_network_peer_round_trip_time_seconds_bucket{instance="etcd-0",le="0.0512"}'
    values: "0+70x370"
  - series: 'etcd_network_peer_round_trip_time_seconds_bucket{instance="etcd-0",le="0.1024"}'
    values: "0+90x370"
  - series: 'etcd_network_peer_round_trip_time_seconds_bucket{instance="etcd-0",le="0.2048"}'
