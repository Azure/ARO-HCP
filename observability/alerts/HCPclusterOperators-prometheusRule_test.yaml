rule_files:
- HCPclusterOperators-prometheusRule.yaml
evaluation_interval: 1m
tests:
- interval: 1m
  input_series:
  # --- HCPClusterOperatorUnavailable scenarios ---
  # ingress Available=false, workers present -> FIRES
  - series: 'cluster_operator_conditions{cluster="mgmt-1", namespace="hcp-ingress-down", name="ingress", condition="available"}'
    values: "0+0x180"
  - series: 'node_collector_zone_size{cluster="mgmt-1", namespace="hcp-ingress-down", zone="z1"}'
    values: "3+0x180"
  # version Available=false, workers present -> does NOT fire (version excluded from per-operator alert)
  - series: 'cluster_operator_conditions{cluster="mgmt-1", namespace="hcp-version-avail0", name="version", condition="available"}'
    values: "0+0x180"
  - series: 'node_collector_zone_size{cluster="mgmt-1", namespace="hcp-version-avail0", zone="z1"}'
    values: "3+0x180"
  # console Available=false, workers present -> does NOT fire (console excluded)
  - series: 'cluster_operator_conditions{cluster="mgmt-1", namespace="hcp-console-down", name="console", condition="available"}'
    values: "0+0x180"
  - series: 'node_collector_zone_size{cluster="mgmt-1", namespace="hcp-console-down", zone="z1"}'
    values: "3+0x180"
  # ingress Available=false, NO worker nodes -> does NOT fire (worker gate)
  - series: 'cluster_operator_conditions{cluster="mgmt-1", namespace="hcp-noworker", name="ingress", condition="available"}'
    values: "0+0x180"
  # --- HCPClusterOperatorDegraded scenarios ---
  # storage Degraded=true, workers present -> FIRES
  - series: 'cluster_operator_conditions{cluster="mgmt-1", namespace="hcp-storage-degraded", name="storage", condition="degraded"}'
    values: "1+0x180"
  - series: 'node_collector_zone_size{cluster="mgmt-1", namespace="hcp-storage-degraded", zone="z1"}'
    values: "3+0x180"
  # console Degraded=true, workers present -> does NOT fire (console excluded)
  - series: 'cluster_operator_conditions{cluster="mgmt-1", namespace="hcp-console-degraded", name="console", condition="degraded"}'
    values: "1+0x180"
  - series: 'node_collector_zone_size{cluster="mgmt-1", namespace="hcp-console-degraded", zone="z1"}'
    values: "3+0x180"
  # --- HCPClusterVersionFailing scenarios ---
  # version Failing, no other operator bad, NO worker nodes -> FIRES (alert has no worker gate)
  - series: 'cluster_operator_conditions{cluster="mgmt-1", namespace="hcp-version-only", name="version", condition="failing"}'
    values: "1+0x180"
  # version Failing + ingress Available=false -> version SUPPRESSED (ingress explains it); Unavailable fires instead
  - series: 'cluster_operator_conditions{cluster="mgmt-1", namespace="hcp-version-and-ingress", name="version", condition="failing"}'
    values: "1+0x180"
  - series: 'cluster_operator_conditions{cluster="mgmt-1", namespace="hcp-version-and-ingress", name="ingress", condition="available"}'
    values: "0+0x180"
  - series: 'node_collector_zone_size{cluster="mgmt-1", namespace="hcp-version-and-ingress", zone="z1"}'
    values: "3+0x180"
  # version Failing + console Available=false only -> version SUPPRESSED (console in subtract set); Unavailable excludes console -> fires NOTHING
  - series: 'cluster_operator_conditions{cluster="mgmt-1", namespace="hcp-version-and-console", name="version", condition="failing"}'
    values: "1+0x180"
  - series: 'cluster_operator_conditions{cluster="mgmt-1", namespace="hcp-version-and-console", name="console", condition="available"}'
    values: "0+0x180"
  - series: 'node_collector_zone_size{cluster="mgmt-1", namespace="hcp-version-and-console", zone="z1"}'
    values: "3+0x180"
  alert_rule_test:
  # Unavailable: not yet (for: 30m)
  - eval_time: 20m
    alertname: HCPClusterOperatorUnavailable
    exp_alerts: []
  # Unavailable: fires for ingress-down and version-and-ingress (both ingress avail=0 w/ workers); excludes version/console; gated noworker
  - eval_time: 35m
    alertname: HCPClusterOperatorUnavailable
    exp_alerts:
    - exp_labels:
        severity: critical
        cluster: mgmt-1
        namespace: hcp-ingress-down
      exp_annotations:
        summary: "HCP cluster operator unavailable on hcp-ingress-down"
        description: "1 cluster operator(s) on hosted cluster hcp-ingress-down (management cluster mgmt-1) have been reporting Available=false for more than 30 minutes. The version and console operators are excluded from this alert; the affected cluster has worker nodes present. An unavailable operator means the component it manages is down, not merely degraded.\n"
        correlationId: 'HCPClusterOperatorUnavailable/mgmt-1/hcp-ingress-down'
        runbook_url: https://github.com/Azure/ARO-HCP/blob/main/docs/alerts/hcp-cluster-operators.md
    - exp_labels:
        severity: critical
        cluster: mgmt-1
        namespace: hcp-version-and-ingress
      exp_annotations:
        summary: "HCP cluster operator unavailable on hcp-version-and-ingress"
        description: "1 cluster operator(s) on hosted cluster hcp-version-and-ingress (management cluster mgmt-1) have been reporting Available=false for more than 30 minutes. The version and console operators are excluded from this alert; the affected cluster has worker nodes present. An unavailable operator means the component it manages is down, not merely degraded.\n"
        correlationId: 'HCPClusterOperatorUnavailable/mgmt-1/hcp-version-and-ingress'
        runbook_url: https://github.com/Azure/ARO-HCP/blob/main/docs/alerts/hcp-cluster-operators.md
  # VersionFailing: not yet (for: 1h)
  - eval_time: 45m
    alertname: HCPClusterVersionFailing
    exp_alerts: []
  # VersionFailing: fires only for version-only (no gate, so fires without workers); suppresses version-and-ingress and version-and-console
  - eval_time: 65m
    alertname: HCPClusterVersionFailing
    exp_alerts:
    - exp_labels:
        severity: warning
        cluster: mgmt-1
        namespace: hcp-version-only
      exp_annotations:
        summary: "HCP version operator failing on hcp-version-only"
        description: "The version operator (ClusterVersion) on hosted cluster hcp-version-only (management cluster mgmt-1) has been Failing for more than 1 hour while NO other cluster operator is unavailable or degraded. This points at a version-operator-specific failure -- payload image retrieval, release signature verification, an upgrade precondition, or a cluster-scoped manifest apply -- rather than a problem any individual component operator reports.\n"
        correlationId: 'HCPClusterVersionFailing/mgmt-1/hcp-version-only'
        runbook_url: https://github.com/Azure/ARO-HCP/blob/main/docs/alerts/hcp-cluster-operators.md
  # Degraded: not yet (for: 2h)
  - eval_time: 90m
    alertname: HCPClusterOperatorDegraded
    exp_alerts: []
  # Degraded: fires for storage-degraded; excludes console
  - eval_time: 125m
    alertname: HCPClusterOperatorDegraded
    exp_alerts:
    - exp_labels:
        severity: info
        cluster: mgmt-1
        namespace: hcp-storage-degraded
      exp_annotations:
        summary: "HCP cluster operator degraded on hcp-storage-degraded"
        description: "1 cluster operator(s) on hosted cluster hcp-storage-degraded (management cluster mgmt-1) have been reporting Degraded=true for more than 2 hours. The version and console operators are excluded from this alert; the affected cluster has worker nodes present. A degraded operator is reporting reduced quality of service.\n"
        correlationId: 'HCPClusterOperatorDegraded/mgmt-1/hcp-storage-degraded'
        runbook_url: https://github.com/Azure/ARO-HCP/blob/main/docs/alerts/hcp-cluster-operators.md
