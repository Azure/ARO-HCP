apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    app.kubernetes.io/name: kube-prometheus
    app.kubernetes.io/part-of: kube-prometheus
    prometheus: k8s
    role: alert-rules
  name: user-journey-cluster-upgrade-reach-partial-alerts
  namespace: monitoring
spec:
  groups:
  # Multi-window burn-rate alerts for cluster upgrade reach-partial SLO. Sev 4 (info).
  - name: rp-user-journey-cluster-upgrade-reach-partial-monitor-rules
    rules:
    - alert: userJourneyClusterUpgradeReachPartial1h5m
      expr: |
        hosted_control_plane_version:desired:stuck_over_20m:burnrate5m > 14.4
        and
        hosted_control_plane_version:desired:stuck_over_20m:burnrate1h > 14.4
      for: 5m
      labels:
        severity: info
        slo: cluster-upgrade-reach-partial
        short_window: 5m
        long_window: 1h
      annotations:
        summary: "[HCPUpgradeReachPartialBurn] {{ $labels.cluster }}"
        description: |
          More than 14.4x of the 99.95% cluster upgrade reach-partial error budget is being consumed. Cluster upgrades are stuck for over 20 minutes without the target version reaching partial. Partial is when the target version becomes active (recognized as active) on the HCP cluster; the upgrade is in progress but not yet complete. Investigate backend_cluster_version_info on affected clusters.
          Window: 1h/5m
          Management Cluster: {{ $labels.cluster }}
        runbook_url: https://aka.ms/arohcp-runbook-cluster-upgrade
        correlationId: "userJourneyClusterUpgradeReachPartial/{{ $labels.cluster }}"
    - alert: userJourneyClusterUpgradeReachPartial6h30m
      expr: |
        hosted_control_plane_version:desired:stuck_over_20m:burnrate30m > 6
        and
        hosted_control_plane_version:desired:stuck_over_20m:burnrate6h > 6
      for: 30m
      labels:
        severity: info
        slo: cluster-upgrade-reach-partial
        short_window: 30m
        long_window: 6h
      annotations:
        summary: "[HCPUpgradeReachPartialBurn] {{ $labels.cluster }}"
        description: |
          More than 6x of the 99.95% cluster upgrade reach-partial error budget is being consumed. Cluster upgrades are stuck for over 20 minutes without the target version reaching partial. Partial is when the target version becomes active (recognized as active) on the HCP cluster; the upgrade is in progress but not yet complete. Investigate backend_cluster_version_info on affected clusters.
          Window: 6h/30m
          Management Cluster: {{ $labels.cluster }}
        runbook_url: https://aka.ms/arohcp-runbook-cluster-upgrade
        correlationId: "userJourneyClusterUpgradeReachPartial/{{ $labels.cluster }}"
    - alert: userJourneyClusterUpgradeReachPartial3d6h
      expr: |
        hosted_control_plane_version:desired:stuck_over_20m:burnrate6h > 1
        and
        hosted_control_plane_version:desired:stuck_over_20m:burnrate3d > 1
      for: 30m
      labels:
        severity: info
        slo: cluster-upgrade-reach-partial
        short_window: 6h
        long_window: 3d
      annotations:
        summary: "[HCPUpgradeReachPartialBurn] {{ $labels.cluster }}"
        description: |
          Cluster upgrade reach-partial has been steadily consuming the 99.95% SLO error budget (1x burn). Cluster upgrades are stuck for over 20 minutes without reaching partial. Partial is when the target version becomes active (recognized as active) on the HCP cluster; the upgrade is in progress but not yet complete. Investigate backend_cluster_version_info on affected clusters.
          Window: 3d/6h
          Management Cluster: {{ $labels.cluster }}
        runbook_url: https://aka.ms/arohcp-runbook-cluster-upgrade
        correlationId: "userJourneyClusterUpgradeReachPartial/{{ $labels.cluster }}"
