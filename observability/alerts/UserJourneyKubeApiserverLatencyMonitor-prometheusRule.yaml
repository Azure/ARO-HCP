apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: userjourney-kubeapiserver-latency-alerts
  namespace: prometheus
spec:
  groups:
  - name: rp-userjourney-kas-latency-monitor-rules
    rules:
    - alert: userJourneyKubeApiserverLatency1h5m
      expr: |
        (
          (1 - kas:apiserver_request_latency:sli_ratio:rate5m)
          > (14.4 * (1 - 0.9995))
          and on (namespace, cluster)
          kas:apiserver_request_total:rate_avg_5m > 1
        )
        and on (namespace, cluster)
        (
          (1 - kas:apiserver_request_latency:sli_ratio:rate_avg_1h)
          > (14.4 * (1 - 0.9995))
          and on (namespace, cluster)
          kas:apiserver_request_total:rate_avg_1h > 1
        )
        and on (namespace, cluster)
        (sum by (namespace, cluster) (rate(apiserver_request_total{namespace=~"ocm-.*"}[5m] offset 15m)) > 0)
      # for: 2m, see error rate fast burn comment for rationale.
      for: 2m
      labels:
        long_window: 1h
        short_window: 5m
        severity: "3"
        slo: kas-latency
      annotations:
        summary: "[HCPKASLatencyBurn] {{ $labels.cluster }} / {{ $labels.namespace }} (1h/5m)"
        description: |
          Management Cluster: {{ $labels.cluster }}
          Namespace: {{ $labels.namespace }}
          Lookup: use hcpctl to map namespace to cluster resource ID.
        runbook_url: https://aka.ms/arohcp-runbook-ujkasavailable
        correlationId: "userJourneyKubeApiserverLatency/{{ $labels.cluster }}/{{ $labels.namespace }}"
    - alert: userJourneyKubeApiserverLatency6h30m
      expr: |
        (
          (1 - kas:apiserver_request_latency:sli_ratio:rate_avg_30m)
          > (6 * (1 - 0.9995))
          and on (namespace, cluster)
          kas:apiserver_request_total:rate_avg_30m > 1
        )
        and on (namespace, cluster)
        (
          (1 - kas:apiserver_request_latency:sli_ratio:rate_avg_6h)
          > (6 * (1 - 0.9995))
          and on (namespace, cluster)
          kas:apiserver_request_total:rate_avg_6h > 1
        )
        and on (namespace, cluster)
        (sum by (namespace, cluster) (rate(apiserver_request_total{namespace=~"ocm-.*"}[5m] offset 15m)) > 0)
      # for: 15m, see error rate fast burn comment for rationale.
      for: 15m
      labels:
        long_window: 6h
        short_window: 30m
        severity: "3"
        slo: kas-latency
      annotations:
        summary: "[HCPKASLatencyBurn] {{ $labels.cluster }} / {{ $labels.namespace }} (6h/30m)"
        description: |
          Management Cluster: {{ $labels.cluster }}
          Namespace: {{ $labels.namespace }}
          Lookup: use hcpctl to map namespace to cluster resource ID.
        runbook_url: https://aka.ms/arohcp-runbook-ujkasavailable
        correlationId: "userJourneyKubeApiserverLatency/{{ $labels.cluster }}/{{ $labels.namespace }}"
    - alert: userJourneyKubeApiserverLatency3d6h
      expr: |
        (
          (1 - kas:apiserver_request_latency:sli_ratio:rate_avg_6h)
          > (1 * (1 - 0.9995))
          and on (namespace, cluster)
          kas:apiserver_request_total:rate_avg_6h > 1
        )
        and on (namespace, cluster)
        (
          (1 - kas:apiserver_request_latency:sli_ratio:rate_avg_3d)
          > (1 * (1 - 0.9995))
          and on (namespace, cluster)
          kas:apiserver_request_total:rate_avg_3d > 1
        )
        and on (namespace, cluster)
        (sum by (namespace, cluster) (rate(apiserver_request_total{namespace=~"ocm-.*"}[5m] offset 15m)) > 0)
      # ADR-001 recommends slow tier = single 3d window, severity: "4".
      # This PR uses 3d/6h dual window and severity: "3" for consistency
      # with the existing availability slow tier on this branch. A follow-up
      # PR should align all KAS slow-burn alerts to ADR spec together.
      for: 1h
      labels:
        long_window: 3d
        short_window: 6h
        severity: "3"
        slo: kas-latency
      annotations:
        summary: "[HCPKASLatencyBurn] {{ $labels.cluster }} / {{ $labels.namespace }} (3d/6h)"
        description: |
          Management Cluster: {{ $labels.cluster }}
          Namespace: {{ $labels.namespace }}
          Lookup: use hcpctl to map namespace to cluster resource ID.
        runbook_url: https://aka.ms/arohcp-runbook-ujkasavailable
        correlationId: "userJourneyKubeApiserverLatency/{{ $labels.cluster }}/{{ $labels.namespace }}"
