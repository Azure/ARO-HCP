    values: "1+0x90"
  - series: 'backend_cluster_version_info{cluster="svc-1", resource_id="/sub/3/rg/g", subscription_id="sub-3", cluster_uuid="uuid-g", version="4.19.19", state="completed"}'
    values: "1+0x90"
