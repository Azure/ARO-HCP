    values: "1+0x90"
  - series: 'backend_cluster_version_info{cluster="svc-1", resource_id="/sub/3/rg/i", subscription_id="sub-3", cluster_uuid="uuid-i", version="4.19.20", state="partial"}'
    values: "1+0x90"
  - series: 'backend_cluster_version_info{cluster="svc-1", resource_id="/sub/3/rg/j", subscription_id="sub-3", cluster_uuid="uuid-j", version="4.19.19", state="completed"}'
    values: "1+0x90"
  - series: 'backend_cluster_version_info{cluster="svc-1", resource_id="/sub/3/rg/j", subscription_id="sub-3", cluster_uuid="uuid-j", version="4.19.20", state="partial"}'
    values: "1+0x90"
  promql_expr_test:
  - expr: hosted_control_plane_version:desired:stuck_over_20m:ratio{cluster="svc-1"}
    eval_time: 80m
    exp_samples:
    - labels: 'hosted_control_plane_version:desired:stuck_over_20m:ratio{cluster="svc-1"}'
      value: 0.2
  - expr: hosted_control_plane_version:desired:stuck_over_20m:burnrate5m{cluster="svc-1"}
    eval_time: 80m
    exp_samples:
    - labels: 'hosted_control_plane_version:desired:stuck_over_20m:burnrate5m{cluster="svc-1"}'
      value: 400
  - expr: hosted_control_plane_version:desired:stuck_over_20m:burnrate1h{cluster="svc-1"}
    eval_time: 80m
    exp_samples:
    - labels: 'hosted_control_plane_version:desired:stuck_over_20m:burnrate1h{cluster="svc-1"}'
      value: 400
  alert_rule_test:
  - eval_time: 80m
    alertname: userJourneyClusterUpgradeReachPartial1h5m
    exp_alerts:
    - exp_labels:
        cluster: "svc-1"
        severity: info
        slo: cluster-upgrade-reach-partial
        short_window: 5m
        long_window: 1h
      exp_annotations:
        summary: "[HCPUpgradeReachPartialBurn] svc-1"
        description: |
          More than 14.4x of the 99.95% cluster upgrade reach-partial error budget is being consumed. Cluster upgrades are stuck for over 20 minutes without the target version reaching partial. Partial is when the target version becomes active (recognized as active) on the HCP cluster; the upgrade is in progress but not yet complete. Investigate backend_cluster_version_info on affected clusters.
          Window: 1h/5m
          Management Cluster: svc-1
        runbook_url: "https://aka.ms/arohcp-runbook-cluster-upgrade"
        correlationId: "userJourneyClusterUpgradeReachPartial/svc-1"
  - eval_time: 80m
    alertname: userJourneyClusterUpgradeReachPartial6h30m
    exp_alerts:
    - exp_labels:
        cluster: "svc-1"
        severity: info
        slo: cluster-upgrade-reach-partial
        short_window: 30m
        long_window: 6h
      exp_annotations:
        summary: "[HCPUpgradeReachPartialBurn] svc-1"
        description: |
          More than 6x of the 99.95% cluster upgrade reach-partial error budget is being consumed. Cluster upgrades are stuck for over 20 minutes without the target version reaching partial. Partial is when the target version becomes active (recognized as active) on the HCP cluster; the upgrade is in progress but not yet complete. Investigate backend_cluster_version_info on affected clusters.
          Window: 6h/30m
          Management Cluster: svc-1
        runbook_url: "https://aka.ms/arohcp-runbook-cluster-upgrade"
        correlationId: "userJourneyClusterUpgradeReachPartial/svc-1"
  - eval_time: 80m
    alertname: userJourneyClusterUpgradeReachPartial3d6h
    exp_alerts:
    - exp_labels:
        cluster: "svc-1"
        severity: info
        slo: cluster-upgrade-reach-partial
        short_window: 6h
        long_window: 3d
      exp_annotations:
        summary: "[HCPUpgradeReachPartialBurn] svc-1"
        description: |
          Cluster upgrade reach-partial has been steadily consuming the 99.95% SLO error budget (1x burn). Cluster upgrades are stuck for over 20 minutes without reaching partial. Partial is when the target version becomes active (recognized as active) on the HCP cluster; the upgrade is in progress but not yet complete. Investigate backend_cluster_version_info on affected clusters.
          Window: 3d/6h
          Management Cluster: svc-1
        runbook_url: "https://aka.ms/arohcp-runbook-cluster-upgrade"
        correlationId: "userJourneyClusterUpgradeReachPartial/svc-1"
