    values: "1+0x90"
  - series: 'backend_cluster_version_info{cluster="svc-1", resource_id="/sub/3/rg/c", subscription_id="sub-3", cluster_uuid="uuid-c", version="4.19.20", state="partial"}'
    values: "1+0x90"
  - series: 'backend_cluster_version_info{cluster="svc-1", resource_id="/sub/3/rg/d", subscription_id="sub-3", cluster_uuid="uuid-d", version="4.19.19", state="completed"}'
    values: "1+0x90"
  - series: 'backend_cluster_version_info{cluster="svc-1", resource_id="/sub/3/rg/d", subscription_id="sub-3", cluster_uuid="uuid-d", version="4.19.20", state="partial"}'
    values: "1+0x90"
  - series: 'backend_cluster_version_info{cluster="svc-1", resource_id="/sub/3/rg/e", subscription_id="sub-3", cluster_uuid="uuid-e", version="4.19.19", state="completed"}'
    values: "1+0x90"
  - series: 'backend_cluster_version_info{cluster="svc-1", resource_id="/sub/3/rg/e", subscription_id="sub-3", cluster_uuid="uuid-e", version="4.19.20", state="partial"}'
    values: "1+0x90"
