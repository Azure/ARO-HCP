  - series: 'backend_cluster_version_info{cluster="svc-1", resource_id="/sub/3/rg/a", subscription_id="sub-3", cluster_uuid="uuid-a", version="4.19.22", state="desired"}'
    values: "1+0x90"
  - series: 'backend_cluster_version_info{cluster="svc-1", resource_id="/sub/3/rg/b", subscription_id="sub-3", cluster_uuid="uuid-b", version="4.19.20", state="completed"}'
    values: "1+0x90"
  - series: 'backend_cluster_version_info{cluster="svc-1", resource_id="/sub/3/rg/b", subscription_id="sub-3", cluster_uuid="uuid-b", version="4.19.22", state="desired"}'
    values: "1+0x90"
