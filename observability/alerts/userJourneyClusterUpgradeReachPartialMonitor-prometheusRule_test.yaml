rule_files:
- userJourneyClusterUpgradeRecord-prometheusRule.yaml
- userJourneyClusterUpgradeReachPartialMonitor-prometheusRule.yaml
evaluation_interval: 1m
tests:
# ========================================
# Test 1: Successful reach partial — no alert
# ========================================
- interval: 1m
  input_series:
  - series: 'backend_cluster_version_info{cluster="svc-1", resource_id="/sub/1/rg/c1", subscription_id="sub-1", cluster_uuid="uuid-1", version="4.19.19", state="completed"}'
    values: "1+0x40"
  - series: 'backend_cluster_version_info{cluster="svc-1", resource_id="/sub/1/rg/c1", subscription_id="sub-1", cluster_uuid="uuid-1", version="4.19.20", state="desired"}'
    values: "1x10 0x25"
  - series: 'backend_cluster_version_info{cluster="svc-1", resource_id="/sub/1/rg/c1", subscription_id="sub-1", cluster_uuid="uuid-1", version="4.19.20", state="partial"}'
    values: "0x10 1x25"
  alert_rule_test:
  - eval_time: 40m
    alertname: userJourneyClusterUpgradeReachPartial1h5m
  - eval_time: 40m
    alertname: userJourneyClusterUpgradeReachPartial6h30m
  - eval_time: 40m
    alertname: userJourneyClusterUpgradeReachPartial3d6h
# ========================================
# Test 2: Fast burn — 2 of 10 in-flight upgrades stuck in desired >20m → 5m+1h alert fires
# Eval at 80m: ratio has been 0.2 since minute 20 (all 10 in flight, 8 healthy in partial).
# ========================================
- interval: 1m
  input_series:
  - series: 'backend_cluster_version_info{cluster="svc-1", resource_id="/sub/3/rg/a", subscription_id="sub-3", cluster_uuid="uuid-a", version="4.19.20", state="completed"}'
