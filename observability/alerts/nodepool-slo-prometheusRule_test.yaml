rule_files:
- nodepool-slo-prometheusRule.yaml
evaluation_interval: 1m
tests:
# ========================================
# Test 1: Normal operation — all operations succeeded, no alerts
# ========================================
# 10 node pool operations in "succeeded" phase, 0 in "failed".
# Error rate = 0%, well below 95% SLO. No alerts should fire.
- interval: 1m
  input_series:
  # 10 succeeded operations (each series = 1 operation gauge)
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/1/np/a", subscription_id="sub-1", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="succeeded", cluster="mgmt-1"}'
    values: "1+0x70"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/1/np/b", subscription_id="sub-1", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="succeeded", cluster="mgmt-1"}'
    values: "1+0x70"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/1/np/c", subscription_id="sub-1", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="delete", phase="succeeded", cluster="mgmt-1"}'
    values: "1+0x70"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/1/np/d", subscription_id="sub-1", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="succeeded", cluster="mgmt-1"}'
    values: "1+0x70"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/1/np/e", subscription_id="sub-1", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="succeeded", cluster="mgmt-1"}'
    values: "1+0x70"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/1/np/f", subscription_id="sub-1", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="succeeded", cluster="mgmt-1"}'
    values: "1+0x70"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/1/np/g", subscription_id="sub-1", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="delete", phase="succeeded", cluster="mgmt-1"}'
    values: "1+0x70"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/1/np/h", subscription_id="sub-1", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="succeeded", cluster="mgmt-1"}'
    values: "1+0x70"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/1/np/i", subscription_id="sub-1", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="succeeded", cluster="mgmt-1"}'
    values: "1+0x70"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/1/np/j", subscription_id="sub-1", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="succeeded", cluster="mgmt-1"}'
    values: "1+0x70"
  promql_expr_test:
  - expr: errors:backend_nodepool_operation:succeeded_total
    eval_time: 10m
    exp_samples:
    - labels: 'errors:backend_nodepool_operation:succeeded_total{cluster="mgmt-1"}'
      value: 10
  - expr: errors:backend_nodepool_operation:terminal_total
    eval_time: 10m
    exp_samples:
    - labels: 'errors:backend_nodepool_operation:terminal_total{cluster="mgmt-1"}'
      value: 10
  - expr: errors:backend_nodepool_operation:error_rate
    eval_time: 10m
    exp_samples:
    - labels: 'errors:backend_nodepool_operation:error_rate{cluster="mgmt-1"}'
      value: 0
  alert_rule_test:
  - eval_time: 10m
    alertname: UJNodePoolErrors1h5m
  - eval_time: 10m
    alertname: UJNodePoolErrors6h30m
  - eval_time: 10m
    alertname: UJNodePoolErrors3d
  - eval_time: 10m
    alertname: UJNodePoolErrorsDegradation
# ========================================
# Test 2: Fast burn — 80% failure rate, UJNodePoolErrors1h5m fires
# ========================================
# 2 succeeded, 8 failed → error rate = 80% > 72% threshold (14.4x burn)
# Both UJNodePoolErrors1h5m and UJNodePoolErrorsDegradation should fire.
- interval: 1m
  input_series:
  # 2 succeeded
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/1/np/a", subscription_id="sub-1", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="succeeded", cluster="mgmt-1"}'
    values: "1+0x40"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/1/np/b", subscription_id="sub-1", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="delete", phase="succeeded", cluster="mgmt-1"}'
    values: "1+0x40"
  # 8 failed
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/1/np/c", subscription_id="sub-1", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="failed", cluster="mgmt-1"}'
    values: "1+0x40"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/1/np/d", subscription_id="sub-1", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="failed", cluster="mgmt-1"}'
    values: "1+0x40"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/1/np/e", subscription_id="sub-1", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="failed", cluster="mgmt-1"}'
    values: "1+0x40"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/1/np/f", subscription_id="sub-1", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="delete", phase="failed", cluster="mgmt-1"}'
    values: "1+0x40"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/1/np/g", subscription_id="sub-1", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="failed", cluster="mgmt-1"}'
    values: "1+0x40"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/1/np/h", subscription_id="sub-1", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="failed", cluster="mgmt-1"}'
    values: "1+0x40"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/1/np/i", subscription_id="sub-1", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="failed", cluster="mgmt-1"}'
    values: "1+0x40"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/1/np/j", subscription_id="sub-1", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="failed", cluster="mgmt-1"}'
    values: "1+0x40"
  promql_expr_test:
  - expr: errors:backend_nodepool_operation:error_rate
    eval_time: 10m
    exp_samples:
    - labels: 'errors:backend_nodepool_operation:error_rate{cluster="mgmt-1"}'
      value: 0.8
  alert_rule_test:
  # Fast burn fires after 5m 'for' duration
  - eval_time: 7m
    alertname: UJNodePoolErrors1h5m
    exp_alerts:
    - exp_labels:
        cluster: "mgmt-1"
        severity: info
        slo: nodepool-errors
        long_window: 1h
        short_window: 5m
      exp_annotations:
        summary: "mgmt-1: Node Pool operation error rate critically high (>72%)"
        description: "More than 72% of node pool operations are in failed state, indicating a fast error budget burn (14.4x) that would exhaust the 95% SLO budget in ~12 hours."
        runbook_url: "aka.ms/arohcp-runbook-nodepool"
  # Degradation also fires (15% threshold met at 80%)
  - eval_time: 35m
    alertname: UJNodePoolErrorsDegradation
    exp_alerts:
    - exp_labels:
        cluster: "mgmt-1"
        severity: info
        slo: nodepool-errors
      exp_annotations:
        summary: "mgmt-1: Node Pool operation failure rate exceeds 15% for 30 minutes"
        description: "The node pool operation failure rate has been above 15% for 30 minutes. This provides early warning of degradation before SLO-based burn rate alerts fire."
        runbook_url: "aka.ms/arohcp-runbook-nodepool"
# ========================================
# Test 3: Degradation — 20% failure rate, only degradation alert fires
# ========================================
# 8 succeeded, 2 failed → error rate = 20%
# > 15% (degradation) but < 30% (medium burn) and < 72% (fast burn)
- interval: 1m
  input_series:
  # 8 succeeded
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/2/np/a", subscription_id="sub-2", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="succeeded", cluster="mgmt-1"}'
    values: "1+0x40"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/2/np/b", subscription_id="sub-2", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="succeeded", cluster="mgmt-1"}'
    values: "1+0x40"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/2/np/c", subscription_id="sub-2", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="delete", phase="succeeded", cluster="mgmt-1"}'
    values: "1+0x40"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/2/np/d", subscription_id="sub-2", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="succeeded", cluster="mgmt-1"}'
    values: "1+0x40"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/2/np/e", subscription_id="sub-2", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="succeeded", cluster="mgmt-1"}'
    values: "1+0x40"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/2/np/f", subscription_id="sub-2", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="succeeded", cluster="mgmt-1"}'
    values: "1+0x40"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/2/np/g", subscription_id="sub-2", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="succeeded", cluster="mgmt-1"}'
    values: "1+0x40"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/2/np/h", subscription_id="sub-2", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="succeeded", cluster="mgmt-1"}'
    values: "1+0x40"
  # 2 failed
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/2/np/i", subscription_id="sub-2", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="failed", cluster="mgmt-1"}'
    values: "1+0x40"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/2/np/j", subscription_id="sub-2", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="delete", phase="failed", cluster="mgmt-1"}'
    values: "1+0x40"
  promql_expr_test:
  - expr: errors:backend_nodepool_operation:error_rate
    eval_time: 10m
    exp_samples:
    - labels: 'errors:backend_nodepool_operation:error_rate{cluster="mgmt-1"}'
      value: 0.2
  alert_rule_test:
  # Fast burn should NOT fire (20% < 72%)
  - eval_time: 10m
    alertname: UJNodePoolErrors1h5m
  # Degradation fires after 30m (20% > 15%)
  - eval_time: 35m
    alertname: UJNodePoolErrorsDegradation
    exp_alerts:
    - exp_labels:
        cluster: "mgmt-1"
        severity: info
        slo: nodepool-errors
      exp_annotations:
        summary: "mgmt-1: Node Pool operation failure rate exceeds 15% for 30 minutes"
        description: "The node pool operation failure rate has been above 15% for 30 minutes. This provides early warning of degradation before SLO-based burn rate alerts fire."
        runbook_url: "aka.ms/arohcp-runbook-nodepool"
# ========================================
# Test 4: Stuck operation — operation in "updating" for > 2 hours
# ========================================
# start_time is 0 (epoch). At eval_time=150m (9000s), delta = 9000 > 7200 threshold.
# The alert has for: 15m, so it fires after the threshold is crossed for 15 minutes.
# Threshold crossed at 120m, plus 15m for duration = 135m. Eval at 150m confirms firing.
- interval: 1m
  input_series:
  - series: 'backend_resource_operation_start_time_seconds{resource_id="/sub/3/np/stuck", subscription_id="sub-3", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="updating", cluster="mgmt-1"}'
    values: "0+0x155"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/3/np/stuck", subscription_id="sub-3", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="updating", cluster="mgmt-1"}'
    values: "1+0x155"
  alert_rule_test:
  # At 150m (9000s), time() - 0 = 9000 > 7200, and for: 15m is satisfied
  - eval_time: 150m
    alertname: UJNodePoolStuckOperation
    exp_alerts:
    - exp_labels:
        resource_id: "/sub/3/np/stuck"
        subscription_id: "sub-3"
        resource_type: "microsoft.redhatopenshift/hcpopenshiftclusters/nodepools"
        operation_type: "update"
        phase: "updating"
        cluster: "mgmt-1"
        severity: info
      exp_annotations:
        summary: "mgmt-1: Node Pool operation stuck in updating for over 2 hours"
        description: "Node pool operation for /sub/3/np/stuck has been in updating phase for over 2 hours. Stuck operations are invisible to success/failure SLIs and require investigation."
        runbook_url: "aka.ms/arohcp-runbook-nodepool"
# ========================================
# Test 5: No stuck operation — operation in "updating" for < 2 hours
# ========================================
# Operation started recently, should not trigger stuck alert.
- interval: 1m
  input_series:
  # start_time=600 (recent). At eval_time=90m, time()=5400. delta=4800 < 7200.
  - series: 'backend_resource_operation_start_time_seconds{resource_id="/sub/4/np/recent", subscription_id="sub-4", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="updating", cluster="mgmt-1"}'
    values: "600+0x95"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/4/np/recent", subscription_id="sub-4", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="updating", cluster="mgmt-1"}'
    values: "1+0x95"
  alert_rule_test:
  - eval_time: 90m
    alertname: UJNodePoolStuckOperation
# ========================================
# Test 6: Zero failure rate — all succeeded, no alerts
# ========================================
# 5 succeeded, 0 failed → error rate = 0%
# No alerts should fire (well below all thresholds).
- interval: 1m
  input_series:
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/5/np/a", subscription_id="sub-5", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="succeeded", cluster="mgmt-1"}'
    values: "1+0x15"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/5/np/b", subscription_id="sub-5", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="succeeded", cluster="mgmt-1"}'
    values: "1+0x15"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/5/np/c", subscription_id="sub-5", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="succeeded", cluster="mgmt-1"}'
    values: "1+0x15"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/5/np/d", subscription_id="sub-5", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="succeeded", cluster="mgmt-1"}'
    values: "1+0x15"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/5/np/e", subscription_id="sub-5", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="succeeded", cluster="mgmt-1"}'
    values: "1+0x15"
  alert_rule_test:
  - eval_time: 10m
    alertname: UJNodePoolErrors1h5m
  - eval_time: 10m
    alertname: UJNodePoolErrors6h30m
  - eval_time: 10m
    alertname: UJNodePoolErrorsDegradation
# ========================================
# Test 7: Queue depth — workqueue depth exceeds threshold
# ========================================
- interval: 1m
  input_series:
  - series: 'workqueue_depth{namespace="aro-hcp", name="OperationNodePoolUpdate", cluster="mgmt-1"}'
    values: "15+0x10"
  alert_rule_test:
  - eval_time: 7m
    alertname: UJNodePoolSaturationQueueDepth
    exp_alerts:
    - exp_labels:
        name: "OperationNodePoolUpdate"
        cluster: "mgmt-1"
        severity: info
      exp_annotations:
        summary: "mgmt-1: Node Pool controller workqueue OperationNodePoolUpdate depth is high"
        description: "Node pool controller workqueue OperationNodePoolUpdate has had a depth > 10 for more than 5 minutes, indicating work is accumulating faster than it can be processed."
        runbook_url: "aka.ms/arohcp-runbook-nodepool"
# ========================================
# Test 8: Queue depth normal — below threshold, no alert
# ========================================
- interval: 1m
  input_series:
  - series: 'workqueue_depth{namespace="aro-hcp", name="OperationNodePoolUpdate", cluster="mgmt-1"}'
    values: "5+0x10"
  alert_rule_test:
  - eval_time: 7m
    alertname: UJNodePoolSaturationQueueDepth
# ========================================
# Test 9: Retry hot loop — retry ratio > 50%
# ========================================
- interval: 1m
  input_series:
  - series: 'workqueue_retries_total{namespace="aro-hcp", name="OperationNodePoolUpdate", cluster="mgmt-1"}'
    values: "0+80x25"
  - series: 'workqueue_adds_total{namespace="aro-hcp", name="OperationNodePoolUpdate", cluster="mgmt-1"}'
    values: "0+100x25"
  alert_rule_test:
  - eval_time: 22m
    alertname: UJNodePoolSaturationRetryHotLoop
    exp_alerts:
    - exp_labels:
        name: "OperationNodePoolUpdate"
        cluster: "mgmt-1"
        severity: info
      exp_annotations:
        summary: "mgmt-1: Node Pool controller workqueue OperationNodePoolUpdate retry hot loop"
        description: "Node pool controller workqueue OperationNodePoolUpdate has a retry ratio > 50% sustained over 10 minutes, indicating most queue activity is failed retries rather than fresh work."
        runbook_url: "aka.ms/arohcp-runbook-nodepool"
# ========================================
# Test 10: Retry hot loop — low retry ratio, no alert
# ========================================
- interval: 1m
  input_series:
  - series: 'workqueue_retries_total{namespace="aro-hcp", name="OperationNodePoolUpdate", cluster="mgmt-1"}'
    values: "0+10x25"
  - series: 'workqueue_adds_total{namespace="aro-hcp", name="OperationNodePoolUpdate", cluster="mgmt-1"}'
    values: "0+100x25"
  alert_rule_test:
  - eval_time: 22m
    alertname: UJNodePoolSaturationRetryHotLoop
# ========================================
# Test 11: Mixed operation types — update and delete both tracked
# ========================================
# Verifies both update and delete operations are captured by the regex filter.
# 3 succeeded updates, 2 succeeded deletes, 3 failed updates, 2 failed deletes
# → error rate = 5/10 = 50%
- interval: 1m
  input_series:
  # 3 succeeded updates
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/6/np/a", subscription_id="sub-6", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="succeeded", cluster="mgmt-1"}'
    values: "1+0x40"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/6/np/b", subscription_id="sub-6", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="succeeded", cluster="mgmt-1"}'
    values: "1+0x40"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/6/np/c", subscription_id="sub-6", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="succeeded", cluster="mgmt-1"}'
    values: "1+0x40"
  # 2 succeeded deletes
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/6/np/d", subscription_id="sub-6", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="delete", phase="succeeded", cluster="mgmt-1"}'
    values: "1+0x40"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/6/np/e", subscription_id="sub-6", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="delete", phase="succeeded", cluster="mgmt-1"}'
    values: "1+0x40"
  # 3 failed updates
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/6/np/f", subscription_id="sub-6", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="failed", cluster="mgmt-1"}'
    values: "1+0x40"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/6/np/g", subscription_id="sub-6", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="failed", cluster="mgmt-1"}'
    values: "1+0x40"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/6/np/h", subscription_id="sub-6", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="update", phase="failed", cluster="mgmt-1"}'
    values: "1+0x40"
  # 2 failed deletes
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/6/np/i", subscription_id="sub-6", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="delete", phase="failed", cluster="mgmt-1"}'
    values: "1+0x40"
  - series: 'backend_resource_operation_phase_info{resource_id="/sub/6/np/j", subscription_id="sub-6", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="delete", phase="failed", cluster="mgmt-1"}'
    values: "1+0x40"
  promql_expr_test:
  - expr: errors:backend_nodepool_operation:error_rate
    eval_time: 10m
    exp_samples:
    - labels: 'errors:backend_nodepool_operation:error_rate{cluster="mgmt-1"}'
      value: 0.5
  - expr: errors:backend_nodepool_operation:succeeded_total
    eval_time: 10m
    exp_samples:
    - labels: 'errors:backend_nodepool_operation:succeeded_total{cluster="mgmt-1"}'
      value: 5
  - expr: errors:backend_nodepool_operation:terminal_total
    eval_time: 10m
    exp_samples:
    - labels: 'errors:backend_nodepool_operation:terminal_total{cluster="mgmt-1"}'
      value: 10
  alert_rule_test:
  # 50% > 30% → medium burn fires after 30m
  - eval_time: 35m
    alertname: UJNodePoolErrors6h30m
    exp_alerts:
    - exp_labels:
        cluster: "mgmt-1"
        severity: info
        slo: nodepool-errors
        long_window: 6h
        short_window: 30m
      exp_annotations:
        summary: "mgmt-1: Node Pool operation error rate elevated (>30%) for 30+ minutes"
        description: "More than 30% of node pool operations are in failed state sustained over 30 minutes, indicating a medium error budget burn (6x) that would exhaust the 95% SLO budget in ~28 hours."
        runbook_url: "aka.ms/arohcp-runbook-nodepool"
  # 50% < 72% → fast burn should NOT fire
  - eval_time: 35m
    alertname: UJNodePoolErrors1h5m
# ========================================
# Test 12: Stuck delete operation
# ========================================
# Verifies that delete operations stuck for >2h also trigger the alert.
- interval: 1m
  input_series:
  - series: 'backend_resource_operation_start_time_seconds{resource_id="/sub/7/np/stuck-del", subscription_id="sub-7", resource_type="microsoft.redhatopenshift/hcpopenshiftclusters/nodepools", operation_type="delete", phase="deleting", cluster="mgmt-1"}'
    values: "0+0x155"
