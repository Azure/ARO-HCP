rule_files:
- arobit-prometheusRule.yaml
evaluation_interval: 1m
tests:
# ArobitForwarderJobUp - alert fires
- interval: 1m
  input_series:
  - series: 'up{job="kube-state-metrics",cluster="test"}'
    values: "1+0x15"
  - series: 'up{job="arobit-forwarder",namespace="arobit",cluster="test"}'
    values: "0+0x15"
  alert_rule_test:
  - eval_time: 15m
    alertname: ArobitForwarderJobUp
    exp_alerts:
    - exp_labels:
        alertname: ArobitForwarderJobUp
        severity: warning
        cluster: test
      exp_annotations:
        description: |
          The Arobit forwarder metrics endpoint on cluster test has been unreachable for 15 minutes.
        runbook_url: https://eng.ms/docs/cloud-ai-platform/azure-core/azure-cloud-native-and-management-platform/control-plane-bburns/azure-red-hat-openshift/azure-redhat-openshift-team-doc/hcp/troubleshooting/arobit.html
        summary: Arobit forwarder metrics endpoint is unreachable on cluster test.
# FluentBitIngestionPaused - alert fires
- interval: 1m
  input_series:
  - series: 'fluentbit_input_ingestion_paused{pod="arobit-paused",cluster="test"}'
    values: "1+0x10"
  alert_rule_test:
  - eval_time: 5m
    alertname: FluentBitIngestionPaused
    exp_alerts:
    - exp_labels:
        alertname: FluentBitIngestionPaused
        severity: warning
        cluster: test
        pod: arobit-paused
      exp_annotations:
        runbook_url: https://eng.ms/docs/cloud-ai-platform/azure-core/azure-cloud-native-and-management-platform/control-plane-bburns/azure-red-hat-openshift/azure-redhat-openshift-team-doc/hcp/troubleshooting/arobit.html
        description: |
          Fluent Bit pod arobit-paused on cluster test has paused collecting new log data for at least 5 minutes.
          Ingestion pauses when Fluent Bit's internal memory or storage buffers are full, typically caused by backpressure from a slow or failing output.
          Investigate the Fluent Bit logs for the specific error details and check the Kusto instance health.
        summary: Fluent Bit input ingestion paused due to backpressure.
# FluentBitIngestionPaused - healthy pod, no alert
- interval: 1m
  input_series:
  - series: 'fluentbit_input_ingestion_paused{pod="arobit-ok",cluster="test"}'
    values: "0+0x10"
  alert_rule_test:
  - eval_time: 5m
    alertname: FluentBitIngestionPaused
    exp_alerts: []
# FluentBitHighOutputRetries - alert fires for azure_kusto
- interval: 1m
  input_series:
  - series: 'fluentbit_output_retries_total{pod="arobit-retrying",cluster="test",name="azure_kusto.0"}'
    values: "0+1000x15"
  alert_rule_test:
  - eval_time: 10m
    alertname: FluentBitHighOutputRetries
    exp_alerts:
    - exp_labels:
        alertname: FluentBitHighOutputRetries
        severity: warning
        cluster: test
        pod: arobit-retrying
      exp_annotations:
        runbook_url: https://eng.ms/docs/cloud-ai-platform/azure-core/azure-cloud-native-and-management-platform/control-plane-bburns/azure-red-hat-openshift/azure-redhat-openshift-team-doc/hcp/troubleshooting/arobit.html
        description: |
          Fluent Bit pod arobit-retrying on cluster test is retrying chunk delivery.
          Retries occur when the azure_kusto output encounters a recoverable error (e.g. transient network failure, HTTP 429/5xx from Kusto).
          Investigate the Fluent Bit logs for the specific error details and check the Kusto instance health.
        summary: High Kusto output retries
# FluentBitHighOutputRetries - low retries, no alert
- interval: 1m
  input_series:
  - series: 'fluentbit_output_retries_total{pod="arobit-few-retries",cluster="test",name="azure_kusto.0"}'
    values: "0+1x10"
  alert_rule_test:
  - eval_time: 6m
    alertname: FluentBitHighOutputRetries
    exp_alerts: []
# FluentBitHighOutputRetries - non-kusto output retrying, no alert
- interval: 1m
  input_series:
  - series: 'fluentbit_output_retries_total{pod="arobit-other-retries",cluster="test",name="null.0"}'
    values: "0+1000x15"
  alert_rule_test:
  - eval_time: 10m
    alertname: FluentBitHighOutputRetries
    exp_alerts: []
# FluentBitOutputErrors - alert fires for azure_kusto
- interval: 1m
  input_series:
  - series: 'fluentbit_output_errors_total{pod="arobit-errors",cluster="test",name="azure_kusto.0"}'
    values: "0+100x15"
  alert_rule_test:
  - eval_time: 10m
    alertname: FluentBitOutputErrors
    exp_alerts:
    - exp_labels:
        alertname: FluentBitOutputErrors
        severity: warning
        cluster: test
        pod: arobit-errors
      exp_annotations:
        runbook_url: https://eng.ms/docs/cloud-ai-platform/azure-core/azure-cloud-native-and-management-platform/control-plane-bburns/azure-red-hat-openshift/azure-redhat-openshift-team-doc/hcp/troubleshooting/arobit.html
        description: |
          Fluent Bit pod arobit-errors on cluster test is encountering errors sending log chunks to Kusto.
          Investigate the Fluent Bit logs for the specific error details and check the Kusto instance health.
        summary: Unrecoverable Kusto output errors - log data is being dropped.
# FluentBitOutputErrors - no errors, no alert
- interval: 1m
  input_series:
  - series: 'fluentbit_output_errors_total{pod="arobit-no-errors",cluster="test",name="azure_kusto.0"}'
    values: "0+0x15"
  alert_rule_test:
  - eval_time: 10m
    alertname: FluentBitOutputErrors
    exp_alerts: []
# FluentBitOutputErrors - non-kusto output errors, no alert
- interval: 1m
  input_series:
  - series: 'fluentbit_output_errors_total{pod="arobit-other-errors",cluster="test",name="stdout.0"}'
    values: "0+100x15"
  alert_rule_test:
  - eval_time: 10m
    alertname: FluentBitOutputErrors
    exp_alerts: []
# FluentBitOutputRetriesExhausted - alert fires for azure_kusto
- interval: 1m
  input_series:
  - series: 'fluentbit_output_retries_failed_total{pod="arobit-exhausted",cluster="test",name="azure_kusto.0"}'
    values: "0+100x15"
  alert_rule_test:
  - eval_time: 10m
    alertname: FluentBitOutputRetriesExhausted
    exp_alerts:
    - exp_labels:
        alertname: FluentBitOutputRetriesExhausted
        severity: warning
        cluster: test
        pod: arobit-exhausted
      exp_annotations:
        runbook_url: https://eng.ms/docs/cloud-ai-platform/azure-core/azure-cloud-native-and-management-platform/control-plane-bburns/azure-red-hat-openshift/azure-redhat-openshift-team-doc/hcp/troubleshooting/arobit.html
        description: |
          Fluent Bit pod arobit-exhausted on cluster test has chunks that exceeded the configured Retry_Limit for the Kusto output.
          Investigate the Fluent Bit logs for the specific error details and check the Kusto instance health.
        summary: Kusto output retries exhausted - chunks discarded after max retries.
# FluentBitOutputRetriesExhausted - no failed retries, no alert
- interval: 1m
  input_series:
  - series: 'fluentbit_output_retries_failed_total{pod="arobit-no-exhaust",cluster="test",name="azure_kusto.0"}'
    values: "0+0x15"
  alert_rule_test:
  - eval_time: 10m
    alertname: FluentBitOutputRetriesExhausted
    exp_alerts: []
