rule_files:
- leaderelection-prometheusRule.yaml
evaluation_interval: 1m
tests:
# Test: LeaderElectionLeaseStale fires when lease has not been renewed for >15m (10m expr threshold + 5m for:)
- interval: 1m
  input_series:
  - series: 'kube_lease_renew_time{namespace="mgmt-agent", lease="mgmt-agent-controller-leader", cluster="test-cluster"}'
    values: "0x20" # renewTime frozen
  alert_rule_test:
  - eval_time: 16m
    alertname: LeaderElectionLeaseStale
    exp_alerts:
    - exp_labels:
        severity: warning
        cluster: test-cluster
        lease: mgmt-agent-controller-leader
        namespace: mgmt-agent
      exp_annotations:
        description: 'Leader election lease mgmt-agent-controller-leader in namespace mgmt-agent on cluster test-cluster has not been renewed for more than 15 minutes. The leadership election might be broken or the component stopped running.'
        runbook_url: 'TBD'
        summary: 'Leader election lease mgmt-agent-controller-leader in mgmt-agent on test-cluster stale for more than 15 minutes'
        title: 'Leader election lease mgmt-agent-controller-leader in mgmt-agent on test-cluster stale for more than 15 minutes'
# Test: LeaderElectionLeaseStale does not fire when lease is renewed every minute
- interval: 1m
  input_series:
  - series: 'kube_lease_renew_time{namespace="mgmt-agent", lease="mgmt-agent-controller-leader", cluster="test-cluster"}'
    values: "0+60x20" # renewTime advances 60s/min — diff always 0
  alert_rule_test:
  - eval_time: 16m
    alertname: LeaderElectionLeaseStale
    exp_alerts: []
# Test: LeaderElectionLeaseStale does not fire for excluded system namespaces
- interval: 1m
  input_series:
  - series: 'kube_lease_renew_time{namespace="kube-system", lease="kube-controller-manager", cluster="test-cluster"}'
    values: "0x20" # stale, but namespace excluded
  alert_rule_test:
  - eval_time: 16m
    alertname: LeaderElectionLeaseStale
    exp_alerts: []
# Test: LeaderElectionLeaseStaleFast fires when lease has not been renewed for >6m (3m expr threshold + 3m for:) for a lease in an included namespace
# Note: expr uses strict >, so condition first becomes true at t=4m (240s > 180s); with for:3m, alert fires at t=7m
- interval: 1m
  input_series:
  - series: 'kube_lease_renew_time{namespace="kube-applier", lease="kube-applier", cluster="test-cluster"}'
    values: "0x7"
  alert_rule_test:
  - eval_time: 7m
    alertname: LeaderElectionLeaseStaleFast
    exp_alerts:
    - exp_labels:
        severity: warning
        cluster: test-cluster
        lease: kube-applier
        namespace: kube-applier
      exp_annotations:
        description: 'Leader election lease kube-applier in namespace kube-applier on cluster test-cluster has not been renewed for more than 6 minutes. The leadership election might be broken or the component stopped running.'
        runbook_url: 'TBD'
        summary: 'Leader election lease kube-applier in namespace kube-applier on cluster test-cluster stale for more than 6 minutes'
        title: 'Leader election lease kube-applier in namespace kube-applier on cluster test-cluster stale for more than 6 minutes'
# Test: LeaderElectionLeaseStaleFast does not fire when lease is renewed every minute for a lease in an included namespace
- interval: 1m
  input_series:
  - series: 'kube_lease_renew_time{namespace="kube-applier", lease="kube-applier", cluster="test-cluster"}'
    values: "0+60x7" # renewTime advances 60s/min — diff always 0
  alert_rule_test:
  - eval_time: 7m
    alertname: LeaderElectionLeaseStaleFast
    exp_alerts: []
# Test: LeaderElectionLeaseStaleFast does not fire for a lease in a namespace that is not explicitly included in the rule
- interval: 1m
  input_series:
  - series: 'kube_lease_renew_time{namespace="kube-system", lease="kube-controller-manager", cluster="test-cluster"}'
    values: "0x25" # stale, but namespace not included
  alert_rule_test:
  - eval_time: 3m
    alertname: LeaderElectionLeaseStaleFast
    exp_alerts: []
