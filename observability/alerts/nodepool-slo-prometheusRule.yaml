apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    app.kubernetes.io/name: kube-prometheus
    app.kubernetes.io/part-of: kube-prometheus
    prometheus: k8s
    role: alert-rules
  name: nodepool-slo-rules
  namespace: monitoring
spec:
  groups:
  # ========================================
  # Node Pool SLO Recording Rules
  # ========================================
  # These rules track the Errors SLO for Node Pool operations.
  # SLO: 95% of node pool operations should succeed (not reach "failed" terminal phase)
  # Error Budget: 5% (1 - 0.95)
  #
  # Metrics are gauge-based (backend_resource_operation_phase_info) from Cosmos DB,
  # so we use count() aggregations rather than rate() on counters.
  #
  # Scope: covers node pool update and delete operations.
  # Node pool creation has its own SLI/SLO work tracked in ARO-26179 (owner: Rael).
  - name: arohcp_nodepool_slo_recording_rules
    interval: 1m
    rules:
    # Instantaneous count of succeeded node pool operations per cluster
    - record: errors:backend_nodepool_operation:succeeded_total
      expr: |
        count by (cluster) (backend_resource_operation_phase_info{
          resource_type=~".*nodepools",
          operation_type=~"update|delete",
          phase="succeeded"
        })
    # Instantaneous count of all terminal node pool operations per cluster
    - record: errors:backend_nodepool_operation:terminal_total
      expr: |
        count by (cluster) (backend_resource_operation_phase_info{
          resource_type=~".*nodepools",
          operation_type=~"update|delete",
          phase=~"succeeded|failed|canceled"
        })
    # Instantaneous error rate per cluster: fraction of terminal operations that failed
    - record: errors:backend_nodepool_operation:error_rate
      expr: |
        (
          count by (cluster) (backend_resource_operation_phase_info{
            resource_type=~".*nodepools",
            operation_type=~"update|delete",
            phase="failed"
          })
          or
          0 * count by (cluster) (backend_resource_operation_phase_info{
            resource_type=~".*nodepools",
            operation_type=~"update|delete",
            phase=~"succeeded|failed|canceled"
          })
        )
        /
        clamp_min(
          count by (cluster) (backend_resource_operation_phase_info{
            resource_type=~".*nodepools",
            operation_type=~"update|delete",
            phase=~"succeeded|failed|canceled"
          }),
          1
        )
    # Node pool provisioning state distribution (for dashboards)
    - record: nodepool:provision_state:count_by_phase
      expr: |
        count by (phase) (backend_nodepool_provision_state)
  # ========================================
  # Node Pool SLO Alerts — Errors
  # ========================================
  # Multi-window burn-rate-style alerting adapted for gauge metrics.
  # Naming convention: {Scope}{Subject}{Metric}{BurnRateTier} per ADR-001.
  #
  # Burn rate thresholds calculated from 95% SLO (5% error budget):
  #   Fast (14.4x): 14.4 * 0.05 = 0.72 → 72% error rate
  #   Medium (6x):  6 * 0.05 = 0.30 → 30% error rate
  #   Slow (1x):    1 * 0.05 = 0.05 → 5% error rate
  #
  # The 'for' duration enforces sustained observation, approximating the
  # short window of multi-window burn rate alerting. For gauge metrics
  # (point-in-time state rather than event rates), this provides equivalent
  # protection against transient spikes.
  - name: arohcp_nodepool_slo_error_alerts
    rules:
    # ----------------------------------------
    # Fast Burn Alert (non-paging for now per approver request)
    # ----------------------------------------
    # 14.4x burn rate → >72% failure rate sustained for 5 minutes
    # Would exhaust 7-day error budget in ~12 hours
    - alert: userJourneyNodePoolErrors1h5m
      expr: |
        errors:backend_nodepool_operation:error_rate > 0.72
      for: 5m
      labels:
        severity: info
        slo: nodepool-errors
        long_window: 1h
        short_window: 5m
      annotations:
        summary: "Node Pool operation error rate critically high (>72%)"
        description: "More than 72% of node pool operations are in failed state, indicating a fast error budget burn (14.4x) that would exhaust the 95% SLO budget in ~12 hours."
        runbook_url: "https://aka.ms/arohcp-runbook-nodepool"
    # ----------------------------------------
    # Medium Burn Alert (non-paging for now per approver request)
    # ----------------------------------------
    # 6x burn rate → >30% failure rate sustained for 30 minutes
    # Would exhaust 7-day error budget in ~28 hours
    - alert: userJourneyNodePoolErrors6h30m
      expr: |
        errors:backend_nodepool_operation:error_rate > 0.30
      for: 30m
      labels:
        severity: info
        slo: nodepool-errors
        long_window: 6h
        short_window: 30m
      annotations:
        summary: "Node Pool operation error rate elevated (>30%) for 30+ minutes"
        description: "More than 30% of node pool operations are in failed state sustained over 30 minutes, indicating a medium error budget burn (6x) that would exhaust the 95% SLO budget in ~28 hours."
        runbook_url: "https://aka.ms/arohcp-runbook-nodepool"
    # ----------------------------------------
    # Slow Burn Alert (Sev 4 — ticket)
    # ----------------------------------------
    # Per ADR: slow burn alerts generate Jira ticket, not a page.
    # 1x burn rate → >5% failure rate sustained for 6 hours
    # Would exhaust 7-day error budget in ~7 days
    - alert: userJourneyNodePoolErrors3d
      expr: |
        errors:backend_nodepool_operation:error_rate > 0.05
      for: 6h
      labels:
        severity: info
        slo: nodepool-errors
        long_window: 3d
      annotations:
        summary: "Node Pool operation error rate exceeds SLO target (>5%) for 6+ hours"
        description: "More than 5% of node pool operations are in failed state sustained over 6 hours, indicating persistent degradation at the 95% SLO boundary that would exhaust the error budget in ~7 days."
        runbook_url: "https://aka.ms/arohcp-runbook-nodepool"
    # ----------------------------------------
    # Degradation Alert (Sev 4 — ticket)
    # ----------------------------------------
    # With a 95% SLO, the fast-burn threshold only fires at ~72% failure rate.
    # This provides early warning at 15% failure rate before burn-rate alerts fire.
    # Precursor signal → Sev 4 per ADR.
    - alert: userJourneyNodePoolErrorsDegradation
      expr: |
        errors:backend_nodepool_operation:error_rate > 0.15
      for: 30m
      labels:
        severity: info
        slo: nodepool-errors
      annotations:
        summary: "Node Pool operation failure rate exceeds 15% for 30 minutes"
        description: "The node pool operation failure rate has been above 15% for 30 minutes. This provides early warning of degradation before SLO-based burn rate alerts fire."
        runbook_url: "https://aka.ms/arohcp-runbook-nodepool"
    # ----------------------------------------
    # Stuck Operations Alert (non-paging for now per approver request)
    # ----------------------------------------
    # Operations stuck in non-terminal phases are invisible to success/failure SLIs.
    # Threshold: 2 hours (7200s) with 15m sustained observation to filter
    # slow-but-completing operations from genuinely stuck ones.
    #
    # Stickiness (max_over_time ... [6h:]): while a resource stays wedged, the raw
    # condition can transiently clear -- most commonly when the backend retries the
    # operation and resets backend_resource_operation_start_time_seconds, briefly
    # dropping (time() - start_time) below the 7200s threshold. Each clear
    # auto-resolves the IcM incident and the next re-fire opens a brand-new one,
    # producing roughly one new incident every ~4h for the same wedged resource.
    # (Azure Managed Prometheus has no keep_firing_for, so we express the hold in the
    # PromQL.) Holding the condition firing over a 6h look-back collapses a
    # continuously-stuck resource into a single long-lived incident; genuinely
    # distinct stuck episodes more than 6h apart still get their own incident.
    - alert: userJourneyNodePoolStuckOperation
      expr: |
        max_over_time(
          (
            (
              (time() - backend_resource_operation_start_time_seconds{resource_type=~".*nodepools", subscription_id!~"974ebd46-8ad3-41e3-afef-7ef25fd5c371|e8c5a115-842d-4d7e-98ad-cfb2c50b209e|e627aa70-36a3-40b0-8e68-975269e39d7b|6ed122d1-7e03-4a01-baae-9020abf350d4|64f0619f-ebc2-4156-9d91-c4c781de7e54|dee2f1be-a999-4e19-b027-221e7adaf7d3|8d696692-794f-4cdb-ba25-9250c9e9ec4c|ec435068-e722-475f-8504-c91b72a5dc51|403d9de9-132b-4974-94a5-5b78bdfa191e"})
              and
              backend_resource_operation_phase_info{resource_type=~".*nodepools", phase=~"updating|deleting"} == 1
            ) > 7200
          )[6h:5m]
        )
      for: 15m
      labels:
        severity: info
      annotations:
        summary: "Node Pool operation stuck in {{ $labels.phase }} for over 2 hours"
        description: "Node pool operation for {{ $labels.resource_id }} has been in {{ $labels.phase }} phase for over 2 hours. Stuck operations are invisible to success/failure SLIs and require investigation."
        runbook_url: "https://aka.ms/arohcp-runbook-nodepool"
  # ========================================
  # Node Pool User Journey Alerts — Saturation
  # ========================================
  # Queue depth and retry rates impact node pool operations directly,
  # making these user journey signals per ADR. Sev 4 (precursor).
  - name: arohcp_nodepool_saturation_alerts
    rules:
    # Queue depth: node pool controller workqueue accumulating work
    - alert: userJourneyNodePoolSaturationQueueDepth
      expr: |
        max by (name, cluster) (
          max without(prometheus_replica) (
            workqueue_depth{namespace="aro-hcp", name=~".*NodePool.*"}
          )
        ) > 10
      for: 5m
      labels:
        severity: info
      annotations:
        summary: "Node Pool controller workqueue {{ $labels.name }} depth is high"
        description: "Node pool controller workqueue {{ $labels.name }} has had a depth > 10 for more than 5 minutes, indicating work is accumulating faster than it can be processed."
        runbook_url: "https://aka.ms/arohcp-runbook-nodepool"
    # Retry hot loop: high retry ratio on node pool workqueue
    - alert: userJourneyNodePoolSaturationRetryHotLoop
      expr: |
        (
          sum by (name, cluster) (
            max without(prometheus_replica) (
              rate(workqueue_retries_total{namespace="aro-hcp", name=~".*NodePool.*"}[10m])
            )
          )
          /
          sum by (name, cluster) (
            max without(prometheus_replica) (
              rate(workqueue_adds_total{namespace="aro-hcp", name=~".*NodePool.*"}[10m])
            )
          )
        ) > 0.5
      for: 10m
      labels:
        severity: info
      annotations:
        summary: "Node Pool controller workqueue {{ $labels.name }} retry hot loop"
        description: "Node pool controller workqueue {{ $labels.name }} has a retry ratio > 50% sustained over 10 minutes, indicating most queue activity is failed retries rather than fresh work."
        runbook_url: "https://aka.ms/arohcp-runbook-nodepool"
