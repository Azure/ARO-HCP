rule_files:
- msi-credential-refresher-prometheusRule.yaml
evaluation_interval: 1m
tests:
- interval: 1m
  input_series:
  - series: 'credential_refresher_days_until_msi_credential_expiration_bucket{cluster="test-cluster",le="30"}'
    # Values need to increase over 30 minutes window for the increase() function to work
    # Starting from 0 and increasing by 1 every minute for 35 minutes
    values: '0+1x35'
  - series: 'credential_refresher_days_until_msi_credential_expiration_bucket{cluster="test-cluster",le="0"}'
    # No increase - nothing in the 0 bucket, so the subtraction still yields > 0
    values: '0x35'
  alert_rule_test:
  - eval_time: 35m
    alertname: ClusterCredentialExpiringSoon
    exp_alerts:
    - exp_labels:
        cluster: test-cluster
        component: credential-refresher
        severity: warning
      exp_annotations:
        description: 'Credential(s) for customer cluster monitored by test-cluster are expiring in less than 30 days.'
        summary: 'Customer cluster credential expiring in less than 30 days'
        runbook_url: 'https://eng.ms/docs/cloud-ai-platform/azure-core/azure-cloud-native-and-management-platform/control-plane-bburns/azure-red-hat-openshift/azure-redhat-openshift-team-doc/troubleshooting/tsgs/credential-refresher-expiring-cert'
        correlationId: 'ClusterCredentialExpiringSoon/test-cluster'
- interval: 1m
  input_series:
  - series: 'credential_refresher_days_until_msi_credential_expiration_bucket{cluster="test-cluster",le="30"}'
    # le="30" increases at the same rate as le="0" - everything is in the 0 bucket
    values: '0+1x35'
  - series: 'credential_refresher_days_until_msi_credential_expiration_bucket{cluster="test-cluster",le="0"}'
    # Same increase as le="30" - all observations are <= 0, subtraction yields 0
    values: '0+1x35'
  alert_rule_test:
  - eval_time: 35m
    alertname: ClusterCredentialExpiringSoon
    exp_alerts: []
- interval: 1m
  input_series:
  - series: 'credential_refresher_days_until_msi_credential_expiration_bucket{cluster="test-cluster",le="-90"}'
    # Credential is non-renewable - observations in the -90 bucket are increasing
    values: '0+1x35'
  alert_rule_test:
  - eval_time: 35m
    alertname: ClusterCredentialNotRenewable
    exp_alerts:
    - exp_labels:
        cluster: test-cluster
        component: credential-refresher
        severity: warning
      exp_annotations:
        description: 'Credential(s) for customer cluster monitored by test-cluster are no longer renewable.'
        summary: 'Customer cluster credential is no longer renewable'
        runbook_url: 'https://eng.ms/docs/cloud-ai-platform/azure-core/azure-cloud-native-and-management-platform/control-plane-bburns/azure-red-hat-openshift/azure-redhat-openshift-team-doc/troubleshooting/tsgs/credential-refresher-expiring-cert'
        correlationId: 'ClusterCredentialNotRenewable/test-cluster'
- interval: 1m
  input_series:
  - series: 'credential_refresher_days_until_msi_credential_expiration_bucket{cluster="test-cluster",le="-90"}'
    # No increase - no non-renewable credentials
    values: '0x35'
  alert_rule_test:
  - eval_time: 35m
    alertname: ClusterCredentialNotRenewable
    exp_alerts: []
- interval: 1m
  input_series:
  - series: 'credential_refresher_days_until_msi_credential_expiration_bucket{cluster="test-cluster",le="0"}'
    # Credentials have expired (in le="0" bucket) but are not yet non-renewable (le="-90" unchanged)
    values: '0+1x35'
  - series: 'credential_refresher_days_until_msi_credential_expiration_bucket{cluster="test-cluster",le="-90"}'
    # No increase - not yet non-renewable, so subtraction yields > 0
    values: '0x35'
  alert_rule_test:
  - eval_time: 35m
    alertname: ClusterCredentialExpired
    exp_alerts:
    - exp_labels:
        cluster: test-cluster
        component: credential-refresher
        severity: warning
      exp_annotations:
        description: 'Credential(s) for customer cluster monitored by test-cluster expired.'
        summary: 'Customer cluster credential expired'
        runbook_url: 'https://eng.ms/docs/cloud-ai-platform/azure-core/azure-cloud-native-and-management-platform/control-plane-bburns/azure-red-hat-openshift/azure-redhat-openshift-team-doc/troubleshooting/tsgs/credential-refresher-expiring-cert'
        correlationId: 'ClusterCredentialExpired/test-cluster'
- interval: 1m
  input_series:
  - series: 'credential_refresher_days_until_msi_credential_expiration_bucket{cluster="test-cluster",le="0"}'
    # le="0" increases at the same rate as le="-90" - all expired credentials are also non-renewable
    values: '0+1x35'
  - series: 'credential_refresher_days_until_msi_credential_expiration_bucket{cluster="test-cluster",le="-90"}'
    # Same increase as le="0" - subtraction yields 0, no alert
    values: '0+1x35'
  alert_rule_test:
  - eval_time: 35m
    alertname: ClusterCredentialExpired
    exp_alerts: []
- interval: 1m
  input_series:
  - series: 'credential_refresher_days_until_msi_credential_expiration_bucket{cluster="test-cluster",le="0"}'
    # No increase - no expired credentials
    values: '0x35'
  alert_rule_test:
  - eval_time: 35m
    alertname: ClusterCredentialExpired
    exp_alerts: []
- interval: 1m
  input_series:
  - series: 'credential_refresher_days_until_msi_credential_expiration_bucket{cluster="test-cluster",le="30.0"}'
    # Tenths-place form should also be accepted for the 30-day bucket
    values: '0+1x35'
  - series: 'credential_refresher_days_until_msi_credential_expiration_bucket{cluster="test-cluster",le="0.0"}'
    # Tenths-place form should also be accepted for the 0-day bucket
    values: '0x35'
  alert_rule_test:
  - eval_time: 35m
    alertname: ClusterCredentialExpiringSoon
    exp_alerts:
    - exp_labels:
        cluster: test-cluster
        component: credential-refresher
        severity: warning
      exp_annotations:
        description: 'Credential(s) for customer cluster monitored by test-cluster are expiring in less than 30 days.'
        summary: 'Customer cluster credential expiring in less than 30 days'
        runbook_url: 'https://eng.ms/docs/cloud-ai-platform/azure-core/azure-cloud-native-and-management-platform/control-plane-bburns/azure-red-hat-openshift/azure-redhat-openshift-team-doc/troubleshooting/tsgs/credential-refresher-expiring-cert'
        correlationId: 'ClusterCredentialExpiringSoon/test-cluster'
- interval: 1m
  input_series:
  - series: 'credential_refresher_days_until_msi_credential_expiration_bucket{cluster="test-cluster",le="-90.0"}'
    # Tenths-place form should also be accepted for the non-renewable bucket
    values: '0+1x35'
  alert_rule_test:
  - eval_time: 35m
    alertname: ClusterCredentialNotRenewable
    exp_alerts:
    - exp_labels:
        cluster: test-cluster
        component: credential-refresher
        severity: warning
      exp_annotations:
        description: 'Credential(s) for customer cluster monitored by test-cluster are no longer renewable.'
        summary: 'Customer cluster credential is no longer renewable'
        runbook_url: 'https://eng.ms/docs/cloud-ai-platform/azure-core/azure-cloud-native-and-management-platform/control-plane-bburns/azure-red-hat-openshift/azure-redhat-openshift-team-doc/troubleshooting/tsgs/credential-refresher-expiring-cert'
        correlationId: 'ClusterCredentialNotRenewable/test-cluster'
- interval: 1m
  input_series:
  - series: 'credential_refresher_days_until_msi_credential_expiration_bucket{cluster="test-cluster",le="0.0"}'
    # Tenths-place form should also be accepted for the expired bucket
    values: '0+1x35'
  - series: 'credential_refresher_days_until_msi_credential_expiration_bucket{cluster="test-cluster",le="-90.0"}'
    # Tenths-place form should also be accepted for the non-renewable bucket
    values: '0x35'
  alert_rule_test:
  - eval_time: 35m
    alertname: ClusterCredentialExpired
    exp_alerts:
    - exp_labels:
        cluster: test-cluster
        component: credential-refresher
        severity: warning
      exp_annotations:
        description: 'Credential(s) for customer cluster monitored by test-cluster expired.'
        summary: 'Customer cluster credential expired'
        runbook_url: 'https://eng.ms/docs/cloud-ai-platform/azure-core/azure-cloud-native-and-management-platform/control-plane-bburns/azure-red-hat-openshift/azure-redhat-openshift-team-doc/troubleshooting/tsgs/credential-refresher-expiring-cert'
        correlationId: 'ClusterCredentialExpired/test-cluster'
