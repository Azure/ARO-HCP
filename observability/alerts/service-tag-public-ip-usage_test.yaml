# Test no alerts fire when below 80% threshold
- interval: 1m
  input_series:
  - series: 'public_ip_count_by_region_service_tag{region="eastus",service_tag_type="FirstPartyUsage",service_tag_value="/aro-hcp-nonprod-inbound-customerapi",subscription_id="test-sub",cluster="test"}'
    values: "25+0x20"
  - series: 'public_ip_count_by_region_service_tag{region="eastus",service_tag_type="FirstPartyUsage",service_tag_value="/aro-hcp-prod-outbound-svc",subscription_id="test-sub",cluster="test"}'
    values: "25+0x20"
  - series: 'public_ip_count_by_region_service_tag{region="eastus",service_tag_type="FirstPartyUsage",service_tag_value="/aro-hcp-nonprod-outbound-cx",subscription_id="test-sub",cluster="test"}'
    values: "6+0x20"
  alert_rule_test:
  - eval_time: 20m
    alertname: AroHcpNonprodInboundCustomerapiCapacity
    exp_alerts: []
  - eval_time: 20m
    alertname: AroHcpProdOutboundSvcCapacity
    exp_alerts: []
  - eval_time: 20m
    alertname: AroHcpNonprodOutboundCxCapacity
    exp_alerts: []
# Test region filtering - uswest2 value above 64*0.8 but below 128*0.8 should not fire either alert
- interval: 1m
  input_series:
  - series: 'public_ip_count_by_region_service_tag{region="uswest2",service_tag_type="FirstPartyUsage",service_tag_value="/aro-hcp-prod-inbound-customerapi",subscription_id="test-sub",cluster="test"}'
    values: "60+0x20"
  alert_rule_test:
  - eval_time: 20m
    alertname: AroHcpProdInboundCustomerapiCapacity
    exp_alerts: []
  - eval_time: 20m
    alertname: AroHcpProdInboundCustomerapiUswest2Capacity
    exp_alerts: []
