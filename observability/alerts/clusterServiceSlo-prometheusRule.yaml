apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    app.kubernetes.io/name: cluster-service
    app.kubernetes.io/part-of: cluster-service
    prometheus: k8s
    role: alert-rules
  name: cluster-service-slo-rules
  namespace: monitoring
spec:
  groups:
  - name: cluster-service-slos
    rules:
    - alert: ClustersServiceAPIAvailability5mto1hor30mto6hErrorBudgetBurn
      annotations:
        description: 'API is rapidly burning its 28 day availability error budget (99% SLO)'
        runbook_url: 'https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeapierrorbudgetburn'
        summary: 'Cluster Service API error budget burn rate is too high'
      expr: |
        (
        sum(max without(prometheus_replica) (availability:api_inbound_request_count:burnrate5m{namespace="clusters-service", service="clusters-service-metrics"})) > (13.44 * (1-0.99000)) 
          and 
        sum(max without(prometheus_replica) (availability:api_inbound_request_count:burnrate1h{namespace="clusters-service", service="clusters-service-metrics"})) > (13.44 * (1-0.99000))
        )
        or
        (
        sum(max without(prometheus_replica) (availability:api_inbound_request_count:burnrate30m{namespace="clusters-service", service="clusters-service-metrics"})) > (5.6 * (1-0.99000)) 
          and 
        sum(max without(prometheus_replica) (availability:api_inbound_request_count:burnrate6h{namespace="clusters-service", service="clusters-service-metrics"})) > (5.6 * (1-0.99000))
        )
      for: 5m
      labels:
        long: 6h
        severity: critical
        short: 30m