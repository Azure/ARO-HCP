apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    app.kubernetes.io/name: kube-prometheus
    app.kubernetes.io/part-of: kube-prometheus
    prometheus: k8s
    role: alert-rules
  name: leaderelection-monitoring-rules
  namespace: monitoring
spec:
  groups:
  - name: leaderelection
    rules:
    - alert: LeaderElectionLeaseStale
      # Fires when a leader election lease has not been renewed for >2m; conservative threshold safe for all ARO-HCP services.
      expr: |
        time() - max without(prometheus_replica) (
          kube_lease_renew_time{namespace=~"aro-hcp|fleet|kube-applier|mgmt-agent|sessiongate"}
        ) > 120
      for: 5m
      labels:
        severity: warning
      annotations:
        description: 'Leader election lease {{ $labels.lease }} in namespace {{ $labels.namespace }} on cluster {{ $labels.cluster }} has not been renewed for more than 2 minutes. The component may have lost leadership or stopped running.'
        runbook_url: 'TBD'
        summary: 'Leader election lease {{ $labels.lease }} in {{ $labels.namespace }} on {{ $labels.cluster }} stale for more than 2 minutes'
