rule_files:
- userJourneyClusterUpgradeRecord-prometheusRule.yaml
evaluation_interval: 1m
tests:
# ========================================
# Test 1: Reach partial — desired transitions to partial within 20m (upgrade)
# ========================================
- interval: 1m
  input_series:
  - series: 'backend_cluster_version_info{cluster="svc-1", resource_id="/sub/1/rg/c1", subscription_id="sub-1", cluster_uuid="uuid-1", version="4.19.19", state="completed"}'
    values: "1+0x35"
  - series: 'backend_cluster_version_info{cluster="svc-1", resource_id="/sub/1/rg/c1", subscription_id="sub-1", cluster_uuid="uuid-1", version="4.19.20", state="desired"}'
    values: "1x10 0x25"
  - series: 'backend_cluster_version_info{cluster="svc-1", resource_id="/sub/1/rg/c1", subscription_id="sub-1", cluster_uuid="uuid-1", version="4.19.20", state="partial"}'
    values: "0x10 1x25"
  promql_expr_test:
  - expr: hosted_control_plane_version:duration_in_desired:seconds{cluster="svc-1", resource_id="/sub/1/rg/c1", version="4.19.20"}
    eval_time: 9m
    exp_samples:
    - labels: 'hosted_control_plane_version:duration_in_desired:seconds{cluster="svc-1", cluster_uuid="uuid-1", resource_id="/sub/1/rg/c1", subscription_id="sub-1", version="4.19.20", state="desired"}'
      value: 540
  - expr: hosted_control_plane_version:desired:stuck_over_20m:count{cluster="svc-1"}
    eval_time: 9m
    exp_samples:
    - labels: 'hosted_control_plane_version:desired:stuck_over_20m:count{cluster="svc-1"}'
      value: 0
# ========================================
# Test 2: Stuck in desired — 1 of 1 active upgrades stuck >20m
# ========================================
- interval: 1m
  input_series:
  - series: 'backend_cluster_version_info{cluster="svc-1", resource_id="/sub/2/rg/c2", subscription_id="sub-2", cluster_uuid="uuid-2", version="4.19.20", state="completed"}'
    values: "1+0x50"
  - series: 'backend_cluster_version_info{cluster="svc-1", resource_id="/sub/2/rg/c2", subscription_id="sub-2", cluster_uuid="uuid-2", version="4.19.21", state="desired"}'
    values: "1+0x50"
  - series: 'backend_cluster_version_info{cluster="svc-1", resource_id="/sub/2/rg/c3", subscription_id="sub-2", cluster_uuid="uuid-3", version="4.19.20", state="completed"}'
    values: "1+0x50"
  promql_expr_test:
  - expr: hosted_control_plane_version:duration_in_desired:seconds{cluster="svc-1", resource_id="/sub/2/rg/c2", version="4.19.21", state="desired"}
    eval_time: 35m
    exp_samples:
    - labels: 'hosted_control_plane_version:duration_in_desired:seconds{cluster="svc-1", cluster_uuid="uuid-2", resource_id="/sub/2/rg/c2", subscription_id="sub-2", version="4.19.21", state="desired"}'
      value: 2100
  - expr: hosted_control_plane_version:inflight_upgrade:count{cluster="svc-1"}
    eval_time: 35m
    exp_samples:
    - labels: 'hosted_control_plane_version:inflight_upgrade:count{cluster="svc-1"}'
      value: 1
  - expr: hosted_control_plane_version:desired:stuck_over_20m:count{cluster="svc-1"}
    eval_time: 35m
    exp_samples:
    - labels: 'hosted_control_plane_version:desired:stuck_over_20m:count{cluster="svc-1"}'
      value: 1
  - expr: hosted_control_plane_version:desired:stuck_over_20m:ratio{cluster="svc-1"}
    eval_time: 35m
    exp_samples:
    - labels: 'hosted_control_plane_version:desired:stuck_over_20m:ratio{cluster="svc-1"}'
      value: 1
# ========================================
# Test 3: Install only — desired without completed is excluded from SLO
# ========================================
- interval: 1m
  input_series:
  - series: 'backend_cluster_version_info{cluster="svc-1", resource_id="/sub/3/rg/c4", subscription_id="sub-3", cluster_uuid="uuid-4", version="4.19.20", state="desired"}'
    values: "1+0x50"
  promql_expr_test:
  - expr: hosted_control_plane_version:duration_in_desired:seconds{cluster="svc-1", resource_id="/sub/3/rg/c4", version="4.19.20", state="desired"}
    eval_time: 35m
    exp_samples: []
  - expr: hosted_control_plane_version:inflight_upgrade:count{cluster="svc-1"}
    eval_time: 35m
    exp_samples:
    - labels: 'hosted_control_plane_version:inflight_upgrade:count{cluster="svc-1"}'
      value: 0
  - expr: hosted_control_plane_version:desired:stuck_over_20m:count{cluster="svc-1"}
    eval_time: 35m
    exp_samples:
    - labels: 'hosted_control_plane_version:desired:stuck_over_20m:count{cluster="svc-1"}'
      value: 0
# ========================================
# Test 4: Complete — desired transitions to completed within 30m (upgrade)
# ========================================
- interval: 1m
  input_series:
  - series: 'backend_cluster_version_info{cluster="svc-1", resource_id="/sub/1/rg/c1", subscription_id="sub-1", cluster_uuid="uuid-1", version="4.19.19", state="completed"}'
    values: "1+0x35"
  - series: 'backend_cluster_version_info{cluster="svc-1", resource_id="/sub/1/rg/c1", subscription_id="sub-1", cluster_uuid="uuid-1", version="4.19.20", state="desired"}'
    values: "1x10 0x25"
  - series: 'backend_cluster_version_info{cluster="svc-1", resource_id="/sub/1/rg/c1", subscription_id="sub-1", cluster_uuid="uuid-1", version="4.19.20", state="completed"}'
    values: "0x10 1x25"
  promql_expr_test:
  - expr: hosted_control_plane_version:duration_in_progress:seconds{cluster="svc-1", resource_id="/sub/1/rg/c1", version="4.19.20", state="desired"}
    eval_time: 9m
    exp_samples:
    - labels: 'hosted_control_plane_version:duration_in_progress:seconds{cluster="svc-1", cluster_uuid="uuid-1", resource_id="/sub/1/rg/c1", subscription_id="sub-1", version="4.19.20", state="desired"}'
      value: 540
  - expr: hosted_control_plane_version:in_progress:stuck_over_30m:count{cluster="svc-1"}
    eval_time: 9m
    exp_samples:
    - labels: 'hosted_control_plane_version:in_progress:stuck_over_30m:count{cluster="svc-1"}'
      value: 0
# ========================================
# Test 5: Stuck in progress — partial without completed after 35m
# ========================================
- interval: 1m
  input_series:
  - series: 'backend_cluster_version_info{cluster="svc-1", resource_id="/sub/2/rg/c2", subscription_id="sub-2", cluster_uuid="uuid-2", version="4.19.20", state="completed"}'
    values: "1+0x50"
  - series: 'backend_cluster_version_info{cluster="svc-1", resource_id="/sub/2/rg/c2", subscription_id="sub-2", cluster_uuid="uuid-2", version="4.19.21", state="desired"}'
    values: "1x10 0x50"
  - series: 'backend_cluster_version_info{cluster="svc-1", resource_id="/sub/2/rg/c2", subscription_id="sub-2", cluster_uuid="uuid-2", version="4.19.21", state="partial"}'
    values: "0x10 1x50"
  - series: 'backend_cluster_version_info{cluster="svc-1", resource_id="/sub/2/rg/c3", subscription_id="sub-2", cluster_uuid="uuid-3", version="4.19.20", state="completed"}'
    values: "1+0x50"
  promql_expr_test:
  - expr: hosted_control_plane_version:duration_in_progress:seconds{cluster="svc-1", resource_id="/sub/2/rg/c2", version="4.19.21", state="desired"}
    eval_time: 35m
    exp_samples:
    - labels: 'hosted_control_plane_version:duration_in_progress:seconds{cluster="svc-1", cluster_uuid="uuid-2", resource_id="/sub/2/rg/c2", subscription_id="sub-2", version="4.19.21", state="desired"}'
      value: 2100
  - expr: hosted_control_plane_version:inflight_upgrade:count{cluster="svc-1"}
    eval_time: 35m
    exp_samples:
    - labels: 'hosted_control_plane_version:inflight_upgrade:count{cluster="svc-1"}'
      value: 1
  - expr: hosted_control_plane_version:in_progress:stuck_over_30m:count{cluster="svc-1"}
    eval_time: 35m
    exp_samples:
    - labels: 'hosted_control_plane_version:in_progress:stuck_over_30m:count{cluster="svc-1"}'
      value: 1
  - expr: hosted_control_plane_version:in_progress:stuck_over_30m:ratio{cluster="svc-1"}
    eval_time: 35m
    exp_samples:
    - labels: 'hosted_control_plane_version:in_progress:stuck_over_30m:ratio{cluster="svc-1"}'
      value: 1
