rule_files:
- ingress-prometheusRule.yaml
evaluation_interval: 1m
tests:
# --- UJIngressAvailability1h5m (fast burn: 5m/1h) ---
# With 30s data interval, 1h window has ~120 samples.
# count > 60 first satisfied at T=31m (63 samples in window).
# for: 2m → alert fires at T=33m.
- interval: 30s
  input_series:
  - series: 'probe_success{job="blackbox-ingress",probe_url="https://apps.cluster.example.com",namespace="hcp-ns",_id="cluster-1"}'
    values: "0+0x70"
  alert_rule_test:
  - eval_time: 33m
    alertname: UJIngressAvailability1h5m
    exp_alerts:
    - exp_labels:
        severity: critical
        long_window: 1h
        short_window: 5m
        probe_url: https://apps.cluster.example.com
        namespace: hcp-ns
        _id: cluster-1
      exp_annotations:
        message: "High error budget burn for ingress https://apps.cluster.example.com (current value: 1)"
        tsg_url: TBD

# Should NOT fire before for: 2m (pending at T=31m, not yet firing)
- interval: 30s
  input_series:
  - series: 'probe_success{job="blackbox-ingress",probe_url="https://apps.cluster.example.com",namespace="hcp-ns",_id="cluster-1"}'
    values: "0+0x70"
  alert_rule_test:
  - eval_time: 31m
    alertname: UJIngressAvailability1h5m
    exp_alerts: []

# Should NOT fire when probe is healthy
- interval: 30s
  input_series:
  - series: 'probe_success{job="blackbox-ingress",probe_url="https://apps.cluster.example.com",namespace="hcp-ns",_id="cluster-1"}'
    values: "1+0x70"
  alert_rule_test:
  - eval_time: 33m
    alertname: UJIngressAvailability1h5m
    exp_alerts: []

# --- UJIngressAvailability6h30m (medium burn: 30m/6h) ---
# count_over_time([6h]) > 360 at T=181m (362 samples).
# for: 15m → alert fires at T=196m.
- interval: 30s
  input_series:
  - series: 'probe_success{job="blackbox-ingress",probe_url="https://apps.cluster.example.com",namespace="hcp-ns",_id="cluster-1"}'
    values: "0+0x400"
  alert_rule_test:
  - eval_time: 196m
    alertname: UJIngressAvailability6h30m
    exp_alerts:
    - exp_labels:
        severity: critical
        long_window: 6h
        short_window: 30m
        probe_url: https://apps.cluster.example.com
        namespace: hcp-ns
        _id: cluster-1
      exp_annotations:
        message: "High error budget burn for ingress https://apps.cluster.example.com (current value: 1)"
        tsg_url: TBD

# Should NOT fire before for: 15m
- interval: 30s
  input_series:
  - series: 'probe_success{job="blackbox-ingress",probe_url="https://apps.cluster.example.com",namespace="hcp-ns",_id="cluster-1"}'
    values: "0+0x400"
  alert_rule_test:
  - eval_time: 194m
    alertname: UJIngressAvailability6h30m
    exp_alerts: []

