    exp_alerts:
    - exp_labels:
        severity: warning
        long_window: 1d
        short_window: 2h
        probe_url: https://apps.cluster.example.com
        namespace: hcp-ns
        _id: cluster-1
      exp_annotations:
        message: "High error budget burn for ingress https://apps.cluster.example.com (current value: 1)"
        tsg_url: TBD

# Should NOT fire before for: 1h
- interval: 30s
  input_series:
  - series: 'probe_success{job="blackbox-ingress",probe_url="https://apps.cluster.example.com",namespace="hcp-ns",_id="cluster-1"}'
    values: "0+0x1570"
  alert_rule_test:
  - eval_time: 779m
    alertname: UJIngressAvailability1d2h
    exp_alerts: []

# --- UJIngressAvailability3d6h (very slow burn: 6h/3d) ---
# count_over_time([3d]) > 4320 at T=2161m (4322 samples).
# for: 3h → alert fires at T=2341m.
- interval: 30s
