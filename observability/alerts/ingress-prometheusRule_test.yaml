# No probe data — no alerts
- interval: 30s
  input_series: []
  alert_rule_test:
  - eval_time: 33m
    alertname: UJIngressAvailability1h5m
    exp_alerts: []
  - eval_time: 196m
    alertname: UJIngressAvailability6h30m
    exp_alerts: []
