# Multiple clusters — only failing cluster alerts, healthy one does not
- interval: 30s
  input_series:
  - series: 'probe_success{job="blackbox-ingress",probe_url="https://apps.cluster-a.example.com",namespace="hcp-ns-a",_id="cluster-a"}'
    values: "0+0x70"
  - series: 'probe_success{job="blackbox-ingress",probe_url="https://apps.cluster-b.example.com",namespace="hcp-ns-b",_id="cluster-b"}'
    values: "1+0x70"
  alert_rule_test:
  - eval_time: 33m
    alertname: UJIngressAvailability1h5m
    exp_alerts:
    - exp_labels:
        severity: critical
        long_window: 1h
        short_window: 5m
        probe_url: https://apps.cluster-a.example.com
        namespace: hcp-ns-a
        _id: cluster-a
      exp_annotations:
        message: "High error budget burn for ingress https://apps.cluster-a.example.com (current value: 1)"
        tsg_url: TBD

# No probe data — no alerts
- interval: 30s
  input_series: []
  alert_rule_test:
  - eval_time: 33m
    alertname: UJIngressAvailability1h5m
    exp_alerts: []
  - eval_time: 196m
    alertname: UJIngressAvailability6h30m
    exp_alerts: []
