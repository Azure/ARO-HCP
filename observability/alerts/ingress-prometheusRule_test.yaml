        tsg_url: TBD

# Should NOT fire before for: 3h
- interval: 30s
  input_series:
  - series: 'probe_success{job="blackbox-ingress",probe_url="https://apps.cluster.example.com",namespace="hcp-ns",_id="cluster-1"}'
    values: "0+0x4690"
  alert_rule_test:
