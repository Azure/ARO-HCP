---
# SecretProviderClass for Geneva certificates
# UPDATE ALL PLACEHOLDER VALUES BEFORE DEPLOYING
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: arobit-shoebox-secretprovider
  namespace: arobit-shoebox-test
  labels:
    app.kubernetes.io/name: arobit-shoebox-secretprovider
    app.kubernetes.io/component: shoebox-testing
spec:
  provider: azure
  parameters:
    # UPDATE: MSI Client ID for accessing Key Vault
    clientID: 'UPDATE_WITH_MSI_CLIENT_ID'
    # UPDATE: Azure cloud environment name
    cloudName: 'UPDATE_WITH_CLOUD_NAME'
    # UPDATE: Key Vault name containing Geneva certificates
    keyvaultName: 'UPDATE_WITH_KEYVAULT_NAME'
    objects: |
      array:
        - |
          objectName: "UPDATE_WITH_CLUSTER_LOGS_SECRET_NAME"
          objectAlias: "gcscert.pem"
          objectType: secret
    # UPDATE: Azure tenant ID
    tenantId: 'UPDATE_WITH_TENANT_ID'
    usePodIdentity: "false"
