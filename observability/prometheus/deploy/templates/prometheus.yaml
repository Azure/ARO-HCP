apiVersion: monitoring.coreos.com/v1
kind: Prometheus
metadata:
  name: aro-hcp-prometheus
spec:
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - podAffinityTerm:
          labelSelector:
            matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
              - prometheus
            - key: prometheus
              operator: In
              values:
              - prometheus-kube-prometheus-prometheus
          topologyKey: kubernetes.io/hostname
        weight: 100
  alerting:
    alertmanagers:
    - apiVersion: v2
      name: aro-hcp-prometheus-alertmanager
      namespace: prometheus
      pathPrefix: /
      port: http-web
  automountServiceAccountToken: true
  enableAdminAPI: false
  evaluationInterval: 30s
  image: "{{ .Values.aroHcp.prometheusSpec.image.registry }}/{{ .Values.aroHcp.prometheusSpec.image.repository }}@sha256:{{ .Values.aroHcp.prometheusSpec.image.digest }}"
  listenLocal: false
  logFormat: logfmt
  logLevel: info 
  paused: false
  podMonitorNamespaceSelector: {}
  podMonitorSelector: {}
  portName: http-web
  probeNamespaceSelector: {}
  probeSelector:
    matchLabels:
      release: prometheus
  replicas: {{ .Values.aroHcp.prometheusSpec.replicas }}
  retention: {{ .Values.aroHcp.prometheusSpec.retention }}
  routePrefix: /
  ruleNamespaceSelector: {}
  ruleSelector:
    matchLabels:
      release: prometheus
  scrapeConfigNamespaceSelector: {}
  scrapeConfigSelector:
    matchLabels:
      release: prometheus
  scrapeInterval: 30s
  securityContext:
    fsGroup: 2000
    runAsGroup: 2000
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault
  serviceAccountName: prometheus-kube-prometheus-prometheus
  serviceMonitorNamespaceSelector: {}
  serviceMonitorSelector: {}
  shards: {{ .Values.aroHcp.prometheusSpec.shards }}
  tsdb:
    outOfOrderTimeWindow: 0s
  version: {{ .Values.aroHcp.prometheusSpec.version }}
  walCompression: true
  remoteWrite:
    - url: "{{ .Values.aroHcp.prometheusSpec.remoteWrite.url }}" # 👈 URL of the Azure MonitorWorkspace Remote write endpoint
      azureAd:
        cloud: 'AzurePublic'
        managedIdentity:
          clientId: {{ .Values.aroHcp.prometheusSpec.remoteWrite.managedIdentityClientId }} # 👈 User assigned identity is assigned to the VMs in the aks managed resource group
      queueConfig:
        capacity: 2500
        maxShards: 500
        minShards: 1
        maxSamplesPerSend: 2000
        batchSendDeadline: 60s
        minBackoff: 30ms
        maxBackoff: 256s
      metadataConfig:
        send: false
      writeRelabelConfigs: # 👈 Might need some work to relabel/drop metrics
      - sourceLabels: [__name__, source]
        action: keep
        separator: ;
        regex: ".*" 