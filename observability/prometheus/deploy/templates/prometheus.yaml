{{- $none := "NONE" -}}
{{- $setRequests := or (ne (.Values.prometheusSpec.resources.requests.cpu | toString) $none) (ne (.Values.prometheusSpec.resources.requests.memory | toString) $none) -}}
{{- $setLimits := ne (.Values.prometheusSpec.resources.limits.memory | toString) $none -}}
apiVersion: monitoring.coreos.com/v1alpha1
kind: PrometheusAgent
metadata:
  name: prometheus
  namespace: '{{ .Release.Namespace }}'
spec:
  image: '{{ .Values.prometheusSpec.image.registry }}/{{ .Values.prometheusSpec.image.repository }}@sha256:{{ .Values.prometheusSpec.image.sha }}'
  version: '{{ .Values.prometheusSpec.version}}' # todo: can this be removed? we control the version via image
  {{- if or $setRequests $setLimits }}
  resources:
    {{- if $setRequests }}
    requests:
      {{- if ne (.Values.prometheusSpec.resources.requests.cpu | toString) $none }}
      cpu: '{{ .Values.prometheusSpec.resources.requests.cpu  }}'
      {{- end }}
      {{- if ne (.Values.prometheusSpec.resources.requests.memory | toString) $none }}
      memory: '{{ .Values.prometheusSpec.resources.requests.memory }}'
      {{- end }}
    {{- end }}
    {{- if $setLimits }}
    limits:
      {{- if ne (.Values.prometheusSpec.resources.limits.memory | toString) $none }}
      memory: '{{ .Values.prometheusSpec.resources.limits.memory }}'
      {{- end }}
    {{- end }}
  {{- end }}
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: aro-hcp.azure.com/role
            operator: In
            values:
            - infra
  automountServiceAccountToken: true
  hostNetwork: false
  listenLocal: false
  logFormat: logfmt
  logLevel: info
  paused: false
  podMetadata:
    labels:
      azure.workload.identity/use: "true"
  podMonitorNamespaceSelector: {}
  podMonitorSelector: {}
  portName: http-web
  probeNamespaceSelector: {}
  probeSelector:
    matchLabels:
      release: arohcp-monitor
  replicas: {{ .Values.prometheusSpec.replicas }}
  routePrefix: /
  scrapeConfigNamespaceSelector: {}
  scrapeConfigSelector:
    matchLabels:
      release: arohcp-monitor
  scrapeInterval: 30s
  securityContext:
    fsGroup: 2000
    runAsGroup: 2000
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault
  serviceAccountName: prometheus
  serviceMonitorNamespaceSelector: {}
  serviceMonitorSelector: {}
  shards: {{ .Values.prometheusSpec.shards }}
  storage:
    volumeClaimTemplate:
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 50Gi
        storageClassName: managed-premium
  tolerations:
  - effect: NoSchedule
    key: infra
    operator: Equal
    value: "true"
  topologySpreadConstraints:
  - labelSelector:
      matchLabels:
        app.kubernetes.io/name: prometheus-agent
        operator.prometheus.io/name: prometheus
    maxSkew: 1
    topologyKey: '{{ if eq (int .Values.prometheusSpec.zoneCount) 0 }}kubernetes.azure.com/agentpool{{ else }}topology.kubernetes.io/zone{{ end }}'
    whenUnsatisfiable: ScheduleAnyway
  - labelSelector:
      matchLabels:
        app.kubernetes.io/name: prometheus-agent
        operator.prometheus.io/name: prometheus
    maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
  - labelSelector:
      matchLabels:
        app.kubernetes.io/name: prometheus-agent
        operator.prometheus.io/name: prometheus
    matchLabelKeys:
    - operator.prometheus.io/shard
    maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
  walCompression: true
  externalLabels:
    cluster: '{{ .Values.prometheusSpec.externalLabels.cluster }}'
    region: '{{ .Values.prometheusSpec.externalLabels.region }}'
    environment: '{{ .Values.prometheusSpec.externalLabels.environment }}'
  remoteWrite:
  - url: '{{ .Values.prometheusSpec.remoteWriteUrl }}'
    azureAd:
      cloud: AzurePublic
      sdk: {}
    queueConfig:
      capacity: 50000
      maxShards: 50
      minShards: 1
      maxSamplesPerSend: 10000
      batchSendDeadline: 60s
      minBackoff: 30ms
      maxBackoff: 256s
    metadataConfig:
      send: false
    {{- if .Values.environment }}
    writeRelabelConfigs:
      - sourceLabels: [namespace]
        regex: '^ocm-{{ .Values.environment }}.*'
        action: drop
    {{- end -}}
  {{- if ne .Values.prometheusSpec.hcpRemoteWriteUrl "NONE" }}
  - url: '{{ .Values.prometheusSpec.hcpRemoteWriteUrl }}'
    azureAd:
      cloud: AzurePublic
      sdk: {}
    queueConfig:
      capacity: 50000
      maxShards: 50
      minShards: 1
      maxSamplesPerSend: 10000
      batchSendDeadline: 60s
      minBackoff: 30ms
      maxBackoff: 256s
    metadataConfig:
      send: false
    {{- if .Values.environment }}
    writeRelabelConfigs:
      - sourceLabels: [namespace]
        regex: '^ocm-{{ .Values.environment }}.*'
        action: keep
    {{- end }}
  {{- end }}
