          #   - my.dns.search.suffix
          # options:
          #   - name: ndots
          #     value: "2"
          #   - name: edns0
        securityContext:
          fsGroup: 65534
          runAsGroup: 65534
          runAsNonRoot: true
          runAsUser: 65534
