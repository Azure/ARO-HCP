prometheusRules:
  rulesFolders: []
  untestedRules:
  - alerts/kubernetesControlPlane-prometheusRule.yaml
  outputBicep: ../dev-infrastructure/modules/metrics/rules/generatedKustoOnlyServicePrometheusAlertingRules.bicep
  groupNamePrefix: "svc-"
  includedAlertsByGroup:
  - groupName: kubernetes-apps
    namespaces:
    - aro-hcp
    - aro-hcp-admin-api
    - aro-hcp-exporter
    - arobit
    - billing
    - clusters-service
    - credential-refresher
    - fleet
    - hcp-recovery
    - kube-applier
    - maestro
    - mgmt-agent
    - monitoring
    - msi-credential-refresher
    - prometheus
    - secret-sync-controller
    - sessiongate
    alerts:
    - KubePodCrashLooping
    - KubePodNotReady
    - KubeDeploymentGenerationMismatch
    - KubeDeploymentReplicasMismatch
    - KubeDeploymentRolloutStuck
    - KubeStatefulSetReplicasMismatch
    - KubeStatefulSetGenerationMismatch
    - KubeStatefulSetUpdateNotRolledOut
    - KubeDaemonSetRolloutStuck
    - KubeContainerWaiting
    - KubeDaemonSetNotScheduled
    - KubeDaemonSetMisScheduled
    - KubeJobNotCompleted
    - KubeJobFailed
    - KubeHpaReplicasMismatch
    - KubeHpaMaxedOut
  - groupName: kubernetes-resources
    namespaces:
    - aro-hcp
    - aro-hcp-admin-api
    - aro-hcp-exporter
    - arobit
    - billing
    - clusters-service
    - credential-refresher
    - fleet
    - hcp-recovery
    - kube-applier
    - maestro
    - mgmt-agent
    - monitoring
    - msi-credential-refresher
    - prometheus
    - secret-sync-controller
    - sessiongate
    alerts:
    - KubeCPUOvercommit
    - KubeMemoryOvercommit
    - KubeCPUQuotaOvercommit
    - KubeMemoryQuotaOvercommit
    - KubeQuotaAlmostFull
    - KubeQuotaFullyUsed
    - KubeQuotaExceeded
    - CPUThrottlingHigh
  - groupName: kubernetes-storage
    namespaces:
    - aro-hcp
    - aro-hcp-admin-api
    - aro-hcp-exporter
    - arobit
    - billing
    - clusters-service
    - credential-refresher
    - fleet
    - hcp-recovery
    - kube-applier
    - maestro
    - mgmt-agent
    - monitoring
    - msi-credential-refresher
    - prometheus
    - secret-sync-controller
    - sessiongate
    alerts:
    - KubePersistentVolumeFillingUp
    - KubePersistentVolumeInodesFillingUp
    - KubePersistentVolumeErrors
  - groupName: kubernetes-system
    alerts:
    - KubeVersionMismatch
    - KubeClientErrors
  - groupName: kube-apiserver-slos
    alerts:
    - KubeAPIErrorBudgetBurn
  - groupName: kubernetes-system-apiserver
    alerts:
    - KubeClientCertificateExpiration
    - KubeAggregatedAPIErrors
    - KubeAggregatedAPIDown
    - KubeAPIDown
    - KubeAPITerminatedRequests
  - groupName: kubernetes-system-kubelet
    alerts:
    - KubeNodeNotReady
    - KubeNodeUnreachable
    - KubeletTooManyPods
    - KubeNodeReadinessFlapping
    - KubeletPlegDurationHigh
    - KubeletPodStartUpLatencyHigh
    - KubeletClientCertificateExpiration
    - KubeletClientCertificateRenewalErrors
    - KubeletServerCertificateExpiration
    - KubeletServerCertificateRenewalErrors
    - KubeletDown
  - groupName: kubernetes-system-scheduler
    alerts:
    - KubeSchedulerDown
  - groupName: kubernetes-system-controller-manager
    alerts:
    - KubeControllerManagerDown
  outputReplacements:
  - from: 'job="kube-scheduler"'
    to: 'job="controlplane-kube-scheduler"'
  - from: 'job="apiserver"'
    to: 'job="controlplane-apiserver"'
  - from: 'job="etcd"'
    to: 'job="controlplane-etcd"'
  - from: 'job="cluster-autoscaler"'
    to: 'job="controlplane-cluster-autoscaler"'
  - from: 'job="kube-controller-manager"'
    to: 'job="controlplane-kube-controller-manager"'
  regexOutputReplacements:
  # absent alerts don't work correctly because they aren't associated with a specific cluster
  # The alert ends up firing with {{target.cluster}} in the title and correlation id instead of
  # an actual cluster name
  - from: 'absent\(up{job="(.+)"} == 1\)'
    to: 'count by (cluster) (up{job="$1"} == 1) == 0'
