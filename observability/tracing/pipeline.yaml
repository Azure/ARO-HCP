$schema: "pipeline.schema.v1"
serviceGroup: Microsoft.Azure.ARO.HCP.Observability
rolloutName: Observability Rollout
resourceGroups:
- name: global
  resourceGroup: '{{ .global.rg }}'
  subscription: '{{ .global.subscription.key }}'
  steps:
  - name: output
    action: ARM
    template: templates/output-global.bicep
    parameters: ./../../dev-infrastructure/configurations/output-global.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
- name: service
  resourceGroup: '{{ .svc.rg }}'
  subscription: '{{ .svc.subscription.key }}'
  steps:
  - name: deploy
    aksCluster: '{{ .svc.aks.name }}'
    action: Shell
    command: |
      kubectl apply -k deploy/
      kubectl wait --for=condition=Available deployment -n observability otel-collector --timeout=60s
      kubectl wait --for=condition=Available deployment -n observability jaeger --timeout=60s
      kubectl wait --for=condition=Available deployment -n observability lgtm --timeout=60s
    shellIdentity:
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
- name: management
  stamped: true
  resourceGroup: '{{ .mgmt.rg }}'
  subscription: '{{ .mgmt.subscription.key }}'
  steps:
  - name: deploy
    aksCluster: '{{ .mgmt.aks.name }}'
    action: Shell
    command: |
      kubectl apply -k deploy/
      kubectl wait --for=condition=Available deployment -n observability otel-collector --timeout=60s
      kubectl wait --for=condition=Available deployment -n observability jaeger --timeout=60s
      kubectl wait --for=condition=Available deployment -n observability lgtm --timeout=60s
    shellIdentity:
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
