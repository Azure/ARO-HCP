image:
  registry: '{{ .kubeEvents.image.registry }}'
  repository: '{{ .kubeEvents.image.repository }}'
  digest: '{{ .kubeEvents.image.digest }}'
enabled: {{ .kubeEvents.enabled }}
strategy:
  rollingUpdate:
    maxSurge: {{ .kubeEvents.k8s.deploymentStrategy.rollingUpdate.maxSurge }}
    maxUnavailable: {{ .kubeEvents.k8s.deploymentStrategy.rollingUpdate.maxUnavailable }}
resources:
  requests:
    cpu: '{{ .kubeEvents.k8s.resources.requests.cpu }}'
    memory: '{{ .kubeEvents.k8s.resources.requests.memory }}'
