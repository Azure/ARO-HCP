# This is just for dashboards now, do not put alerts here.
# This should be renamed 'dashboards.yaml' really, but that's non-trivial
# (and described in https://github.com/Azure/ARO-HCP/pull/5575)
grafana-dashboards:
  azureManagedFolders:
  - Azure Managed Prometheus
  - Azure Monitor
  - Microsoft Defender for Cloud
  - Azure Databases
  - High Performance Computing Clusters
  dashboardFolders:
  - name: istio
    path: ./grafana-dashboards/istio/
  - name: Infrastructure
    path: ./grafana-dashboards/infra-dashboards
  - name: Frontend
    path: ./grafana-dashboards/frontend/
  - name: Backend
    path: ./grafana-dashboards/backend/
  - name: Clusters Service
    path: ./grafana-dashboards/clusters-service
  - name: Maestro
    path: ./grafana-dashboards/maestro/
  - name: MSI Credential Refresher
    path: ./grafana-dashboards/msi-credential-refresher
  - name: Performance & Scale
    path: ./grafana-dashboards/perfscale-dashboards
  - name: HCP Kube API Server
    path: ./grafana-dashboards/kas-monitor
  - name: HCP Kube API Server KSM
    path: ./grafana-dashboards/kas-ksm-monitor
  - name: SRE User Journey
    path: ./grafana-dashboards/sre/user-journey
