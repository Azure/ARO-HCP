apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ops-ingress-gateway
  namespace: aks-istio-ingress
spec:
  gatewayClassName: istio
  infrastructure:
    annotations:
      service.beta.kubernetes.io/azure-pip-name: "aro-hcp-ops-ingress"
      service.beta.kubernetes.io/azure-load-balancer-resource-group: "hcp-underlay-dev-westus3"
  listeners:
  - name: admin-api-https
    port: 443
    protocol: HTTPS
    hostname: "admin.westus3.hcpsvc.osadev.cloud"
    tls:
      mode: Terminate
      certificateRefs:
      - name: admin-api-credential
        kind: Secret
    allowedRoutes:
      namespaces:
        from: All
  - name: sessiongate-https
    port: 443
    protocol: HTTPS
    hostname: "sessiongate.westus3.hcpsvc.osadev.cloud"
    tls:
      mode: Terminate
      certificateRefs:
      - name: sessiongate-credential
        kind: Secret
    allowedRoutes:
      namespaces:
        from: All
