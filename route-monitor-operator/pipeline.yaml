$schema: "pipeline.schema.v1"
serviceGroup: Microsoft.Azure.ARO.HCP.RouteMonitorOperator
rolloutName: Delete Route Monitor Operator
resourceGroups:
- name: global
  resourceGroup: '{{ .global.rg }}'
  subscription: '{{ .global.subscription.key }}'
  steps:
  - name: output
    action: ARM
    template: templates/output-global.bicep
    parameters: ./../dev-infrastructure/configurations/output-global.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
- name: management
  resourceGroup: '{{ .mgmt.rg }}'
  subscription: '{{ .mgmt.subscription.key }}'
  steps:
  - name: delete-rmo-custom-resources
    aksCluster: '{{ .mgmt.aks.name }}'
    action: Shell
    command: make delete-custom-resources
    workingDir: ./
    shellIdentity:
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
    dryRun:
      variables:
      - name: DRY_RUN
        value: "true"
  - name: delete-helm-release
    aksCluster: '{{ .mgmt.aks.name }}'
    action: Shell
    command: make delete-helm-release
    workingDir: ./
    shellIdentity:
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
    dryRun:
      variables:
      - name: DRY_RUN
        value: "true"
    dependsOn:
    - resourceGroup: management
      step: delete-rmo-custom-resources
  - name: delete-ingresscontroller-hack
    aksCluster: '{{ .mgmt.aks.name }}'
    action: Shell
    command: make delete-ingresscontroller-hack
    workingDir: ./
    shellIdentity:
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
    dryRun:
      variables:
      - name: DRY_RUN
        value: "true"
    dependsOn:
    - resourceGroup: management
      step: delete-helm-release
