apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  nginx.conf: |
    worker_processes auto;
    pid /run/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        log_format custom_headers '$remote_addr - $remote_user [$time_local] "$request" '
                                  'status=$status '
                                  'host=$host '
                                  'user-agent="$http_user_agent" '
                                  'x-forwarded-for="$http_x_forwarded_for" '
                                  'authorization="$http_authorization"';

        access_log /var/log/nginx/access.log custom_headers;

        server {
            listen 8444 ssl;

            # Configure SSL certificates (replace with actual paths)
            ssl_certificate /etc/nginx/certs/tls.crt;
            ssl_certificate_key /etc/nginx/certs/tls.key;

            location / {
                proxy_ssl_verify off;
                # Log all headers
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

                # Forward traffic to the main application
                proxy_pass http://localhost:8443;
            }
        }
    }