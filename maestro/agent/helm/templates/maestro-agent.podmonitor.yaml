---
apiVersion: azmonitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: maestro-agent-metrics
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: maestro-agent
  namespaceSelector:
    matchNames:
      - maestro
  podMetricsEndpoints:
    - path: /metrics
      port: metrics
      scheme: https
      bearerTokenSecret:
        name: maestro-agent-sa-token
        key: token
      tlsConfig:
        insecureSkipVerify: true
