apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    app.kubernetes.io/name: kube-prometheus
    app.kubernetes.io/part-of: kube-prometheus
    prometheus: k8s
    role: alert-rules
  name: maestro-monitoring-rules
  namespace: monitoring
spec:
  groups:
  - name: maestro
    rules:
    - alert: MaestroGRPCSourceClientExcessConnections
      # Fires when the number of registered gRPC source clients is
      # unusually high. Only clusters-service and backend connect as
      # source clients, so a sustained count above 100 indicates a
      # connection leak or clients failing to unregister properly.
      expr: |
        sum(grpc_server_registered_source_clients{namespace="maestro"}) > 100
      for: 10m
      labels:
        severity: warning
      annotations:
        description: 'Maestro gRPC server has {{ $value }} registered source clients, which is unusually high. Only clusters-service and backend are expected as source clients. This may indicate a connection leak or clients failing to unregister.'
        runbook_url: 'https://eng.ms/docs/cloud-ai-platform/azure-core/azure-cloud-native-and-management-platform/control-plane-bburns/azure-red-hat-openshift/azure-redhat-openshift-team-doc/hcp/runbooks/maestro/index.html'
        summary: 'Maestro has too many gRPC source client connections'
    - alert: MaestroRESTAPIErrorRate
      # Fires when the 5xx error rate on the Maestro REST API exceeds
      # 5%. Clusters-service and backend use this API to create, update,
      # and delete resources. A sustained error rate means resource
      # CRUD operations are failing.
      expr: |
        sum(rate(rest_api_inbound_request_count{namespace="maestro", code=~"5.."}[5m]))
        /
        sum(rate(rest_api_inbound_request_count{namespace="maestro"}[5m]))
        > 0.05
      for: 5m
      labels:
        severity: warning
      annotations:
        description: 'Maestro REST API 5xx error rate is above 5% for the last 5 minutes. Current value: {{ $value | humanizePercentage }}.'
        runbook_url: 'https://eng.ms/docs/cloud-ai-platform/azure-core/azure-cloud-native-and-management-platform/control-plane-bburns/azure-red-hat-openshift/azure-redhat-openshift-team-doc/hcp/runbooks/maestro/index.html'
        summary: 'Maestro REST API error rate is high'
    - alert: MaestroGRPCServerErrorRate
      # Fires when the gRPC error rate exceeds 5%. The gRPC server
      # handles publish (spec distribution) and subscribe (status
      # callbacks) operations. Errors here break resource distribution
      # to management clusters.
      expr: |
        sum(rate(grpc_server_processed_total{namespace="maestro", code!="OK"}[5m]))
        /
        sum(rate(grpc_server_processed_total{namespace="maestro"}[5m]))
        > 0.05
      for: 5m
      labels:
        severity: warning
      annotations:
        description: 'Maestro gRPC server error rate is above 5% for the last 5 minutes. Current value: {{ $value | humanizePercentage }}.'
        runbook_url: 'https://eng.ms/docs/cloud-ai-platform/azure-core/azure-cloud-native-and-management-platform/control-plane-bburns/azure-red-hat-openshift/azure-redhat-openshift-team-doc/hcp/runbooks/maestro/index.html'
        summary: 'Maestro gRPC server error rate is high'
    - alert: MaestroSpecControllerReconcileErrors
      # Fires when the spec controller reconcile error rate exceeds
      # 10%. The spec controller distributes resource specs to
      # management cluster work agents. Sustained errors mean resources
      # are not reaching their target clusters.
      expr: |
        sum(rate(spec_controller_event_reconcile_total{namespace="maestro", status="error"}[5m]))
        /
        sum(rate(spec_controller_event_reconcile_total{namespace="maestro"}[5m]))
        > 0.1
      for: 10m
      labels:
        severity: warning
      annotations:
        description: 'Maestro spec controller reconcile error rate is above 10% for the last 10 minutes. Resources may not be reaching management clusters. Current value: {{ $value | humanizePercentage }}.'
        runbook_url: 'https://eng.ms/docs/cloud-ai-platform/azure-core/azure-cloud-native-and-management-platform/control-plane-bburns/azure-red-hat-openshift/azure-redhat-openshift-team-doc/hcp/runbooks/maestro/index.html'
        summary: 'Maestro spec controller reconcile error rate is high'
    - alert: MaestroServerNoReadyReplicas
      # Fires when no maestro-server replicas are Ready. The readiness
      # probe is gated on Postgres connectivity (/healthcheck runs an
      # instance-row SELECT), while liveness uses the process-only
      # /livez probe and no longer restarts the pod on DB errors. A
      # sustained zero-Ready count therefore means maestro cannot reach
      # its database: Clusters Service receives 503 and HCP provisioning
      # stalls. This is the AROSLSRE-1170 outage condition.
      expr: |
        kube_deployment_status_replicas_available{namespace="maestro", deployment="maestro"} == 0
        and
        kube_deployment_spec_replicas{namespace="maestro", deployment="maestro"} > 0
      for: 10m
      labels:
        severity: critical
      annotations:
        description: 'No maestro-server replicas have been Ready for 10 minutes. Readiness is gated on Postgres connectivity, so maestro is likely unable to reach its database; Clusters Service will get 503 and HCP cluster provisioning will stall.'
        runbook_url: 'https://eng.ms/docs/cloud-ai-platform/azure-core/azure-cloud-native-and-management-platform/control-plane-bburns/azure-red-hat-openshift/azure-redhat-openshift-team-doc/hcp/runbooks/maestro/index.html'
        summary: 'No maestro-server replicas are Ready'
    - alert: MaestroServerReplicaNotReady
      # Fires when at least one (but not all) maestro-server replicas
      # are not Ready for a sustained period. Because liveness now uses
      # the process-only /livez probe, a replica that cannot reach
      # Postgres stays Running but NotReady (removed from Service
      # endpoints by readiness) instead of crash-looping, so this is the
      # primary early signal of degraded database connectivity. The
      # window is long enough to ignore normal rollouts.
      expr: |
        kube_deployment_status_replicas_available{namespace="maestro", deployment="maestro"} > 0
        and
        kube_deployment_status_replicas_available{namespace="maestro", deployment="maestro"}
          < kube_deployment_spec_replicas{namespace="maestro", deployment="maestro"}
      for: 15m
      labels:
        severity: warning
      annotations:
        description: 'At least one maestro-server replica has been NotReady for 15 minutes (available {{ $value }} below desired). Readiness is gated on Postgres connectivity, so a persistently NotReady replica usually indicates database connectivity problems.'
        runbook_url: 'https://eng.ms/docs/cloud-ai-platform/azure-core/azure-cloud-native-and-management-platform/control-plane-bburns/azure-red-hat-openshift/azure-redhat-openshift-team-doc/hcp/runbooks/maestro/index.html'
        summary: 'A maestro-server replica is not Ready'
    - alert: MaestroPostgresNotificationQueueUsageHigh
      # Fires when the PostgreSQL notification queue usage exceeds 50%.
      # The notification queue is a fixed-size 8GB buffer shared across
      # all connections. If it fills up, NOTIFY calls block, stalling
      # event processing for both spec and status controllers. A
      # sustained high usage indicates listeners are not draining
      # notifications fast enough.
      expr: |
        max(postgres_notification_queue_usage{namespace="maestro"}) > 0.5
      for: 5m
      labels:
        severity: warning
      annotations:
        description: 'Maestro PostgreSQL notification queue usage is above 50% for the last 5 minutes. Current value: {{ $value | humanizePercentage }}. If the queue fills up, NOTIFY calls will block and event processing will stall.'
        runbook_url: 'https://eng.ms/docs/cloud-ai-platform/azure-core/azure-cloud-native-and-management-platform/control-plane-bburns/azure-red-hat-openshift/azure-redhat-openshift-team-doc/hcp/runbooks/maestro/index.html'
        summary: 'Maestro PostgreSQL notification queue usage is high'
    - alert: MaestroWorkqueueDepthHigh
      # Fires when a maestro workqueue depth stays above 100 for 10
      # minutes. The workqueues buffer events between NOTIFY receipt
      # and controller reconciliation. A sustained high depth means
      # the controller is not keeping up — possibly due to a burst
      # of resynced events after a lost NOTIFY, slow reconciliation,
      # or database contention.
      expr: |
        max by(queue_name) (workqueue_depth{namespace="maestro", queue_name!=""}) > 100
      for: 10m
      labels:
        severity: warning
      annotations:
        description: 'Maestro workqueue {{ $labels.queue_name }} depth is {{ $value }}, sustained above 100 for 10 minutes. Events are not being processed fast enough.'
        runbook_url: 'https://eng.ms/docs/cloud-ai-platform/azure-core/azure-cloud-native-and-management-platform/control-plane-bburns/azure-red-hat-openshift/azure-redhat-openshift-team-doc/hcp/runbooks/maestro/index.html'
        summary: 'Maestro workqueue depth is high'
