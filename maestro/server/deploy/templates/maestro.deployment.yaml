kind: Deployment
apiVersion: apps/v1
metadata:
  name: maestro
  namespace: '{{ .Release.Namespace }}'
  labels:
    app: maestro
spec:
  selector:
    matchLabels:
      app: maestro
  replicas: {{ .Values.deployment.replicas }}
  strategy:
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: maestro
        azure.workload.identity/use: "true"
      annotations:
        checksum/credsstore: '{{ include (print $.Template.BasePath "/maestro.secretproviderclass.yaml") . | sha256sum }}'
        checksum/config: '{{ include (print $.Template.BasePath "/maestro.secret.yaml") . | sha256sum }}'
        checksum/db: '{{ include (print $.Template.BasePath "/pg.secret.yaml") . | sha256sum }}'
    spec:
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: '{{ if eq (int .Values.deployment.zoneCount) 0 }}kubernetes.azure.com/agentpool{{ else }}topology.kubernetes.io/zone{{ end }}'
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: maestro
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: maestro
      serviceAccountName: '{{ .Values.maestro.serviceAccount }}'
      volumes:
      - name: db
        secret:
          secretName: maestro-db
      - name: maestro
        secret:
          secretName: maestro
      - name: mqtt-creds
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "maestro"
      initContainers:
      {{- if not .Values.database.azureDb }}
      - name: wait-for-db
        image: '{{ .Values.database.containerizedDbImage }}'
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        - |
          set -eu
          DB_HOST=$(cat /secrets/db/db.host)
          DB_PORT=$(cat /secrets/db/db.port)
          DB_USER=$(cat /secrets/db/db.user)
          TIMEOUT=180
          ELAPSED=0
          until /usr/bin/pg_isready -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -q; do
            if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
              echo "PostgreSQL not ready after ${TIMEOUT}s, giving up"
              exit 1
            fi
            echo "waiting for postgres at $DB_HOST:$DB_PORT (${ELAPSED}s/${TIMEOUT}s)..."
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done
        volumeMounts:
        - name: db
          mountPath: /secrets/db
      {{- end }}
      - name: maestro-server-migration
        image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}@{{ .Values.image.digest }}"
        imagePullPolicy: IfNotPresent
        volumeMounts:
        - name: db
          mountPath: /secrets/db
        command:
        - /usr/local/bin/maestro
        - migration
        - --db-host-file=/secrets/db/db.host
        - --db-port-file=/secrets/db/db.port
        - --db-user-file=/secrets/db/db.user
        - --db-password-file=/secrets/db/db.password
        - --db-name-file=/secrets/db/db.name
        - --db-rootcert=
        - --db-sslmode={{ if .Values.database.azureDb }}require{{ else }}disable{{ end }}
        - --alsologtostderr
        - -v={{ .Values.maestro.glog_v }}
        - --db-auth-method={{ if .Values.database.azureDb }}az-entra{{ else }}password{{ end }}
      containers:
      - name: maestro-server
        image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}@{{ .Values.image.digest }}"
        imagePullPolicy: IfNotPresent
        volumeMounts:
        - name: db
          mountPath: /secrets/db
        - name: maestro
          mountPath: /secrets/maestro
        - name: mqtt-creds
          mountPath: /secrets/mqtt-creds
          readOnly: true
        env:
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: '{{ .Values.tracing.address }}'
        - name: OTEL_TRACES_EXPORTER
          value: '{{ .Values.tracing.exporter }}'
        - name: "AMS_ENV"
          value: "production"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.name
        command:
        - /usr/local/bin/maestro
        - server
        - --client-id=maestro-$(POD_NAME)
        - --subscription-type=broadcast
        - --db-host-file=/secrets/db/db.host
        - --db-port-file=/secrets/db/db.port
        - --db-user-file=/secrets/db/db.user
        - --db-password-file=/secrets/db/db.password
        - --db-name-file=/secrets/db/db.name
        - --db-rootcert=
        - --db-sslmode={{ if .Values.database.azureDb }}require{{ else }}disable{{ end }}
        - --db-max-open-connections={{ .Values.database.maxOpenConnections }}
        - --message-broker-config-file=/secrets/maestro/config.yaml
        - --message-broker-type=mqtt
        - --enable-https=false
        - --enable-grpc-server=true
        - --disable-grpc-tls=true
        - --server-hostname=
        - --http-server-bindport={{ .Values.maestro.httpBindPort }}
        - --grpc-server-bindport={{ .Values.maestro.grpcBindPort }}
        - --health-check-server-bindport={{ .Values.maestro.healthCheckBindPort }}
        - --enable-health-check-https=false
        - --enable-db-debug={{ .Values.database.debug }}
        - --enable-metrics-https=false
        - --http-read-timeout={{ .Values.maestro.httpReadTimeout }}
        - --http-write-timeout={{ .Values.maestro.httpWriteTimeout }}
        - --label-metrics-inclusion-duration={{ .Values.maestro.labelMetricsInclusionDuration }}
        - --alsologtostderr
        - -v={{ .Values.maestro.glog_v }}
        - --db-auth-method={{ if .Values.database.azureDb }}az-entra{{ else }}password{{ end }}
        resources:
          requests:
            cpu: '{{ .Values.deployment.resources.requests.cpu }}'
            memory: '{{ .Values.deployment.resources.requests.memory }}'
{{- if ne .Values.deployment.resources.limits.memory "unlimited" }}
          limits:
            memory: '{{ .Values.deployment.resources.limits.memory }}'
{{- end }}
        # NOTE: /healthcheck performs a Postgres read (instance row lookup), so a
        # transient DB slowdown makes this probe fail. The liveness probe is kept
        # deliberately tolerant (failureThreshold 18 x periodSeconds 10 = ~3m grace)
        # so a brief Postgres latency spike removes the pod from Service endpoints
        # via the readiness probe instead of restarting it and triggering a
        # connection-pool reset storm (AROSLSRE-1170). Proper fix: a dedicated
        # process-only liveness endpoint in maestro decoupled from the database.
        livenessProbe:
          httpGet:
            path: /healthcheck
            port: {{ .Values.maestro.healthCheckBindPort }}
            scheme: HTTP
          initialDelaySeconds: 25
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 18
        readinessProbe:
          httpGet:
            path: /healthcheck
            port: {{ .Values.maestro.healthCheckBindPort }}
            scheme: HTTP
            httpHeaders:
            - name: User-Agent
              value: Probe
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 5
