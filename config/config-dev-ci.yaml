$schema: config-dev-ci.schema.json
#
# Usage (from repo root):
#   PROJECT_ROOT_DIR="$(pwd)" && \
#   ./tooling/templatize/templatize-$(uname -m) pipeline run \
#     --config-file="${PROJECT_ROOT_DIR}/config/config-dev-ci.yaml" \
#     --topology-file="${PROJECT_ROOT_DIR}/topology-dev-ci.yaml" \
#     --dev-settings-file="${PROJECT_ROOT_DIR}/tooling/templatize/settings.yaml" \
#     --dev-environment dev-ci \
#     --service-group Microsoft.Azure.ARO.HCP.DevCI.Infra
#
# Prerequisites for manual deployment:
#   - Build templatize: make templatize
#   - Azure login: az login

clouds:
  dev:
    defaults:
      svc:
        rg: "opstool-{{ .ctx.region }}"
        subscription:
          key: "ARO Hosted Control Planes (EA Subscription 1)"
        acr:
          name: "arohcpsvcdev"
          resourceGroup: "global"
      monitoring:
        alertRuleOwningTeamTag: ""
      global:
        rg: "global"
        subscription:
          key: "ARO Hosted Control Planes (EA Subscription 1)"
        globalMSIName: "global-rollout-identity"
      dns:
        regionalSubdomain: "{{ .ctx.regionShort }}"
      opstool:
        aks:
          name: "opstool-{{ .ctx.regionShort }}"
          vnetAddressPrefix: "10.0.0.0/16"
          subnetPrefix: "10.0.1.0/24"
          podSubnetPrefix: "10.0.2.0/24"
          kubernetesVersion: "1.33"
          networkDataplane: "cilium"
          networkPolicy: "cilium"
          clusterOutboundIPAddressIPTags: ""
          etcd:
            name: "opstool-etcd-{{ .ctx.regionShort }}"
            tagKey: "aroHCPPurpose"
            tagValue: "opstool"
            softDelete: false
          systemAgentPool:
            minCount: 1
            maxCount: 3
            vmSize: "Standard_D4s_v3"
            osDiskSizeGB: 64
            zones: "1"
            zoneRedundantMode: "Disabled"
          userAgentPool:
            count: 1
            minCount: 1
            maxCount: 3
            vmSize: "Standard_D4s_v3"
            osDiskSizeGB: 64
            zones: "1"
            zoneRedundantMode: "Disabled"
          infraAgentPool:
            count: 1
            minCount: 1
            maxCount: 1
            vmSize: "Standard_D4s_v3"
            osDiskSizeGB: 64
            zones: "1"
            zoneRedundantMode: "Disabled"
        istio:
          versions: "asm-1-28"
        monitoring:
          workspaceName: "opstool-monitor-{{ .ctx.regionShort }}"
        prometheus:
          kubeStateMetrics:
            image:
              registry: "mcr.microsoft.com/oss/v2"
              repository: "kubernetes/kube-state-metrics"
              digest: "sha256:4893b3f6e4d9b2d960a6afbce18ba025d47955d10d400587bf5450d5a3f9c5bc"
          prometheusOperator:
            image:
              registry: "mcr.microsoft.com/oss/v2"
              repository: "prometheus/prometheus-operator"
              sha: "024d81f047c4b57adf38bc1ed2893ec06d468caa090ac248984e5808f37e117e"
          prometheusConfigReloader:
            image:
              registry: "mcr.microsoft.com/oss/v2"
              repository: "prometheus/prometheus-config-reloader"
              sha: "d3787bb11a5dcce60a843d50e1b2ed6a6d79a8078884f87d07cbbb93c21f6a63"
          prometheusSpec:
            image:
              registry: "mcr.microsoft.com/oss/v2"
              repository: "prometheus/prometheus"
              sha: "70296b2f2cc69c88d070fe8b627d347bd070e084c14babbc93e91583e03eca06"
        keyVault:
          name: "opstool-kv-{{ .ctx.regionShort }}"
        gateway:
          enabled: true
          name: "opstool-gateway"
          namespace: "aks-istio-ingress"
          sectionName: "tools-https"
          wildcardHostname: "*.tools.hcpsvc.osadev.cloud"
          credentialName: "tools-ingress-credential"
          publicIpName: "opstool-gateway-{{ .ctx.regionShort }}"
          publicIpResourceGroup: "opstool-{{ .ctx.region }}"
          dns:
            parentZoneName: "hcpsvc.osadev.cloud"
            parentZoneResourceGroup: "global"
            childZoneSubdomain: "tools"
            recordName: "*"
        certManager:
          namespace: "cert-manager"
          clusterIssuer:
            name: "letsencrypt-dns01"
            email: "aro-hcp-service-lifecycle-team@redhat.com"
            privateKeySecretName: "letsencrypt-dns01-account-key"
            server: "https://acme-v02.api.letsencrypt.org/directory"
            azureDNS:
              environment: "AzurePublicCloud"
        cihealth:
          image:
            registry: "quay.io"
            repository: "roivaz/cihealth"
            tag: "b18f5c1"
          disableRuntimeWorkloads: false
          app:
            replicas: 2
          postgres:
            usernameKeyVaultSecretName: "cihealth-postgres-username"
            passwordKeyVaultSecretName: "cihealth-postgres-password"
            databaseKeyVaultSecretName: "cihealth-postgres-database"
          httpRoute:
            enabled: true
            host: "cihealth.tools.hcpsvc.osadev.cloud"
            gatewayName: "opstool-gateway"
            gatewayNamespace: "aks-istio-ingress"
            sectionName: "tools-https"
            blockReviewPath: true
        alerting:
          email: "aro-hcp-service-lifecycle-team@redhat.com"
          enabled: true
        tenantQuota:
          image:
            registry: "arohcpsvcdev.azurecr.io"
            repository: "tenant-quota-collector"
            tag: "latest"
          tenants:
          - tenantId: "64dc69e4-d083-49fc-9569-ebece1dd1408"
            tenantName: "RedHat0"
            servicePrincipalClientId: "1ef710d1-afd7-4bf3-8095-e8126650607f"
            keyVaultSecretName: "custom-metrics-collector-redhat0-client-secret"
            directoryQuota: true
            subscriptions:
            - name: "ARO Hosted Control Planes (EA Subscription 1)"
              roleAssignmentLimit: 4000
              regions:
              - westus3
              - centralus
              - canadacentral
            - name: "ARO HCP E2E Hosted Clusters (EA Subscription)"
              roleAssignmentLimit: 8000
              regions:
              - westus3
              - centralus
              - canadacentral
            - name: "ARO HCP E2E Hosted Clusters 2 (EA Subscription)"
              roleAssignmentLimit: 8000
              regions:
              - westus3
              - centralus
              - canadacentral
            - name: "ARO HCP E2E Hosted Clusters - Dev - 02"
              roleAssignmentLimit: 8000
              regions:
              - westus3
              - centralus
              - canadacentral
            - name: "ARO HCP E2E Hosted Clusters - Dev - 03"
              roleAssignmentLimit: 8000
              regions:
              - westus3
              - centralus
              - canadacentral
            - name: "ARO HCP E2E Infrastructure (EA Subscription)"
              roleAssignmentLimit: 4000
              regions:
              - westus3
              - centralus
              - canadacentral
            - name: "ARO SRE Team - INT (EA Subscription 3)"
              roleAssignmentLimit: 4000
              regions:
              - uksouth
            - name: "ARO HCP E2E Hosted Clusters - Stage - 00"
              roleAssignmentLimit: 8000
              regions:
              - uksouth
            - name: "ARO HCP E2E Hosted Clusters - Prod - 00"
              roleAssignmentLimit: 8000
              regions:
              - uksouth
            - name: "ARO HCP E2E Hosted Clusters - Prod - 01"
              roleAssignmentLimit: 8000
              regions:
              - uksouth
          # Test Test Azure Red Hat OpenShift (Microsoft E2E tenant); directory quota off — subscription ARM only.
          - tenantId: "93b21e64-4824-439a-b893-46c9b2a51082"
            tenantName: "TestTestARO"
            servicePrincipalClientId: "e46ecbd4-9ef3-439e-a28a-74a4d8270349"
            keyVaultSecretName: "custom-metrics-collector-test-test-azure-arohcp-client-secret"
            directoryQuota: false
            subscriptions:
            - name: "ARO HCP E2E"
              roleAssignmentLimit: 4000
              regions:
              - eastus2euap
              - uksouth
              - switzerlandnorth
              - canadacentral
              - australiaeast
              - westeurope
              - centralindia
              - brazilsouth
              - eastus2
      ci:
        dev:
          bot:
            applicationName: "OpenShift Release Bot"
          e2eSubscriptions:
          - name: "ARO HCP E2E Hosted Clusters (EA Subscription)"
