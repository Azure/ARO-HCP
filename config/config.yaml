$schema: config.schema.json
#
#   A B O U T   N A M I N G
#
# For Azure resource names that need to be unique within a cloud, use {{ .ctx }} variables to ensure uniqueness, e.g.
# - for global, regional and SC naming use {{ .ctx.regionShort }} or {{ .ctx.region }}
# - for MGMT naming additionally use {{ .ctx.stamp }}
#
# We have different requirements for naming uniqueness for Azure resources
#
# - [globally-unique] - a resource needs to be unique within the Azure cloud.
#   This is a technical requirement of Azure for certain resource types
# - [env-unique] - a resource needs to be unique within an ARO HCP environment,
#   so across all regions of ARO HCP in the same environment.
#   An environment unique names does not need to be unique within the Azure cloud
#
# To implement names, we leverage static strings combined with the {{ .ctx }} variables, e.g.
# - {{ .ctx.environment }} length: 1-4 / starts with a character, may end with a digit
# - {{ .ctx.regionShort }} length: 2-4 / starts with a character, may end with a digit
# - {{ .ctx.region }} very long, up to 20 characters / starts with a character, may end with a digit
# - {{ .ctx.stamp }} used for uniqueness for MGMT stamps within a region / digits only
defaults:
  #
  # All defaults in this section need to be environment and region agnostic.
  #
  azureGeoShortId: "{{ .ev2.geoShortId }}"
  environmentName: "{{ .ctx.environment }}"
  region: "{{ .ctx.region }}"
  regionRG: "{{ .ctx.region }}-shared-resources"
  cloud: "{{ .ev2.cloudName }}"
  azureRegionAvailabilityZoneCount: {{ .ev2.availabilityZoneCount }}
  keyVaultDNSSuffix: "{{ .ev2.keyVault.domainNameSuffix }}"
  acrDNSSuffix: "{{ .ev2.azureContainerRegistry.domainNameSuffix }}"
  administration:
    readerGroupId: ""
    releaseManagementGroupId: ""
    sreServiceTag: "CorpNetSaw"
  # Global scope settings
  global:
    safeDnsIntAppObjectId: "" # intentionally left empty
    subscription:
      key: hcp-global
      displayName: "Azure Red Hat OpenShift HCP - {{ .ctx.environment }} - Global"
      providers:
        'Microsoft.Cdn':
          poll: true
        'Microsoft.Dashboard':
          poll: true
        'Microsoft.Network':
          poll: true
          features:
          - name: AllowBringYourOwnPublicIpAddress
            poll: true
        'Microsoft.Compute':
          poll: true
          features:
          - name: EncryptionAtHost
            poll: true
        'Microsoft.ContainerService':
          poll: true
          features:
          - name: IstioNativeSidecarModePreview
            poll: true
        'Microsoft.Kusto':
          poll: true
        'Microsoft.Support':
          poll: true
    rg: global-shared-resources
    billing:
      rg: "placeholder"
      digest: "placeholder"
      repository: billing
      subscriptionKey: "hcp-billng-{{ .ctx.environment }}"
    globalMSIName: global-ev2-identity
    nsp:
      name: nsp-global
      accessMode: 'Learning'
    keyVault:
      name: 'arohcp{{ .ctx.environment }}-global' # [globally-unique]
      private: false
      softDelete: true
      tagKey: aroHCPPurpose
      tagValue: global
      encryptionKeyName: secretSyncKey
    managementGroup:
      id: "empty-sentinel"
    groupQuota:
      id: "empty-sentinel"
      displayName: "empty-sentinel"
  # ACR
  acr:
    svc:
      name: 'arohcpsvc{{ .ctx.environment }}' # [globally-unique]
      zoneRedundantMode: Enabled
      untaggedImagesRetention:
        enabled: true
        days: 90
    ocp:
      name: 'arohcpocp{{ .ctx.environment }}' # [globally-unique]
      zoneRedundantMode: Enabled
      untaggedImagesRetention:
        enabled: true
        days: 90
  # TRANSIENT — STG-global "V2" migration scaffolding. Every pipeline (including
  # the stg-only V2 copies) is preprocessed by helmtest against the dev render
  # and by EV2 manifest generation for all public envs, and the renderer uses
  # missingkey=error — so stgGlobalV2 must resolve in every cloud/env. Only stg
  # supplies real values (config.msft.clouds-overlay.yaml); everything else stays
  # empty-sentinel and is never consumed (V2 pipelines are stg/uksouth-only).
  # Removed at decommission.
  stgGlobalV2:
    acrSvcName: "empty-sentinel"
    acrOcpName: "empty-sentinel"
    globalKeyVaultName: "empty-sentinel"
    genevaKeyVaultName: "empty-sentinel"
    frontDoorName: "empty-sentinel"
    frontDoorKeyVaultName: "empty-sentinel"
    oidcStorageAccountName: "empty-sentinel"
    svcParentZoneName: "empty-sentinel"
    cxParentZoneName: "empty-sentinel"
    kustoName: "empty-sentinel"
    grafanaName: "empty-sentinel"
    # Space-separated "principalId/principalType/role" list scoped to the
    # transient arohcp-stg2 Grafana. Defaults to empty (no assignments); the
    # real value is set in the cloud overlay for stg. Kept separate from
    # monitoring.grafanaRoles so assigning a role on arohcp-stg2 never touches
    # the shared arohcp-stg (which already holds the grant manually).
    grafanaRoles: ""
    grafanaMajorVersion: "empty-sentinel"
    billingKustoName: "empty-sentinel"
    billingKustoSku: "empty-sentinel"
  # Image Registry Policy
  imageRegistryPolicy:
    extraAllowedRegistries: ""
    validationActions: Audit
  # ACR Pull
  acrPull:
    image:
      registry: mcr.microsoft.com
      repository: aks/msi-acrpull
      digest: sha256:17dda36c3ba6059411e813b03a6ee9fc11f1a4f737cf42e1239bd6fef558b9c5 # v0.1.24 (2026-06-24 16:14)
  # AKS Runtime Image
  aksCommandRuntime:
    image:
      registry: mcr.microsoft.com
      repository: aks/command/runtime
      digest: sha256:d01328a795b25e53de454b3a5fe987302d5df608ef286550f0eadab48881334f # master.260714.2 (2026-07-14 00:00)
  # Arobit
  arobit:
    forwarder:
      image:
        registry: mcr.microsoft.com
        repository: oss/v2/fluent/fluent-bit
        digest: sha256:1c08423483e1c4bd336c1102a6f7d2eb4cd436791956abb18b342acbfc680b52 # v5.0.4 (2026-07-14 11:04)
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 1248Mi
    kusto:
      enabled: false
      buffering: true
      environmentName: "{{ .ctx.environment }}"
    mdsd:
      enabled: true
      image:
        registry: mcr.microsoft.com
        repository: geneva/distroless/mdsd
        digest: sha256:70396486115428e2f2497c37de37883009f66485990a159194382b20239d4da8 # 1.42.0-20260714-3 (2026-07-14 16:51)
  # Kube Events
  kubeEvents:
    enabled: true
    image:
      registry: kubernetesshared.azurecr.io
      repository: shared/kube-events
      digest: sha256:7d1ae25f8df0e0ea3ebe829a912e4aef05f6af265f781e8209a93c41f6c38d15 # 20260719.1 (2026-07-19 03:25)
    k8s:
      namespace: monitoring
      serviceAccountName: ke-serviceaccount
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          memory: unlimited
  # ARO HCP Metrics Exporter
  customExporter:
    managedIdentityName: "aro-hcp-exporter"
    enabledCollectors: "service-tag-usage,kusto-logs-current"
    k8s:
      namespace: aro-hcp-exporter
      serviceAccountName: aro-hcp-exporter
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: unlimited
    image:
      registry: arohcpsvcdev.azurecr.io
      repository: arohcpmetrics
      digest: sha256:335a5217890f8137c8bce97c212762dcf584ffb8d5c193499880dcbb4acd4673 # b559012 (2026-06-12 19:17)
  # Mgmt Agent Controller
  mgmtAgent:
    managedIdentityName: mgmt-agent
    image:
      registry: arohcpsvcdev.azurecr.io
      repository: mgmt-agent
      digest: sha256:a046f8e9dc974b0b76bad0ad16ce19bba44dda5fddc48998adec64009b6dfb7b # 55611cd (2026-05-29 22:32)
    k8s:
      namespace: mgmt-agent
      serviceAccountName: mgmt-agent
      replicas: 2
  # Kube Applier Controller
  kubeApplier:
    image:
      registry: arohcpsvcdev.azurecr.io
      repository: kube-applier
      digest: sha256:bf05fa14daa56bd1275fd28da3c9348fdaa232b7f1f7cfe7e9cfa83072c63894 # f55beeb (2026-05-29 19:42)
    cosmosContainerName: "Manifests-MC-{{ .ctx.stamp }}"
    partitionKey: "/providers/microsoft.redhatopenshift/stamps/{{ .ctx.stamp }}/managementclusters/default"
    cosmosContainerMaxScale: 8000
    managedIdentityName: kube-applier
    k8s:
      replicas: 2
      namespace: kube-applier
      serviceAccountName: kube-applier
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: unlimited
  # Secret Sync Controller
  secretSyncController:
    image:
      registry: registry.k8s.io
      repository: secrets-store-sync/controller
      digest: sha256:72abeb657cfbdd6a5891fc102a16429875d70c5932ad5994524d0246db914013 # v0.0.5 (2026-06-18 13:02)
    providerImage:
      registry: mcr.microsoft.com
      repository: oss/v2/azure/secrets-store/provider-azure
      digest: sha256:a1e019fc8a1a43e5c28335f48d9ee7e2827a4d6e9b7a25fe6738e89ee1c6ec44 # v1.8.2 (2026-07-14 01:29)
    k8s:
      namespace: secret-sync-controller
      serviceAccountName: secrets-store-sync-controller-manager
      resources:
        requests:
          cpu: 50m
          memory: 100Mi
        limits:
          memory: unlimited
  tenantId: ""
  ev2:
    assistedId:
      certificate:
        keyVault: "empty-sentinel" # we don't need one in public cloud, but we need a value to validate the field
        name: ""
      applicationId: ""
      dstsHost: "{{ .ev2.geneva.actions.homeDsts.primary }}"
  geneva:
    principalId: ""
    resourceContributor: ""
    metrics:
      cluster:
        account: AzureRedHatOpenShiftCluster
      rp:
        account: AzureRedHatOpenShiftRP
    logs:
      administrators:
        alias:
        - AME\WEINONGW
        securityGroup: AME\TM-AzureRedHatOpenShift-Leads
      adminCertificateDomain: "geneva.keyvault.aro-hcp-global.azure.com"
      adminCertName: "geneva-logs-admin"
      adminCertSan: "geneva-logs-admin.geneva.keyvault.aro-hcp-global.azure.com"
      contentType: x-pkcs12
      manage: Enabled
      certificateIssuer: Self
      certificateDomain: "geneva.keyvault.aro-hcp.azure.com"
      typeName: ""
      environment: "Test"
      cluster:
        secretName: clusterlogs
        accountName: placeholder
        namespace: ""
        san: "empty-sentinel"
        configVersion: "1"
      rp:
        secretName: rplogs
        accountName: placeholder
        namespace: ""
        san: "empty-sentinel"
        configVersion: "1"
    actions:
      serviceTag: GenevaActions
      targetRegion: "{{ .ev2.regionFriendlyName }}"
      endpointName: "{{ .ctx.region }}"
      endpointUrl: "" # set per-cloud
      keyVault:
        name: "arohcp{{ .ctx.environment }}-geneva-kv" # [globally-unique]
        private: false
        softDelete: true
        tagKey: aroHCPPurpose
        tagValue: geneva-actions
      certificate:
        name: genevaAction
        issuer: OneCertV2-PrivateCA
        san: ""
        contentType: x-pkcs12
        manage: Enabled
      allowedAcisExtensions: "AzureRedHatHypershiftExtension,Azure Red Hat Hypershift"
      genevaActionsPrincipalId: ""
      application:
        name: "arohcp-ga-{{ .ctx.environment }}" # [tenant unique]
        applicationId: "empty-sentinel"
        useSNI: true
        manage: true
      publish:
        buildId: 0
        packageName: "empty-sentinel"
        betaPackageName: "empty-sentinel"
        betaCertificate:
          # ev2.assistedId.certificate can be used for primary endpoint, but the beta endpoint requires a different certificate
          keyVault: "empty-sentinel"
          name: "empty-sentinel"
  kusto:
    location: "{{ .ctx.region }}"
    enableAutoScale: false
    manageInstance: false
    autoScaleMin: 2
    autoScaleMax: 10
    rg: "hcp-kusto-{{ .ctx.environment }}-{{ .ev2.geoShortId }}"
    kustoName: "hcp-{{ .ctx.environment }}-{{ .ev2.geoShortId }}"
    serviceLogsDatabase: "ServiceLogs"
    hostedControlPlaneLogsDatabase: "HostedControlPlaneLogs"
    monitoringEventsDatabase: "MonitoringEvents"
    adminGroups: ""
    viewerGroups: ""
    viewerIdentities: ""
    sku: ""
    tier: ""
  auditLogsEventHub:
    name: "aks-auditlogs"
    enabled: true
    namespace: "hcp-{{ .ctx.environment }}-{{ .ctx.region }}-auditlogs-eh"
    authRuleName: "SendRule"
    kustoConsumerGroupName: "AuditLogsToKusto"
    kustoDataConnectionName: "{{ .ctx.environment }}-{{ .ctx.region }}-auditlogs"
    rg: "{{ .ctx.region }}-shared-resources"
  alertEventsEventHub:
    name: "metric-alerts"
    kustoConsumerGroupName: "AlertEventsToKusto"
    kustoDataConnectionName: "{{ .ctx.environment }}-{{ .ctx.region }}-alert-events"
  # Hypershift
  hypershift:
    image:
      registry: quay.io
      repository: redhat-services-prod/crt-redhat-acm-tenant/hypershift/hypershift-operator
      digest: sha256:16ab4ea361099dfae1d185b5b3ab08b7dca8e52fcfe58e46114db16850c06aaa # 6142e463a546266c45e90315d99ddcc57d89a5cd (2026-07-18 00:05)
    namespace: hypershift
    additionalInstallArg: '--enable-cpo-overrides'
    # By default we set it to empty as this tag is only required for msft environments. We override
    # this value in sdp pipelines for msft environments.
    sharedIngressIPTag: ''
    sharedIngressImage:
      registry: quay.io
      repository: redhat-user-workloads/crt-redhat-acm-tenant/hypershift-shared-ingress-main
      # This image is rendered into dataplane worker HAProxy static pods through
      # IMAGE_SHARED_INGRESS_HAPROXY. Keep it manually pinned: digest bumps change
      # the NodePool MachineConfig hash and roll workers.
      digest: sha256:5e22710fe440869655329ecc0ef57b4ae15f4ef96e74a8904b1e6fafc0d87678 # pinned, see AROSLSRE-978
    limitClusterSizes: false
  # Log settings
  logs:
    mdsd:
      namespace: arobit
      msiName: logs-mdsd
      serviceAccountName: arobit-forwarder
      cert:
        name: ""
        type: ""
        issuer: ""
      subscriptions: []
  # Monitoring
  monitoring:
    grafanaName: "arohcp-{{ .ctx.environment }}"
    grafanaSku: "Standard"
    # Format:
    #   Multiline string using '>-' YAML block scalar
    #   One item per line, formatted as: UUID/PrincipalType/RoleName
    # Our yaml formatter does not allow >- when there is no value, so remember
    # to chage "" to >- when you add a value.
    grafanaRoles: ""
    crossTenantSecurityGroup: ""
    svcWorkspaceName: 'services-{{ .ctx.region }}'
    hcpWorkspaceName: 'hcps-{{ .ctx.region }}'
    amwScaling:
      # Azure Monitor Workspace static ingestion limits (legacy, being replaced by AMW scaling controller)
      # 2M initial limit, bump per env when hitting 50% utilization (Azure requires <200% increase)
      pollInterval: 30m
    alertRuleOwningTeamTag: ""
    # alertsEnabled: disables the Azure Action Group resource (affects all lanes: SRE, SL, RP, MSFT)
    alertsEnabled: false
    alertSeverityCeiling: 0
    eventHubAlerting:
      enabled: false
    icm:
      manageConnection: true
      connectionName: ""
      connectionId: ""
      environment: ""
      # enabled: per-lane switch. When false, the lane's action group is removed from
      # its rule wiring, so those rules still evaluate in Prometheus but do not generate
      # IcM tickets. Only has effect when manageConnection=true and alertsEnabled=true.
      sre:
        enabled: true
        actionGroupName: ""
        actionGroupShortName: ""
        routingId: ""
        automitigationEnabled: ""
      sl:
        enabled: true
        actionGroupName: ""
        actionGroupShortName: ""
        routingId: ""
        automitigationEnabled: ""
      rp:
        enabled: true
        actionGroupName: ""
        actionGroupShortName: ""
        routingId: ""
        automitigationEnabled: ""
      msft:
        enabled: true
        actionGroupName: ""
        actionGroupShortName: ""
        routingId: ""
        automitigationEnabled: ""
  quotaizer:
    quotaGroup:
      id: "aro-{{ .ctx.environment }}-{{ .ctx.region }}"
      displayName: "HCP - {{ .ctx.environment }} {{ .ctx.region }}"
    managedIdentityName: aro-quotaizer
    image:
      registry: "empty-sentinel"
      repository: "empty-sentinel"
      digest: ""
  velero:
    server:
      registry: registry.stage.redhat.io
      repository: oadp/oadp-velero-rhel9
      digest: sha256:438b40f9cb4c76e5d4aed644d78a10aa8c70ea4f161b94eacbed12dc9212b6e9 # 1.6.1 (2026-07-17 18:28)
    azurePlugin:
      registry: registry.stage.redhat.io
      repository: oadp/oadp-velero-plugin-for-microsoft-azure-rhel9
      digest: sha256:a14dff80dadf5608e4a340204e1af8d8100874b8a4f7398190239fcb245501c6 # 1.6.1 (2026-07-17 18:27)
    hypershiftPlugin:
      registry: registry.stage.redhat.io
      repository: oadp/oadp-hypershift-velero-plugin-rhel9
      digest: sha256:1131a2419d8ba9ba1c4a916b7be62281452c62f13394adf9892ad82a682184de # 1.6.1 (2026-07-17 18:23)
  # SVC cluster specifics
  svc:
    subscription:
      usePlannedQuota: true
      key: "hcp-{{ .ctx.environment }}-svc-{{ .ctx.region }}"
      displayName: "Azure Red Hat OpenShift HCP - {{ .ev2.regionFriendlyName }} - SVC"
      providers:
        'Microsoft.Insights':
          poll: true
        'Microsoft.Dashboard':
          poll: true
        'Microsoft.Network':
          poll: true
          features:
          - name: AllowBringYourOwnPublicIpAddress
            poll: true
        'Microsoft.Compute':
          poll: true
          features:
          - name: EncryptionAtHost
            poll: true
        'Microsoft.ContainerService':
          poll: true
          features:
          - name: IstioNativeSidecarModePreview
            poll: true
          - name: ManagedGatewayAPIPreview
            poll: true
        'Microsoft.DbForPostgreSQL':
          poll: true
        'Microsoft.Kusto':
          poll: true
        'Microsoft.Quota':
          poll: true
    rg: "hcp-underlay-{{ .ctx.environment }}-{{ .ctx.region }}-svc"
    nsp:
      name: nsp-{{ .ctx.regionShort }}-svc
    istio:
      istioctlVersion: 1.30.3 # 1.30.3 (2026-07-16 16:50)
      tag: "prod-stable"
      ingressGatewayIPAddressName: "aro-hcp-istio-ingress"
      ingressGatewayIPAddressIPTags: ""
    opsIngress:
      gateway:
        ipAddressName: "aro-hcp-ops-ingress"
        ipAddressTags: ""
    aks:
      name: "{{ .ctx.environment }}-{{ .ctx.region }}-svc-1" # [env-unique]
      vnetAddressPrefix: "10.128.0.0/14"
      subnetPrefix: "10.128.8.0/21"
      podSubnetPrefix: "10.128.64.0/18"
      kubernetesVersion: "1.35"
      networkDataplane: "cilium"
      networkPolicy: "cilium"
      upgradeSettings:
        maxSurge: "10%"
        maxUnavailable: "0"
      systemAgentPool:
        name: 'system'
        minCount: 1
        maxCount: 3
        vmSize: 'Standard_D2s_v3'
        osDiskSizeGB: 32
        poolCount: 3
        zones: ""
        zoneRedundantMode: "Auto"
      userAgentPool:
        name: 'u64d8ds6'
        minCount: 1
        maxCount: 3
        vmSize: 'Standard_D8ds_v6'
        osDiskSizeGB: 64
        poolCount: 3
        zones: ""
        zoneRedundantMode: "Auto"
      infraAgentPool:
        name: 'infra'
        minCount: 1
        maxCount: 3
        vmSize: 'Standard_D4ds_v5'
        osDiskSizeGB: 32
        poolCount: 2
        zones: ""
        zoneRedundantMode: "Auto"
      etcd:
        name: "ah-{{ .ctx.environment }}-se-{{ .ctx.regionShort }}-1" # [globally-unique]
        softDelete: true
        private: true
        tagKey: aroHCPPurpose
        tagValue: etcd-encryption
      clusterOutboundIPAddressIPTags: ""
    prometheus:
      namespace: prometheus
      namespaceNetworkPolicyGroup: ""
      prometheusOperator:
        image:
          registry: mcr.microsoft.com/oss/v2
          repository: prometheus/prometheus-operator
          sha: dba7abd5f2d0045614ad81d3b594784a6145e18c2ed1fbec2b9030f920b53079 # v0.92.1 (2026-07-13 23:18)
        version: ""
      prometheusSpec:
        image:
          registry: mcr.microsoft.com/oss/v2
          repository: prometheus/prometheus
          sha: 58e9ee63813d008bfe6ea415180d3e87898fb25fc357cdfcd6aa08cb689a4975 # v3.12.0 (2026-07-15 13:55)
        version: ""
        resources:
          requests:
            cpu: NONE
            memory: NONE
          limits:
            memory: NONE
        replicas: 2
        shards: 2
      prometheusConfigReloader:
        image:
          registry: mcr.microsoft.com/oss/v2
          repository: prometheus/prometheus-config-reloader
          sha: 8e259204db001c773408a4dfe5f028ef4606c55d48f9e5273b8659abb559c7ff # v0.92.1 (2026-07-14 01:51)
      kubeStateMetrics:
        image:
          registry: mcr.microsoft.com/oss/v2
          repository: kubernetes/kube-state-metrics
          digest: sha256:57fe6a6f0760133637b2329b67f753d368e1d0c8a38ae1b8ee14bde15127afc7 # v2.19.0 (2026-07-15 12:31)
      admissionWebhook:
        patch:
          image:
            registry: arohcpsvcdev.azurecr.io
            repository: k8s-cache/ingress-nginx/kube-webhook-certgen
            sha: 01038e7de14b78d702d2849c3aad72fd25903c4765af63cf16aa3398f5d5f2dd # v1.6.9 (2026-03-19 15:52)
      thanos:
        image:
          registry: arohcpsvcdev.azurecr.io
          repository: thanos/thanos
          tag: v0.41.0
          sha: 6249f7aaadd3695df637fb2eb4cb9a9955611eee691c3970892fe9c0dc3f2db6 # v0.42.2 (2026-07-16 20:22)
  # MGMT cluster specifics
  mgmt:
    stamps:
      count: 1
    defaultStorageClassSkuName: "PremiumV2_LRS"
    hcpBackups:
      storageAccount:
        name: "oadp{{ .ctx.environment }}{{ .ctx.regionShort }}{{ .ctx.stamp }}" # [globally-unique]
        zoneRedundantMode: Auto
        public: false
      storageAccountContainerName: "backups"
    subscription:
      usePlannedQuota: true
      key: "hcp-{{ .ctx.environment }}-mgmt-{{ .ctx.region }}-{{ .ctx.stamp }}"
      displayName: "Azure Red Hat OpenShift HCP - {{ .ev2.regionFriendlyName }} - MGMT - {{ .ctx.stamp }}"
      providers:
        'Microsoft.Insights':
          poll: true
        'Microsoft.Storage':
          poll: true
        'Microsoft.Network':
          poll: true
          features:
          - name: AllowBringYourOwnPublicIpAddress
            poll: true
        'Microsoft.Compute':
          poll: true
          features:
          - name: EncryptionAtHost
            poll: true
        'Microsoft.ContainerService':
          poll: true
          features:
          - name: IstioNativeSidecarModePreview
            poll: true
        'Microsoft.ContainerInstance':
          poll: true
        'Microsoft.Quota':
          poll: true
    rg: "hcp-underlay-{{ .ctx.environment }}-{{ .ctx.region }}-mgmt-{{ .ctx.stamp }}"
    applyKubeletFixes: true
    nsp:
