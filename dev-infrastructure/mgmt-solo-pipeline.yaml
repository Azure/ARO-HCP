$schema: "pipeline.schema.v1"
serviceGroup: Microsoft.Azure.ARO.HCP.Management.Infra.Solo
rolloutName: Management Cluster Rollout
resourceGroups:
- name: global
  resourceGroup: '{{ .global.rg }}'
  subscription: '{{ .global.subscription.key }}'
  steps:
  - name: output
    action: ARM
    template: templates/output-global.bicep
    parameters: configurations/output-global.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
- name: regional
  resourceGroup: '{{ .regionRG }}'
  subscription: '{{ .svc.subscription.key }}'
  steps:
  - name: output
    action: ARM
    template: templates/output-region.bicep
    parameters: configurations/output-region.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
- name: kusto
  resourceGroup: '{{ .kusto.rg }}'
  subscription: '{{ .global.subscription.key }}'
  steps:
  - name: output
    action: ARM
    template: templates/kusto-lookup.bicep
    parameters: configurations/kusto-lookup.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
- name: management
  resourceGroup: '{{ .mgmt.rg }}'
  subscription: '{{ .mgmt.subscription.key }}'
  steps:
  - name: subscription-output
    action: ARM
    template: templates/subscription-lookup.bicep
    parameters: configurations/subscription-lookup.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
  - name: infra
    action: ARM
    template: templates/mgmt-infra.bicep
    parameters: configurations/mgmt-infra.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    variables:
    - name: clusterServiceMIResourceId
      # we don't need to grant KV permissions to CS as there is no CS in the MC solo deployment
      value: "-"
  # Build the MC
  # The swift-vnet-permissions and swift-vnet steps run unconditionally so the step graph is
  # static (EV2 does not support Go-template {{ if }} guards - they render at generation time
  # and would always evaluate truthy). Swift is gated instead at the Bicep layer (enableSwift
  # param) and at the script layer (ENABLE_SWIFT), which both resolve to the real per-env value.
  - name: swift-vnet-permissions
    action: ARM
    template: templates/swift-vnet-permissions.bicep
    parameters: configurations/swift-vnet-permissions.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    variables:
    - name: deploymentMsiId
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
    dependsOn:
    - resourceGroup: management
      step: subscription-output
  # Create/tag the Swift VNet via a container group assigned globalMSI (scripts/swift-vnet.sh).
  # Create, wait, log and cleanup happen in this single Shell step, so there is no cross-step
  # async race; the VNet write itself is performed by globalMSI from inside the container. The
  # script is a no-op when ENABLE_SWIFT is false, keeping the step graph stable.
  - name: swift-vnet
    action: Shell
    command: ./swift-vnet.sh
    workingDir: ./scripts
    variables:
    - name: ENABLE_SWIFT
      configRef: mgmt.aks.enableSwiftV2Vnet
    - name: VNET_NAME
      value: aks-net
    - name: VNET_ADDRESS_PREFIX
      configRef: mgmt.aks.vnetAddressPrefix
    - name: RESOURCE_GROUP
      configRef: mgmt.rg
    - name: SUBSCRIPTION_ID
      input:
        resourceGroup: management
        step: subscription-output
        name: subscriptionId
    - name: DEPLOYMENT_MSI_ID
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
    dependsOn:
    - resourceGroup: management
      step: swift-vnet-permissions
  - name: cluster
    action: ARM
    template: templates/mgmt-cluster.bicep
    parameters: configurations/mgmt-cluster.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    variables:
    - name: ocpAcrResourceId
      input:
        resourceGroup: global
        step: output
        name: ocpAcrResourceId
    - name: svcAcrResourceId
      input:
        resourceGroup: global
        step: output
        name: svcAcrResourceId
    - name: globalMSIId
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
    - name: azureMonitoringWorkspaceId
      input:
        resourceGroup: regional
        step: output
        name: azureMonitoringWorkspaceId
    - name: maestroEventGridNamespaceId
      input:
        resourceGroup: regional
        step: output
        name: maestroEventGridNamespaceId
    dependsOn:
    - resourceGroup: management
      step: infra
    - resourceGroup: management
      step: swift-vnet
  # Install ACRpull
  - name: acrpull
    aksCluster: '{{ .mgmt.aks.name }}'
    action: Helm
    releaseName: acrpull
    releaseNamespace: acrpull
    chartDir: ./../acrpull/deploy
    valuesFile: ./../acrpull/deploy/values.yaml
    kustoEndpoint:
      resourceGroup: kusto
      step: output
      name: kustoUri
    kustoDatabase: '{{ .kusto.serviceLogsDatabase }}'
    kustoTable: 'containerLogs'
    dependsOn:
    - resourceGroup: management
      step: cluster
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    automatedRetry:
      errorContainsAny:
      - "500 Internal Server Error"
      - "Internal error occurred"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  # Install cluster patches
  - name: fixes
    aksCluster: '{{ .mgmt.aks.name }}'
    action: Shell
    command: make -C ../mgmt-fixes deploy
    variables:
    - name: APPLY_KUBELET_FIXES
      configRef: mgmt.applyKubeletFixes
    dependsOn:
    - resourceGroup: management
      step: cluster
