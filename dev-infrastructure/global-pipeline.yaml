#
# Purpose: Manage global infrastructure for ARO HCP
# Managed Resources:
# * global ARO HCP parent zones and ensures proper delegation
# * global Grafana instance
# * global MSI for Shell Step executions
# * SVC and OCP ACRs
# * image mirroring jobs
#
$schema: "pipeline.schema.v1"
serviceGroup: Microsoft.Azure.ARO.HCP.Global
rolloutName: Global Resource Rollout
buildStep:
  command: bash
  args:
  - -c
  - |
    set -o errexit
    set -o nounset
    set -o pipefail
    tmp="$(mktemp ./scripts/restore-entra-app/restore-entra-app.XXXXXX)"
    trap 'rm -f "${tmp}"' EXIT
    CGO_ENABLED=0 go build -o "${tmp}" ./scripts/restore-entra-app
    chmod 0755 "${tmp}"
    mv "${tmp}" ./scripts/restore-entra-app/restore-entra-app
    trap - EXIT
resourceGroups:
- name: singleton
  resourceGroup: '{{ .global.rg }}'
  subscription: '{{ .global.subscription.key }}'
  executionConstraints:
  - clouds:
    - public
    environments:
    - int
    regions:
    - uksouth
  - clouds:
    - public
    environments:
    - stg
    regions:
    - uksouth
  - clouds:
    - public
    environments:
    - prod
    regions:
    - eastus2euap
    - uksouth
  steps:
  - name: infra
    action: ARM
    template: templates/global-infra.bicep
    parameters: configurations/global-infra.tmpl.bicepparam
    deploymentLevel: ResourceGroup
  - name: output
    action: ARM
    template: templates/output-global.bicep
    parameters: configurations/output-global.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
    dependsOn:
    - resourceGroup: singleton
      step: infra
  - name: grafana-monitoring-reader
    action: ARM
    template: templates/grafana-monitoring-reader.bicep
    parameters: configurations/grafana-monitoring-reader.tmpl.bicepparam
    deploymentLevel: Subscription
    variables:
    - name: grafanaPrincipalId
      input:
        resourceGroup: singleton
        step: output
        name: grafanaPrincipalId
    dependsOn:
    - resourceGroup: singleton
      step: output
  - name: global-kv-private-issuer
    action: SetCertificateIssuer
    secretKeyVault:
      configRef: ev2.assistedId.certificate.keyVault
    secretName:
      configRef: ev2.assistedId.certificate.name
    applicationId:
      configRef: ev2.assistedId.applicationId
    vaultBaseUrl:
      input:
        resourceGroup: singleton
        step: output
        name: globalKeyVaultUrl
    issuer:
      value: OneCertV2-PrivateCA
  - name: geneva-kv-private-issuer
    action: SetCertificateIssuer
    secretKeyVault:
      configRef: ev2.assistedId.certificate.keyVault
    secretName:
      configRef: ev2.assistedId.certificate.name
    applicationId:
      configRef: ev2.assistedId.applicationId
    vaultBaseUrl:
      input:
        resourceGroup: singleton
        step: output
        name: genevaActionKeyVaultUrl
    issuer:
      value: OneCertV2-PrivateCA
  - name: geneva-restore-permissions
    action: ARM
    template: templates/geneva-restore-permissions.bicep
    parameters: configurations/geneva-restore-permissions.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    dependsOn:
    - resourceGroup: singleton
      step: output
  # Restore the Geneva Actions Entra app/SP if it is in the 30-day soft-delete
  # window. A soft-deleted object keeps its uniqueName reservation, which makes
  # the declarative create in geneva-identities fail with a misleading
  # "Failed to update one or more relationships in 'owners'" error. The tool is
  # idempotent: live app -> no-op; nothing deleted -> no-op; soft-deleted ->
  # restore app (+ SP). See AROSLSRE-1130.
  - name: restore-geneva-actions-app
    action: Shell
    command: ./scripts/restore-entra-app/restore-entra-app
    workingDir: .
    shellIdentity:
      input:
        resourceGroup: singleton
        step: output
        name: globalMSIId
    variables:
    - name: APPLICATION_NAME
      configRef: geneva.actions.application.name
    automatedRetry:
      errorContainsAny:
      # The app-role grant from geneva-restore-permissions can take a short
      # time to propagate into freshly issued MSI tokens.
      - "Authorization_RequestDenied"
      - "unauthorized"
      - "InvalidAuthenticationToken"
      maximumRetryCount: 5
      durationBetweenRetries: 30s
    dependsOn:
    - resourceGroup: singleton
      step: geneva-restore-permissions
  - name: geneva-identities
    action: ARM
    template: templates/geneva-identities.bicep
    parameters: configurations/geneva-identities.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    dependsOn:
    - resourceGroup: singleton
      step: global-kv-private-issuer
    - resourceGroup: singleton
      step: geneva-kv-private-issuer
    - resourceGroup: singleton
      step: restore-geneva-actions-app
  - name: mise-identity
    action: ARM
    template: templates/mise-identity.bicep
    parameters: configurations/mise-identity.tmpl.bicepparam
    deploymentLevel: ResourceGroup
  - name: housekeeping
    action: Shell
    command: ./global-housekeeping.sh
    workingDir: ./scripts
    variables:
    - name: GLOBAL_RESOURCE_GROUP
      configRef: global.rg
    shellIdentity:
      input:
        resourceGroup: singleton
        step: output
        name: globalMSIId
    dependsOn:
    - resourceGroup: singleton
      step: infra
  - name: grafana-dashboards
    action: GrafanaDashboards
    grafanaName: "{{ .monitoring.grafanaName }}"
    observabilityConfig: ./../observability/observability.yaml
    identityFrom:
      resourceGroup: singleton
      step: output
      name: globalMSIId
    dependsOn:
    - resourceGroup: singleton
      step: housekeeping
    - resourceGroup: singleton
      step: output
  # creates DNS delegation for the ARO HCP global SVC zone
  - name: svcChildZone
    action: DelegateChildZone
    parentZone:
      configRef: dns.parentZoneName
    childZone:
      configRef: dns.svcParentZoneName
    secretKeyVault:
      configRef: ev2.assistedId.certificate.keyVault
    secretName:
      configRef: ev2.assistedId.certificate.name
    dstsHost:
      configRef: ev2.assistedId.dstsHost
    deploymentMode:
      value: "Incremental"
    dependsOn:
    - resourceGroup: singleton
      step: infra
  # creates DNS delegation for the ARO HCP global CX zone
  - name: cxChildZone
    action: DelegateChildZone
    parentZone:
      configRef: dns.parentZoneName
    childZone:
      configRef: dns.cxParentZoneName
    secretKeyVault:
      configRef: ev2.assistedId.certificate.keyVault
    secretName:
      configRef: ev2.assistedId.certificate.name
    dstsHost:
      configRef: ev2.assistedId.dstsHost
    deploymentMode:
      value: "Incremental"
    dependsOn:
    - resourceGroup: singleton
      step: infra
  # create global ARO HCP ACRs for OCP and SVC images
  - name: acrs
    action: ARM
    template: templates/global-acr.bicep
    parameters: configurations/global-acr.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    dependsOn:
    - resourceGroup: singleton
      step: infra
  # ingests secrets into the global KV
  - name: decrypt-and-ingest-secrets
    action: SecretSync
    keyVault: '{{ .global.keyVault.name }}'
    configurationFile: 'data/encryptedsecrets.yaml'
    encryptionKey: '{{ .global.keyVault.encryptionKeyName }}'
    dependsOn:
    - resourceGroup: singleton
      step: infra
    identityFrom:
      resourceGroup: singleton
      step: output
      name: globalMSIId
  # mirror oc-mirror image
  - name: mirror-oc-mirror-image
    action: ImageMirror
    targetACR:
      configRef: 'acr.svc.name'
    sourceRegistry:
      configRef: imageSync.ocMirror.image.registry
    repository:
      configRef: imageSync.ocMirror.image.repository
    digest:
      configRef: imageSync.ocMirror.image.digest
    pullSecretKeyVault:
      configRef: global.keyVault.name
    pullSecretName:
      configRef: imageSync.ondemandSync.pullSecretName
    dependsOn:
    - resourceGroup: singleton
      step: acrs
    - resourceGroup: singleton
      step: decrypt-and-ingest-secrets
    shellIdentity:
      input:
        resourceGroup: singleton
        step: output
        name: globalMSIId
    automatedRetry:
      errorContainsAny:
      - "unknown_storage_failure"
      - "unauthorized: authentication required"
      maximumRetryCount: 5
      durationBetweenRetries: 1m
  # deploys the image mirror for the ACRs
  - name: imagemirror
    action: ARM
    template: templates/global-image-sync.bicep
    parameters: configurations/global-image-sync.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    dependsOn:
    - resourceGroup: singleton
      step: mirror-oc-mirror-image
