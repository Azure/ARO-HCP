#
# Purpose: Test pipeline for Grafana reconciliation
# Managed Resources:
# * Azure Managed Grafana instance
# * AMW datasource integrations
#
$schema: "pipeline.schema.v1"
serviceGroup: Microsoft.Azure.ARO.HCP.Grafana
rolloutName: Grafana Rollout
resourceGroups:
- name: singleton
  resourceGroup: '{{ .global.rg }}'
  subscription: '{{ .global.subscription.key }}'
  steps:
  - name: output
    action: ARM
    template: templates/output-global.bicep
    parameters: configurations/output-global.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
  - name: grafana-reconcile
    action: GrafanaManage
    grafanaName: "{{ .monitoring.grafanaName }}"
    location: "{{ .global.region }}"
    majorVersion: "{{ .monitoring.grafanaMajorVersion }}"
    zoneRedundancy: "{{ .monitoring.grafanaZoneRedundantMode }}"
    crossTenantSecurityGroup: "{{ .monitoring.crossTenantSecurityGroup }}"
    identityFrom:
      resourceGroup: singleton
      step: output
      name: globalMSIId
  - name: grafana-roles
    action: ARM
    template: templates/grafana-roles.bicep
    parameters: configurations/grafana-roles.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    dependsOn:
    - resourceGroup: singleton
      step: grafana-reconcile
  - name: grafana-monitoring-reader
    action: ARM
    template: templates/grafana-monitoring-reader.bicep
    parameters: configurations/grafana-monitoring-reader.tmpl.bicepparam
    deploymentLevel: Subscription
    variables:
    - name: grafanaPrincipalId
      input:
        resourceGroup: singleton
        step: grafana-roles
        name: grafanaPrincipalId
    dependsOn:
    - resourceGroup: singleton
      step: grafana-roles
