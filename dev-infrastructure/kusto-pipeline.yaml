$schema: pipeline.schema.v1
rolloutName: Kusto Log Infra
serviceGroup: Microsoft.Azure.ARO.HCP.Log.Infra
resourceGroups:
- name: kusto-infra
  resourceGroup: '{{ .kusto.rg }}'
  subscription: '{{ .global.subscription.key }}'
  executionConstraints:
  - clouds:
    - public
    environments:
    - int
    regions:
    - uksouth
  - clouds:
    - public
    environments:
    - stg
    regions:
    - uksouth
  - clouds:
    - public
    environments:
    - prod
    regions:
    - australiaeast
    - brazilsouth
    - canadacentral
    - centralindia
    - eastus2
    - westeurope
    - switzerlandnorth
    - uksouth
  steps:
  - name: kusto-sku-verification
    action: Shell
    command: ./scripts/kusto-check-sku.sh
    variables:
    - name: SKU
      configRef: kusto.sku
    - name: LOCATION
      configRef: region
  - name: deploy
    action: ARM
    template: templates/kusto.bicep
    parameters: configurations/kusto.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    dependsOn:
    - resourceGroup: kusto-infra
      step: kusto-sku-verification
