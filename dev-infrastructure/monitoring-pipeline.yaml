#
# Purpose: Manage monitoring resources for ARO HCP shared by SC and MC
# Managed Resources:
# * Azure Monitor Metrics resources for services
# * Azure Monitor Metrics resources for hosted control planes
# * Action Groups & Prometheus alerting rules
# * Kusto (ADX) log search alerting rules
#
$schema: "pipeline.schema.v1"
serviceGroup: Microsoft.Azure.ARO.HCP.Monitoring
rolloutName: Monitoring Rollout
resourceGroups:
- name: regional
  resourceGroup: '{{ .regionRG }}'
  subscription: '{{ .svc.subscription.key }}'
  steps:
  - name: output
    action: ARM
    template: templates/output-region.bicep
    parameters: configurations/output-region.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
  - name: monitoring
    action: ARM
    template: templates/monitoring.bicep
    parameters: configurations/monitoring.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    variables:
    - name: azureMonitoringWorkspaceId
      input:
        resourceGroup: regional
        step: output
        name: azureMonitoringWorkspaceId
    - name: hcpAzureMonitoringWorkspaceId
      input:
        resourceGroup: regional
        step: output
        name: hcpAzureMonitoringWorkspaceId
- name: kusto
  resourceGroup: '{{ .kusto.rg }}'
  subscription: '{{ .svc.subscription.key }}'
  steps:
  - name: kusto-lookup
    action: ARM
    template: templates/kusto-lookup.bicep
    parameters: configurations/kusto-lookup.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
  - name: kusto-alerting
    action: ARM
    template: templates/kusto-alerting.bicep
    parameters: configurations/kusto-alerting.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    variables:
    - name: kustoClusterId
      input:
        resourceGroup: kusto
        step: kusto-lookup
        name: kustoResourceId
    - name: kustoUri
      input:
        resourceGroup: kusto
        step: kusto-lookup
        name: kustoUri
    - name: slActionGroupId
      input:
        resourceGroup: regional
        step: monitoring
        name: slActionGroupId
    dependsOn:
    - resourceGroup: kusto
      step: kusto-lookup
    - resourceGroup: regional
      step: monitoring
