#
# Purpose: Manage monitoring resources for ARO HCP shared by SC and MC
# Managed Resources:
# * Azure Monitor Metrics resources for services
# * Azure Monitor Metrics resources for hosted control planes
# * Prometheus alerting rules
#
# Action groups are created at geography level (geography-pipeline.yaml)
# and looked up here for wiring into regional alert rules.
#
$schema: "pipeline.schema.v1"
serviceGroup: Microsoft.Azure.ARO.HCP.Monitoring
rolloutName: Monitoring Rollout
resourceGroups:
- name: kusto
  resourceGroup: '{{ .kusto.rg }}'
  subscription: '{{ .global.subscription.key }}'
  steps:
  - name: actiongroup-lookup
    action: ARM
    template: templates/actiongroups-lookup.bicep
    parameters: configurations/actiongroups-lookup.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
- name: regional
  resourceGroup: '{{ .regionRG }}'
  subscription: '{{ .svc.subscription.key }}'
  steps:
  - name: output
    action: ARM
    template: templates/output-region.bicep
    parameters: configurations/output-region.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
  - name: monitoring
    action: ARMStack
    template: templates/monitoring.bicep
    parameters: configurations/monitoring.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    actionOnUnmanage: delete
    bypassStackOutOfSyncError: false
    automatedRetry:
      errorContainsAny:
      - "DeploymentStackInNonTerminalState"
      maximumRetryCount: 3
      durationBetweenRetries: 2m
    variables:
    - name: azureMonitoringWorkspaceId
      input:
        resourceGroup: regional
        step: output
        name: azureMonitoringWorkspaceId
    - name: hcpAzureMonitoringWorkspaceId
      input:
        resourceGroup: regional
        step: output
        name: hcpAzureMonitoringWorkspaceId
    - name: actionGroupSL
      input:
        resourceGroup: kusto
        step: actiongroup-lookup
        name: actionGroupsSL
    - name: actionGroupSRE
      input:
        resourceGroup: kusto
        step: actiongroup-lookup
        name: actionGroupsSRE
    - name: actionGroupRP
      input:
        resourceGroup: kusto
        step: actiongroup-lookup
        name: actionGroupsRP
    - name: actionGroupMSFT
      input:
        resourceGroup: kusto
        step: actiongroup-lookup
        name: actionGroupsMSFT
