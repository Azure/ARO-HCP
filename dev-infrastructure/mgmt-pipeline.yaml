#
# Purpose: Manage management cluster and supporting infra for its services
# Managed Resources:
# * AKS MGMT cluster
# * MSI, CX and MGMT Key Vaults with OneCert registration
# * metrics collection
# * MI, certificate and RBAC for Maestro
#
$schema: "pipeline.schema.v1"
serviceGroup: Microsoft.Azure.ARO.HCP.Management.Infra
rolloutName: Management Cluster Rollout
buildStep:
  command: bash
  args:
  - -c
  - |
    set -o errexit
    set -o nounset
    set -o pipefail
    tmp="$(mktemp ./scripts/cleanup-pko-resources/cleanup-pko-resources.XXXXXX)"
    trap 'rm -f "${tmp}"' EXIT
    CGO_ENABLED=0 go build -o "${tmp}" ./scripts/cleanup-pko-resources
    chmod 0755 "${tmp}"
    mv "${tmp}" ./scripts/cleanup-pko-resources/cleanup-pko-resources
    trap - EXIT
    tmp2="$(mktemp ./scripts/recreate-system-pool/recreate-system-pool.XXXXXX)"
    trap 'rm -f "${tmp2}"' EXIT
    CGO_ENABLED=0 go build -o "${tmp2}" ./scripts/recreate-system-pool
    chmod 0755 "${tmp2}"
    mv "${tmp2}" ./scripts/recreate-system-pool/recreate-system-pool
    trap - EXIT
    tmp3="$(mktemp ./scripts/recreate-broken-pools/recreate-broken-pools.XXXXXX)"
    trap 'rm -f "${tmp3}"' EXIT
    CGO_ENABLED=0 go build -o "${tmp3}" ./scripts/recreate-broken-pools
    chmod 0755 "${tmp3}"
    mv "${tmp3}" ./scripts/recreate-broken-pools/recreate-broken-pools
    trap - EXIT
resourceGroups:
- name: global
  resourceGroup: '{{ .global.rg }}'
  subscription: '{{ .global.subscription.key }}'
  steps:
  - name: output
    action: ARM
    template: templates/output-global.bicep
    parameters: configurations/output-global.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
- name: service
  resourceGroup: '{{ .svc.rg }}'
  subscription: '{{ .svc.subscription.key }}'
  steps:
  - name: output
    action: ARM
    omitFromServiceGroupCompletion: true
    template: templates/output-svc.bicep
    parameters: configurations/output-svc.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
    externalDependsOn:
    - serviceGroup: Microsoft.Azure.ARO.HCP.Service.Infra
      resourceGroup: service
      step: cluster
- name: regional
  resourceGroup: '{{ .regionRG }}'
  subscription: '{{ .svc.subscription.key }}'
  steps:
  - name: output
    action: ARM
    template: templates/output-region.bicep
    parameters: configurations/output-region.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
- name: auditLogs
  resourceGroup: '{{ .auditLogsEventHub.rg }}'
  subscription: '{{ .svc.subscription.key }}'
  steps:
  - name: output
    action: ARM
    template: templates/output-audit-logs-eventhub.bicep
    parameters: configurations/output-audit-logs-eventhub.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
- name: kusto
  resourceGroup: '{{ .kusto.rg }}'
  subscription: '{{ .global.subscription.key }}'
  steps:
  - name: output
    action: ARM
    template: templates/kusto-lookup.bicep
    parameters: configurations/kusto-lookup.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
- name: management
  resourceGroup: '{{ .mgmt.rg }}'
  subscription: '{{ .mgmt.subscription.key }}'
  steps:
  - name: grafana-monitoring-reader
    action: ARM
    template: templates/grafana-monitoring-reader.bicep
    parameters: configurations/grafana-monitoring-reader.tmpl.bicepparam
    deploymentLevel: Subscription
    variables:
    - name: grafanaPrincipalId
      input:
        resourceGroup: global
        step: output
        name: grafanaPrincipalId
  - name: subscription-output
    action: ARM
    template: templates/subscription-lookup.bicep
    parameters: configurations/subscription-lookup.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
  - name: rpRegistration
    action: ProviderFeatureRegistration
    providerConfigRef: mgmt.subscription.providers
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
  - name: infra
    action: ARM
    template: templates/mgmt-infra.bicep
    parameters: configurations/mgmt-infra.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    variables:
    - name: globalMSIId
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
    dependsOn:
    - resourceGroup: management
      step: rpRegistration
  - name: svc-mgmt-permissions
    action: ARM
    omitFromServiceGroupCompletion: true
    template: templates/svc-mgmt-permissions.bicep
    parameters: configurations/svc-mgmt-permissions.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    variables:
    - name: clusterServiceMIResourceId
      input:
        resourceGroup: service
        step: output
        name: cs
    - name: msiRefresherMIResourceId
      input:
        resourceGroup: service
        step: output
        name: msiRefresher
    - name: adminApiMIResourceId
      input:
        resourceGroup: service
        step: output
        name: adminApi
    - name: rpBackendMIResourceId
      input:
        resourceGroup: service
        step: output
        name: backend
    dependsOn:
    - resourceGroup: management
      step: infra
  - name: infra-output
    action: ARM
    template: templates/mgmt-infra-lookup.bicep
    parameters: configurations/mgmt-infra-lookup.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
    dependsOn:
    - resourceGroup: management
      step: infra
  # Configure certificate issuers for the MC KVs
  - name: cx-oncert-public-kv-issuer
    action: SetCertificateIssuer
    secretKeyVault:
      configRef: ev2.assistedId.certificate.keyVault
    secretName:
      configRef: ev2.assistedId.certificate.name
    applicationId:
      configRef: ev2.assistedId.applicationId
    vaultBaseUrl:
      input:
        resourceGroup: management
        step: infra-output
        name: cxKeyVaultUrl
    issuer:
      value: OneCertV2-PublicCA
  - name: oncert-private-kv-issuer
    action: SetCertificateIssuer
    secretKeyVault:
      configRef: ev2.assistedId.certificate.keyVault
    secretName:
      configRef: ev2.assistedId.certificate.name
    applicationId:
      configRef: ev2.assistedId.applicationId
    vaultBaseUrl:
      input:
        resourceGroup: management
        step: infra-output
        name: mgmtKeyVaultUrl
    issuer:
      value: OneCertV2-PrivateCA
  - name: oncert-public-kv-issuer
    action: SetCertificateIssuer
    secretKeyVault:
      configRef: ev2.assistedId.certificate.keyVault
    secretName:
      configRef: ev2.assistedId.certificate.name
    applicationId:
      configRef: ev2.assistedId.applicationId
    vaultBaseUrl:
      input:
        resourceGroup: management
        step: infra-output
        name: mgmtKeyVaultUrl
    issuer:
      value: OneCertV2-PublicCA
  # Detect and self-heal the AKS system pool when NRP KVS corruption
  # has wedged it (AROSLSRE-924 / ICM 798003653). Runs BEFORE the cluster
  # ARM step so the cluster PUT does not get stuck behind a wedged
  # VMSS update. The Go binary checks cluster existence first and exits
  # 0 (no-op) if the cluster has not been created yet (greenfield
  # rollout), or if any of the four detection guards fail.
  - name: pipeline-msi-reader-permissions
    action: ARM
    template: templates/pipeline-msi-reader-permissions.bicep
    parameters: configurations/pipeline-msi-reader-permissions.tmpl.bicepparam
    deploymentLevel: Subscription
    variables:
    - name: globalMSIId
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
  - name: recreate-system-pool-if-broken
    action: Shell
    command: ./scripts/recreate-system-pool/recreate-system-pool
    workingDir: .
    shellIdentity:
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
    variables:
    - name: CLUSTER_NAME
      configRef: mgmt.aks.name
    - name: RESOURCE_GROUP
      configRef: mgmt.rg
    - name: SUBSCRIPTION_ID
      input:
        resourceGroup: management
        step: subscription-output
        name: subscriptionId
    - name: NRP_FAIL_THRESHOLD
      value: '10'
    - name: NRP_FAIL_WINDOW_MIN
      value: '360'
    dependsOn:
    - resourceGroup: management
      step: cx-oncert-public-kv-issuer
    - resourceGroup: management
      step: subscription-output
    - resourceGroup: management
      step: oncert-private-kv-issuer
    - resourceGroup: management
      step: oncert-public-kv-issuer
    - resourceGroup: management
      step: pipeline-msi-reader-permissions
  - name: recreate-broken-user-nodepools
    action: Shell
    command: ./scripts/recreate-broken-pools/recreate-broken-pools
    workingDir: .
    # Internal overallTimeoutMin = 120. The extra 30m headroom accommodates
    # the deferred forced-evidence cleanup contexts (abort + restore are
    # rooted in context.Background and can run for up to ~23m past the
    # parent ctx after a forced-evidence probe).
    timeout: '150m'
    automatedRetry:
      errorContainsAny:
      - "restore forced-evidence pool spec"
      maximumRetryCount: 2
      durationBetweenRetries: 5m
    shellIdentity:
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
    variables:
    - name: CLUSTER_NAME
      configRef: mgmt.aks.name
    - name: RESOURCE_GROUP
      configRef: mgmt.rg
    - name: SUBSCRIPTION_ID
      input:
        resourceGroup: management
        step: subscription-output
        name: subscriptionId
    - name: NODEPOOL_TAG
      value: 'worker'
    - name: NRP_FAIL_THRESHOLD
      value: '10'
    - name: NRP_FAIL_WINDOW_MIN
      value: '360'
    - name: FORCED_EVIDENCE_TIMEOUT_MIN
      value: '20'
    dependsOn:
    - resourceGroup: management
      step: recreate-system-pool-if-broken
  # Build the MC
  - name: cluster
    action: ARM
    template: templates/mgmt-cluster.bicep
    parameters: configurations/mgmt-cluster.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    variables:
    - name: ocpAcrResourceId
      input:
        resourceGroup: global
        step: output
        name: ocpAcrResourceId
    - name: svcAcrResourceId
      input:
        resourceGroup: global
        step: output
        name: svcAcrResourceId
    - name: globalMSIId
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
    - name: azureMonitoringWorkspaceId
      input:
        resourceGroup: regional
        step: output
        name: azureMonitoringWorkspaceId
    - name: hcpAzureMonitoringWorkspaceId
      input:
        resourceGroup: regional
        step: output
        name: hcpAzureMonitoringWorkspaceId
    - name: maestroEventGridNamespaceId
      input:
        resourceGroup: regional
        step: output
        name: maestroEventGridNamespaceId
    - name: rpCosmosDbAccountId
      input:
        resourceGroup: regional
        step: output
        name: rpCosmosDbAccountId
    - name: auditLogsEventHubAuthRuleId
      input:
        resourceGroup: auditLogs
        step: output
        name: auditLogsEventHubAuthRuleId
    dependsOn:
    - resourceGroup: management
      step: cx-oncert-public-kv-issuer
    - resourceGroup: management
      step: oncert-private-kv-issuer
    - resourceGroup: management
      step: oncert-public-kv-issuer
    - resourceGroup: management
      step: recreate-broken-user-nodepools
    automatedRetry:
      errorContainsAny:
      - "DeploymentScriptACIProvisioningTimeout"
      - "InternalServerError"
      - "Internal server error"
      - "Resource is in Updating state"
      - "There was a problem communicating with the identity service"
      - "DeploymentScriptExceededMaxAllowedTime"
      maximumRetryCount: 3
      durationBetweenRetries: 2m
  - name: svc-mgmt-aks-permissions
    action: ARM
    omitFromServiceGroupCompletion: true
    template: templates/svc-mgmt-aks-permissions.bicep
    parameters: configurations/svc-mgmt-aks-permissions.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    variables:
    - name: sessiongateMIResourceId
      input:
        resourceGroup: service
        step: output
        name: sessiongate
    dependsOn:
    - resourceGroup: management
      step: cluster
  - name: upgrade-aks-cluster
    action: Shell
    command: ./upgrade-aks-cluster.sh
    workingDir: ./scripts
    shellIdentity:
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
    variables:
    - name: CLUSTER_NAME
      configRef: mgmt.aks.name
    - name: RESOURCE_GROUP
      configRef: mgmt.rg
    - name: KUBERNETES_VERSION
      configRef: mgmt.aks.kubernetesVersion
    dependsOn:
    - resourceGroup: management
      step: cluster
  - name: nsp
    action: ARM
    omitFromServiceGroupCompletion: true
    template: templates/mgmt-nsp.bicep
    parameters: configurations/mgmt-nsp.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    variables:
    - name: serviceClusterSubscriptionId
      input:
        resourceGroup: service
        step: output
        name: subscriptionId
    dependsOn:
    - resourceGroup: management
      step: upgrade-aks-cluster
    - resourceGroup: management
      step: infra
  - name: cluster-output
    action: ARM
    template: templates/output-mgmt-cluster.bicep
    parameters: configurations/output-mgmt-cluster.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
    dependsOn:
    - resourceGroup: regional
      step: output
    - resourceGroup: management
      step: upgrade-aks-cluster
  - name: exporter-permissions
    action: ARM
    template: templates/exporter-permissions.bicep
    parameters: configurations/exporter-permissions.tmpl.bicepparam
    deploymentLevel: Subscription
    variables:
    - name: exporterPrincipalId
      input:
        resourceGroup: service
        step: output
        name: exporterPrincipalId
  - name: mgmt-agent-output
    action: ARM
    template: modules/mgmt-agent/mgmt-agent-lookup.bicep
    parameters: configurations/mgmt-agent-lookup.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
    dependsOn:
    - resourceGroup: management
      step: cluster
  - name: mgmt-agent-permissions
    action: ARM
    template: templates/mgmt-agent-permissions.bicep
    parameters: configurations/mgmt-agent-permissions.tmpl.bicepparam
    deploymentLevel: Subscription
    variables:
    - name: mgmtAgentPrincipalId
      input:
        resourceGroup: management
        step: mgmt-agent-output
        name: msiPrincipalId
    dependsOn:
    - resourceGroup: management
      step: mgmt-agent-output
  - name: kusto-grant-ingest
    action: ARM
    template: templates/kusto-grant-ingest.bicep
    parameters: configurations/kusto-mgmt-ingest.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    variables:
    - name: clusterLogPrincipalId
      input:
        resourceGroup: management
        step: cluster-output
        name: clusterLogPrincipalId
    - name: kustoResourceId
      input:
        resourceGroup: kusto
        step: output
        name: kustoResourceId
    automatedRetry:
      errorContainsAny:
      - "AAD principal was not found"
      maximumRetryCount: 7
      durationBetweenRetries: 1m
    dependsOn:
    - resourceGroup: kusto
      step: output
    - resourceGroup: management
      step: cluster-output
  - name: prometheus
    aksCluster: '{{ .mgmt.aks.name }}'
    action: Helm
    timeout: 10m
    releaseName: 'arohcp-monitor'
    releaseNamespace: 'prometheus'
    namespaceFiles:
    - ../observability/prometheus/namespace.mgmt.yaml
    chartDir: ../observability/prometheus/deploy
    valuesFile: ../observability/prometheus/values-mgmt.yaml
    kustoEndpoint:
      resourceGroup: kusto
      step: output
      name: kustoUri
    kustoDatabase: '{{ .kusto.serviceLogsDatabase }}'
    kustoTable: 'containerLogs'
    inputVariables:
      dcrRemoteWriteUrl:
        resourceGroup: management
        step: cluster-output
        name: dcrRemoteWriteUrl
      hcpDcrRemoteWriteUrl:
        resourceGroup: management
        step: cluster-output
        name: hcpDcrRemoteWriteUrl
      prometheusUAMIClientId:
        resourceGroup: management
        step: cluster-output
        name: prometheusUAMIClientId
    dependsOn:
    - resourceGroup: management
      step: upgrade-aks-cluster
    - resourceGroup: management
      step: image-registry-policy
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    automatedRetry:
      errorContainsAny:
      - "500 Internal Server Error"
      - "Internal error occurred"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  - name: cleanup-prometheus-pvc
    aksCluster: '{{ .mgmt.aks.name }}'
    action: Shell
    command: ./cleanup-prometheus-pvc.sh
    workingDir: ./scripts
    dependsOn:
    - resourceGroup: management
      step: prometheus
    shellIdentity:
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
  - name: acrpull
    aksCluster: '{{ .mgmt.aks.name }}'
    action: Helm
    releaseName: acrpull
    releaseNamespace: acrpull
    chartDir: ./../acrpull/deploy
    valuesFile: ./../acrpull/deploy/values.yaml
    kustoEndpoint:
      resourceGroup: kusto
      step: output
      name: kustoUri
    kustoDatabase: '{{ .kusto.serviceLogsDatabase }}'
    kustoTable: 'containerLogs'
    dependsOn:
    - resourceGroup: management
      step: prometheus
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    automatedRetry:
      errorContainsAny:
      - "500 Internal Server Error"
      - "Internal error occurred"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  - name: image-registry-policy
    aksCluster: '{{ .mgmt.aks.name }}'
    action: Helm
    releaseName: image-registry-policy
    releaseNamespace: image-registry-policy
    chartDir: ./../image-registry-policy/deploy
    valuesFile: ./../image-registry-policy/values.yaml
    kustoEndpoint:
      resourceGroup: kusto
      step: output
      name: kustoUri
    kustoDatabase: '{{ .kusto.serviceLogsDatabase }}'
    kustoTable: 'containerLogs'
    dependsOn:
    - resourceGroup: management
      step: cluster
    - resourceGroup: management
      step: upgrade-aks-cluster
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    automatedRetry:
      errorContainsAny:
      - "500 Internal Server Error"
      - "Internal error occurred"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  - name: storageclass
    aksCluster: '{{ .mgmt.aks.name }}'
    action: Helm
    releaseName: 'default-sc'
    releaseNamespace: 'default-sc'
    chartDir: ../mgmt-fixes/deploy/default-sc
    valuesFile: ../mgmt-fixes/default-sc.values.yaml
    kustoEndpoint:
      resourceGroup: kusto
      step: output
      name: kustoUri
    kustoDatabase: '{{ .kusto.serviceLogsDatabase }}'
    kustoTable: 'containerLogs'
    dependsOn:
    - resourceGroup: management
      step: upgrade-aks-cluster
    - resourceGroup: management
      step: image-registry-policy
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    automatedRetry:
      errorContainsAny:
      - "500 Internal Server Error"
      - "Internal error occurred"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  - name: mitigations
    aksCluster: '{{ .mgmt.aks.name }}'
    action: Helm
    releaseName: 'mitigations'
    releaseNamespace: 'aro-hcp-mitigations'
    chartDir: ../mgmt-fixes/deploy/mitigations
    valuesFile: ../mgmt-fixes/mitigations.values.yaml
    # Bump timeout to help with scaling event related issues
    timeout: 15m
    kustoEndpoint:
      resourceGroup: kusto
      step: output
      name: kustoUri
    kustoDatabase: '{{ .kusto.serviceLogsDatabase }}'
    kustoTable: 'containerLogs'
    dependsOn:
    - resourceGroup: management
      step: upgrade-aks-cluster
    - resourceGroup: management
      step: image-registry-policy
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    automatedRetry:
      errorContainsAny:
      - "500 Internal Server Error"
      - "Internal error occurred"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  - name: kubelet-ds
    aksCluster: '{{ .mgmt.aks.name }}'
    action: Helm
    releaseName: 'mgmt-fixes'
    releaseNamespace: 'kubelet-ds'
    chartDir: ../mgmt-fixes/deploy/kubelet-ds
    valuesFile: ../mgmt-fixes/kubelet-ds.values.yaml
    kustoEndpoint:
      resourceGroup: kusto
      step: output
      name: kustoUri
    kustoDatabase: '{{ .kusto.serviceLogsDatabase }}'
    kustoTable: 'containerLogs'
    dependsOn:
    - resourceGroup: management
      step: upgrade-aks-cluster
    - resourceGroup: management
      step: image-registry-policy
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    automatedRetry:
      errorContainsAny:
      - "500 Internal Server Error"
      - "Internal error occurred"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  # TODO: Remove this PKO cleanup step once all management clusters have been cleaned up (ARO-23308)
  - name: cleanup-pko
    aksCluster: '{{ .mgmt.aks.name }}'
    action: Shell
    command: ./scripts/cleanup-pko-resources/cleanup-pko-resources
    workingDir: .
    shellIdentity:
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
    dependsOn:
    - resourceGroup: management
      step: cluster
  - name: service-lifecycle
    aksCluster: '{{ .mgmt.aks.name }}'
    action: Helm
    releaseName: service-lifecycle
    releaseNamespace: kube-system
    chartDir: ../service-lifecycle/deploy
    valuesFile: ../service-lifecycle/deploy/values.yaml
    kustoEndpoint:
      resourceGroup: kusto
      step: output
      name: kustoUri
    kustoDatabase: '{{ .kusto.serviceLogsDatabase }}'
    kustoTable: 'containerLogs'
    dependsOn:
    - resourceGroup: management
      step: cluster
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    automatedRetry:
      errorContainsAny:
      - "500 Internal Server Error"
      - "Internal error occurred"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  - name: arobit-output
    action: ARM
    template: templates/arobit-lookup.bicep
    parameters: configurations/arobit-lookup.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
    dependsOn:
    - resourceGroup: management
      step: upgrade-aks-cluster
  - name: arobit
    aksCluster: '{{ .mgmt.aks.name }}'
    action: Helm
    releaseName: 'arobit'
    releaseNamespace: 'arobit'
    chartDir: ../observability/arobit/deploy
    valuesFile: ../observability/arobit/values-mgmt.yaml
    timeout: 10m
    kustoEndpoint:
      resourceGroup: kusto
      step: output
      name: kustoUri
    kustoDatabase: '{{ .kusto.serviceLogsDatabase }}'
    kustoTable: 'containerLogs'
    dependsOn:
    - resourceGroup: management
      step: prometheus
    inputVariables:
      tenantId:
        resourceGroup: management
        step: arobit-output
        name: tenantId
      msiClientId:
        resourceGroup: management
        step: arobit-output
        name: msiClientId
      kustoDataIngestionUri:
        resourceGroup: kusto
        step: output
        name: kustoDataIngestionUri
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    automatedRetry:
      errorContainsAny:
      - "500 Internal Server Error"
      - "Internal error occurred"
      - "arobit-forwarder not ready. status: InProgress"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  - name: kube-events
    aksCluster: '{{ .mgmt.aks.name }}'
    action: Helm
    releaseName: kube-events
    releaseNamespace: monitoring
    chartDir: ./../observability/kube-events/deploy
    valuesFile: ./../observability/kube-events/values.yaml
    kustoEndpoint:
      resourceGroup: kusto
      step: output
      name: kustoUri
    kustoDatabase: '{{ .kusto.serviceLogsDatabase }}'
    kustoTable: 'containerLogs'
    dependsOn:
    - resourceGroup: management
      step: upgrade-aks-cluster
    - resourceGroup: management
      step: image-registry-policy
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    automatedRetry:
      errorContainsAny:
      - "500 Internal Server Error"
      - "Internal error occurred"
