#
# Purpose: Manage management cluster and supporting infra for its services
# Managed Resources:
# * AKS MGMT cluster
# * MSI, CX and MGMT Key Vaults with OneCert registration
# * metrics collection
# * MI, certificate and RBAC for Maestro
#
$schema: "pipeline.schema.v1"
serviceGroup: Microsoft.Azure.ARO.HCP.Management.Infra
rolloutName: Management Cluster Rollout
resourceGroups:
- name: global
  resourceGroup: '{{ .global.rg }}'
  subscription: '{{ .global.subscription.key }}'
  steps:
  - name: output
    action: ARM
    template: templates/output-global.bicep
    parameters: configurations/output-global.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
- name: service
  resourceGroup: '{{ .svc.rg }}'
  subscription: '{{ .svc.subscription.key }}'
  steps:
  - name: output
    action: ARM
    omitFromServiceGroupCompletion: true
    template: templates/output-svc.bicep
    parameters: configurations/output-svc.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
    externalDependsOn:
    - serviceGroup: Microsoft.Azure.ARO.HCP.Service.Infra
      resourceGroup: service
      step: cluster
- name: regional
  resourceGroup: '{{ .regionRG }}'
  subscription: '{{ .svc.subscription.key }}'
  steps:
  - name: output
    action: ARM
    template: templates/output-region.bicep
    parameters: configurations/output-region.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
- name: auditLogs
  resourceGroup: '{{ .auditLogsEventHub.rg }}'
  subscription: '{{ .svc.subscription.key }}'
  steps:
  - name: output
    action: ARM
    template: templates/output-audit-logs-eventhub.bicep
    parameters: configurations/output-audit-logs-eventhub.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
- name: kusto
  resourceGroup: '{{ .kusto.rg }}'
  subscription: '{{ .global.subscription.key }}'
  steps:
  - name: output
    action: ARM
    template: templates/kusto-lookup.bicep
    parameters: configurations/kusto-lookup.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
- name: management
  resourceGroup: '{{ .mgmt.rg }}'
  subscription: '{{ .mgmt.subscription.key }}'
  steps:
  # TODO(ARO-28044): re-enable after ARO-28040
  # - name: grafana-monitoring-reader
  #   action: ARM
  #   template: templates/grafana-monitoring-reader.bicep
  #   parameters: configurations/grafana-monitoring-reader.tmpl.bicepparam
  #   deploymentLevel: Subscription
  #   variables:
  #   - name: grafanaPrincipalId
  #     input:
  #       resourceGroup: global
  #       step: output
  #       name: grafanaPrincipalId
  - name: subscription-output
    action: ARM
    template: templates/subscription-lookup.bicep
    parameters: configurations/subscription-lookup.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
  - name: rpRegistration
    action: ProviderFeatureRegistration
    providerConfigRef: mgmt.subscription.providers
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
  - name: infra
    action: ARM
    template: templates/mgmt-infra.bicep
    parameters: configurations/mgmt-infra.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    variables:
    - name: globalMSIId
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
    dependsOn:
    - resourceGroup: management
      step: rpRegistration
  - name: svc-mgmt-permissions
    action: ARM
    omitFromServiceGroupCompletion: true
    template: templates/svc-mgmt-permissions.bicep
    parameters: configurations/svc-mgmt-permissions.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    variables:
    - name: clusterServiceMIResourceId
      input:
        resourceGroup: service
        step: output
        name: cs
    - name: msiRefresherMIResourceId
      input:
        resourceGroup: service
        step: output
        name: msiRefresher
    - name: adminApiMIResourceId
      input:
        resourceGroup: service
        step: output
        name: adminApi
    - name: rpBackendMIResourceId
      input:
        resourceGroup: service
        step: output
        name: backend
    dependsOn:
    - resourceGroup: management
      step: infra
  - name: infra-output
    action: ARM
    template: templates/mgmt-infra-lookup.bicep
    parameters: configurations/mgmt-infra-lookup.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
    dependsOn:
    - resourceGroup: management
      step: infra
  # Configure certificate issuers for the MC KVs
  - name: cx-oncert-public-kv-issuer
    action: SetCertificateIssuer
    secretKeyVault:
      configRef: ev2.assistedId.certificate.keyVault
    secretName:
      configRef: ev2.assistedId.certificate.name
    applicationId:
      configRef: ev2.assistedId.applicationId
    vaultBaseUrl:
      input:
        resourceGroup: management
        step: infra-output
        name: cxKeyVaultUrl
    issuer:
      value: OneCertV2-PublicCA
  - name: oncert-private-kv-issuer
    action: SetCertificateIssuer
    secretKeyVault:
      configRef: ev2.assistedId.certificate.keyVault
    secretName:
      configRef: ev2.assistedId.certificate.name
    applicationId:
      configRef: ev2.assistedId.applicationId
    vaultBaseUrl:
      input:
        resourceGroup: management
        step: infra-output
        name: mgmtKeyVaultUrl
    issuer:
      value: OneCertV2-PrivateCA
  - name: oncert-public-kv-issuer
    action: SetCertificateIssuer
    secretKeyVault:
      configRef: ev2.assistedId.certificate.keyVault
    secretName:
      configRef: ev2.assistedId.certificate.name
    applicationId:
      configRef: ev2.assistedId.applicationId
    vaultBaseUrl:
      input:
        resourceGroup: management
        step: infra-output
        name: mgmtKeyVaultUrl
    issuer:
      value: OneCertV2-PublicCA
  - name: maestro-consumer-cert
    action: CreateCertificate
    secretKeyVault:
      configRef: ev2.assistedId.certificate.keyVault
    secretName:
      configRef: ev2.assistedId.certificate.name
    applicationId:
      configRef: ev2.assistedId.applicationId
    vaultBaseUrl:
      input:
        resourceGroup: management
        step: infra-output
        name: mgmtKeyVaultUrl
    certificateName:
      configRef: maestro.agent.consumerName
    contentType:
      value: x-pkcs12
    san:
      configRef: maestro.agent.certSAN
    issuer:
      configRef: maestro.certIssuer
    commonName:
      configRef: maestro.agent.certSAN
    dependsOn:
    - resourceGroup: management
      step: infra-output
    - resourceGroup: management
      step: oncert-private-kv-issuer
    - resourceGroup: management
      step: oncert-public-kv-issuer
    automatedRetry:
      errorContainsAny:
      - "InternalServerError"
      - "ServiceUnavailable"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  # Build the MC
  # The swift-vnet-permissions step runs unconditionally so the EV2 step graph is
  # stable, but the Swift VNet RBAC grant inside it is gated at the Bicep layer via
  # the enableSwift bicepparam (mgmt.aks.enableSwiftV2Vnet). A pipeline-level Go
  # template guard would not work here: EV2 manifest generation renders pipeline
  # config values as placeholders, so the guard would always evaluate truthy.
  - name: swift-vnet-permissions
    action: ARM
    template: templates/swift-vnet-permissions.bicep
    parameters: configurations/swift-vnet-permissions.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    variables:
    - name: deploymentMsiId
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
    dependsOn:
    - resourceGroup: management
      step: subscription-output
  # Create/tag the Swift VNet. The tag stampcreatorserviceinfo=true must be written by the
  # Swift-registered globalMSI, so this step launches a container group assigned globalMSI and
  # runs the create/tag AS globalMSI from inside it (scripts/swift-vnet.sh). Create, wait, log
  # and cleanup all happen in this single Shell step, so there is no cross-step async race. The
  # script is a no-op when ENABLE_SWIFT is false, keeping the EV2 step graph stable.
  - name: swift-vnet
    action: Shell
    command: ./swift-vnet.sh
    workingDir: ./scripts
    shellIdentity:
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
    variables:
    - name: ENABLE_SWIFT
      configRef: mgmt.aks.enableSwiftV2Vnet
    - name: VNET_NAME
      value: aks-net
    - name: VNET_ADDRESS_PREFIX
      configRef: mgmt.aks.vnetAddressPrefix
    - name: RESOURCE_GROUP
      configRef: mgmt.rg
    - name: SUBSCRIPTION_ID
      input:
        resourceGroup: management
        step: subscription-output
        name: subscriptionId
    - name: DEPLOYMENT_MSI_ID
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
    dependsOn:
    - resourceGroup: management
      step: swift-vnet-permissions
  - name: cluster
    action: ARM
    template: templates/mgmt-cluster.bicep
    parameters: configurations/mgmt-cluster.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    variables:
    - name: ocpAcrResourceId
      input:
        resourceGroup: global
        step: output
        name: ocpAcrResourceId
    - name: svcAcrResourceId
      input:
        resourceGroup: global
        step: output
        name: svcAcrResourceId
    - name: globalMSIId
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
    - name: azureMonitoringWorkspaceId
      input:
        resourceGroup: regional
        step: output
        name: azureMonitoringWorkspaceId
    - name: hcpAzureMonitoringWorkspaceId
      input:
        resourceGroup: regional
        step: output
        name: hcpAzureMonitoringWorkspaceId
    - name: maestroEventGridNamespaceId
      input:
        resourceGroup: regional
        step: output
        name: maestroEventGridNamespaceId
    - name: rpCosmosDbAccountId
      input:
        resourceGroup: regional
        step: output
        name: rpCosmosDbAccountId
    - name: auditLogsEventHubAuthRuleId
      input:
        resourceGroup: auditLogs
        step: output
        name: auditLogsEventHubAuthRuleId
    dependsOn:
    - resourceGroup: management
      step: maestro-consumer-cert
    - resourceGroup: management
      step: cx-oncert-public-kv-issuer
    - resourceGroup: management
      step: oncert-private-kv-issuer
    - resourceGroup: management
      step: oncert-public-kv-issuer
    - resourceGroup: management
      step: swift-vnet
    automatedRetry:
      errorContainsAny:
      - "DeploymentScriptACIProvisioningTimeout"
      - "InternalServerError"
      - "Internal server error"
      - "Resource is in Updating state"
      - "There was a problem communicating with the identity service"
      - "DeploymentScriptExceededMaxAllowedTime"
      maximumRetryCount: 3
      durationBetweenRetries: 2m
  - name: svc-mgmt-aks-permissions
    action: ARM
    omitFromServiceGroupCompletion: true
    template: templates/svc-mgmt-aks-permissions.bicep
    parameters: configurations/svc-mgmt-aks-permissions.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    variables:
    - name: sessiongateMIResourceId
      input:
        resourceGroup: service
        step: output
        name: sessiongate
    dependsOn:
    - resourceGroup: management
      step: cluster
  - name: upgrade-aks-cluster
    action: Shell
    command: ./upgrade-aks-cluster.sh
    workingDir: ./scripts
    shellIdentity:
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
    variables:
    - name: CLUSTER_NAME
      configRef: mgmt.aks.name
    - name: RESOURCE_GROUP
      configRef: mgmt.rg
    - name: KUBERNETES_VERSION
      configRef: mgmt.aks.kubernetesVersion
    dependsOn:
    - resourceGroup: management
      step: cluster
  - name: nsp
    action: ARM
    omitFromServiceGroupCompletion: true
    template: templates/mgmt-nsp.bicep
    parameters: configurations/mgmt-nsp.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    variables:
    - name: serviceClusterSubscriptionId
      input:
        resourceGroup: service
        step: output
        name: subscriptionId
    dependsOn:
    - resourceGroup: management
      step: upgrade-aks-cluster
    - resourceGroup: management
      step: infra
  - name: cluster-output
    action: ARM
    template: templates/output-mgmt-cluster.bicep
    parameters: configurations/output-mgmt-cluster.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
    dependsOn:
    - resourceGroup: regional
      step: output
    - resourceGroup: management
      step: upgrade-aks-cluster
  - name: exporter-permissions
    action: ARM
    template: templates/exporter-permissions.bicep
    parameters: configurations/exporter-permissions.tmpl.bicepparam
    deploymentLevel: Subscription
    variables:
    - name: exporterPrincipalId
      input:
        resourceGroup: service
        step: output
        name: exporterPrincipalId
  - name: mgmt-agent-output
    action: ARM
    template: modules/mgmt-agent/mgmt-agent-lookup.bicep
    parameters: configurations/mgmt-agent-lookup.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
    dependsOn:
    - resourceGroup: management
      step: cluster
  - name: mgmt-agent-permissions
    action: ARM
    template: templates/mgmt-agent-permissions.bicep
    parameters: configurations/mgmt-agent-permissions.tmpl.bicepparam
    deploymentLevel: Subscription
    variables:
    - name: mgmtAgentPrincipalId
      input:
        resourceGroup: management
        step: mgmt-agent-output
        name: msiPrincipalId
    dependsOn:
    - resourceGroup: management
      step: mgmt-agent-output
  - name: kusto-grant-ingest
    action: ARM
    template: templates/kusto-grant-ingest.bicep
    parameters: configurations/kusto-mgmt-ingest.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    variables:
    - name: clusterLogPrincipalId
      input:
        resourceGroup: management
        step: cluster-output
        name: clusterLogPrincipalId
    - name: kustoResourceId
      input:
        resourceGroup: kusto
        step: output
        name: kustoResourceId
    automatedRetry:
      errorContainsAny:
      - "AAD principal was not found"
      maximumRetryCount: 7
      durationBetweenRetries: 1m
    dependsOn:
    - resourceGroup: kusto
      step: output
    - resourceGroup: management
      step: cluster-output
  - name: prometheus
    aksCluster: '{{ .mgmt.aks.name }}'
    action: Helm
    timeout: 10m
    releaseName: 'arohcp-monitor'
    releaseNamespace: 'prometheus'
    namespaceFiles:
    - ../observability/prometheus/namespace.mgmt.yaml
    chartDir: ../observability/prometheus/deploy
    valuesFile: ../observability/prometheus/values-mgmt.yaml
    kustoEndpoint:
      resourceGroup: kusto
      step: output
      name: kustoUri
    kustoDatabase: '{{ .kusto.serviceLogsDatabase }}'
    kustoTable: 'containerLogs'
    inputVariables:
      dcrRemoteWriteUrl:
        resourceGroup: management
        step: cluster-output
        name: dcrRemoteWriteUrl
      hcpDcrRemoteWriteUrl:
        resourceGroup: management
        step: cluster-output
        name: hcpDcrRemoteWriteUrl
      prometheusUAMIClientId:
        resourceGroup: management
        step: cluster-output
        name: prometheusUAMIClientId
    dependsOn:
    - resourceGroup: management
      step: upgrade-aks-cluster
    - resourceGroup: management
      step: image-registry-policy
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    automatedRetry:
      errorContainsAny:
      - "500 Internal Server Error"
      - "Internal error occurred"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  - name: cleanup-prometheus-pvc
    aksCluster: '{{ .mgmt.aks.name }}'
    action: Shell
    command: ./cleanup-prometheus-pvc.sh
    workingDir: ./scripts
    dependsOn:
    - resourceGroup: management
      step: prometheus
    shellIdentity:
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
  - name: acrpull
    aksCluster: '{{ .mgmt.aks.name }}'
    action: Helm
    releaseName: acrpull
    releaseNamespace: acrpull
    chartDir: ./../acrpull/deploy
    valuesFile: ./../acrpull/deploy/values.yaml
    kustoEndpoint:
      resourceGroup: kusto
      step: output
      name: kustoUri
    kustoDatabase: '{{ .kusto.serviceLogsDatabase }}'
    kustoTable: 'containerLogs'
    dependsOn:
    - resourceGroup: management
      step: prometheus
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    automatedRetry:
      errorContainsAny:
      - "500 Internal Server Error"
      - "Internal error occurred"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  - name: image-registry-policy
    aksCluster: '{{ .mgmt.aks.name }}'
    action: Helm
    releaseName: image-registry-policy
    releaseNamespace: image-registry-policy
    chartDir: ./../image-registry-policy/deploy
    valuesFile: ./../image-registry-policy/values.yaml
    kustoEndpoint:
      resourceGroup: kusto
      step: output
      name: kustoUri
    kustoDatabase: '{{ .kusto.serviceLogsDatabase }}'
    kustoTable: 'containerLogs'
    dependsOn:
    - resourceGroup: management
      step: cluster
    - resourceGroup: management
      step: upgrade-aks-cluster
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    automatedRetry:
      errorContainsAny:
      - "500 Internal Server Error"
      - "Internal error occurred"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  - name: storageclass
    aksCluster: '{{ .mgmt.aks.name }}'
    action: Helm
    releaseName: 'default-sc'
    releaseNamespace: 'default-sc'
    chartDir: ../mgmt-fixes/deploy/default-sc
    valuesFile: ../mgmt-fixes/default-sc.values.yaml
    kustoEndpoint:
      resourceGroup: kusto
      step: output
      name: kustoUri
    kustoDatabase: '{{ .kusto.serviceLogsDatabase }}'
    kustoTable: 'containerLogs'
    dependsOn:
    - resourceGroup: management
      step: upgrade-aks-cluster
    - resourceGroup: management
      step: image-registry-policy
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    automatedRetry:
      errorContainsAny:
      - "500 Internal Server Error"
      - "Internal error occurred"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  - name: mitigations
    aksCluster: '{{ .mgmt.aks.name }}'
    action: Helm
    releaseName: 'mitigations'
    releaseNamespace: 'aro-hcp-mitigations'
    chartDir: ../mgmt-fixes/deploy/mitigations
    valuesFile: ../mgmt-fixes/mitigations.values.yaml
    # Bump timeout to help with scaling event related issues
    timeout: 15m
    kustoEndpoint:
      resourceGroup: kusto
      step: output
      name: kustoUri
    kustoDatabase: '{{ .kusto.serviceLogsDatabase }}'
    kustoTable: 'containerLogs'
    dependsOn:
    - resourceGroup: management
      step: upgrade-aks-cluster
    - resourceGroup: management
      step: image-registry-policy
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    automatedRetry:
      errorContainsAny:
      - "500 Internal Server Error"
      - "Internal error occurred"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  - name: kubelet-ds
    aksCluster: '{{ .mgmt.aks.name }}'
    action: Helm
    releaseName: 'mgmt-fixes'
    releaseNamespace: 'kubelet-ds'
    chartDir: ../mgmt-fixes/deploy/kubelet-ds
    valuesFile: ../mgmt-fixes/kubelet-ds.values.yaml
    kustoEndpoint:
      resourceGroup: kusto
      step: output
      name: kustoUri
    kustoDatabase: '{{ .kusto.serviceLogsDatabase }}'
    kustoTable: 'containerLogs'
    dependsOn:
    - resourceGroup: management
      step: upgrade-aks-cluster
    - resourceGroup: management
      step: image-registry-policy
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    automatedRetry:
      errorContainsAny:
      - "500 Internal Server Error"
      - "Internal error occurred"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  - name: service-lifecycle
    aksCluster: '{{ .mgmt.aks.name }}'
    action: Helm
    releaseName: service-lifecycle
    releaseNamespace: kube-system
    chartDir: ../service-lifecycle/deploy
    valuesFile: ../service-lifecycle/deploy/values.yaml
    kustoEndpoint:
      resourceGroup: kusto
      step: output
      name: kustoUri
    kustoDatabase: '{{ .kusto.serviceLogsDatabase }}'
    kustoTable: 'containerLogs'
    dependsOn:
    - resourceGroup: management
      step: cluster
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    automatedRetry:
      errorContainsAny:
      - "500 Internal Server Error"
      - "Internal error occurred"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  - name: arobit-output
    action: ARM
    template: templates/arobit-lookup.bicep
    parameters: configurations/arobit-lookup.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
    dependsOn:
    - resourceGroup: management
      step: upgrade-aks-cluster
  - name: arobit
    aksCluster: '{{ .mgmt.aks.name }}'
    action: Helm
    releaseName: 'arobit'
    releaseNamespace: 'arobit'
    chartDir: ../observability/arobit/deploy
    valuesFile: ../observability/arobit/values-mgmt.yaml
    timeout: 10m
    kustoEndpoint:
      resourceGroup: kusto
      step: output
      name: kustoUri
    kustoDatabase: '{{ .kusto.serviceLogsDatabase }}'
    kustoTable: 'containerLogs'
    dependsOn:
    - resourceGroup: management
      step: prometheus
    inputVariables:
      tenantId:
        resourceGroup: management
        step: arobit-output
        name: tenantId
      msiClientId:
        resourceGroup: management
        step: arobit-output
        name: msiClientId
      kustoDataIngestionUri:
        resourceGroup: kusto
        step: output
        name: kustoDataIngestionUri
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    automatedRetry:
      errorContainsAny:
      - "500 Internal Server Error"
      - "Internal error occurred"
      - "arobit-forwarder not ready. status: InProgress"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  - name: kube-events
    aksCluster: '{{ .mgmt.aks.name }}'
    action: Helm
    releaseName: kube-events
    releaseNamespace: monitoring
    chartDir: ./../observability/kube-events/deploy
    valuesFile: ./../observability/kube-events/values.yaml
    kustoEndpoint:
      resourceGroup: kusto
      step: output
      name: kustoUri
    kustoDatabase: '{{ .kusto.serviceLogsDatabase }}'
    kustoTable: 'containerLogs'
    dependsOn:
    - resourceGroup: management
      step: upgrade-aks-cluster
    - resourceGroup: management
      step: image-registry-policy
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    automatedRetry:
      errorContainsAny:
      - "500 Internal Server Error"
      - "Internal error occurred"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
