$schema: "pipeline.schema.v1"
serviceGroup: Microsoft.Azure.ARO.HCP.DevCI.CertManager
rolloutName: Opstool cert-manager Rollout
resourceGroups:
- name: opstool
  resourceGroup: '{{ .svc.rg }}'
  subscription: '{{ .svc.subscription.key }}'
  steps:
  - name: output
    action: ARM
    template: ../../templates/output-opstool-cluster.bicep
    parameters: ../../configurations/output-opstool-cluster.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
  # The opstool-cert-manager chart carries the upstream cert-manager chart as a
  # dependency (see deploy/Chart.yaml). The dependency tarball under deploy/charts/
  # is git-ignored (**/charts/*.tgz), so it must be fetched before the Helm deploy
  # step packages the chart. Without this, the Helm loader silently renders an empty
  # release and cert-manager is never installed.
  - name: build-dependencies
    action: Shell
    command: helm dependency build
    workingDir: deploy
    shellIdentity:
      input:
        resourceGroup: opstool
        step: output
        name: opstoolUAMIId
    dependsOn:
    - resourceGroup: opstool
      step: output
  - name: deploy
    aksCluster: '{{ .opstool.aks.name }}'
    action: Helm
    releaseName: 'cert-manager'
    releaseNamespace: '{{ .opstool.certManager.namespace }}'
    namespaceFiles:
    - deploy/namespace.yaml
    chartDir: deploy
    valuesFile: deploy/values.yaml.tmpl
    kustoEndpoint:
      resourceGroup: opstool
      step: output
      name: kustoUri
    kustoDatabase: ''
    kustoTable: ''
    inputVariables:
      tenantId:
        resourceGroup: opstool
        step: output
        name: tenantId
      subscriptionId:
        resourceGroup: opstool
        step: output
        name: subscriptionId
      certManagerUAMIClientId:
        resourceGroup: opstool
        step: output
        name: certManagerUAMIClientId
    dependsOn:
    - resourceGroup: opstool
      step: output
    - resourceGroup: opstool
      step: build-dependencies
    externalDependsOn:
    - serviceGroup: Microsoft.Azure.ARO.HCP.DevCI.Unprivileged
      resourceGroup: opstool
      step: network
    identityFrom:
      resourceGroup: opstool
      step: output
      name: opstoolUAMIId
  - name: issuer
    aksCluster: '{{ .opstool.aks.name }}'
    action: Helm
    releaseName: 'cert-manager-issuer'
    releaseNamespace: '{{ .opstool.certManager.namespace }}'
    chartDir: issuer
    valuesFile: issuer/values.yaml.tmpl
    kustoEndpoint:
      resourceGroup: opstool
      step: output
      name: kustoUri
    kustoDatabase: ''
    kustoTable: ''
    inputVariables:
      subscriptionId:
        resourceGroup: opstool
        step: output
        name: subscriptionId
      certManagerUAMIClientId:
        resourceGroup: opstool
        step: output
        name: certManagerUAMIClientId
    dependsOn:
    - resourceGroup: opstool
      step: deploy
    identityFrom:
      resourceGroup: opstool
      step: output
      name: opstoolUAMIId
