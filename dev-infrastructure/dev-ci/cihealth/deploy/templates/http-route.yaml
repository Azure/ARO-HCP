{{- if and .Values.httpRoute.enabled (.Capabilities.APIVersions.Has "gateway.networking.k8s.io/v1/HTTPRoute") }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "cihealth.appName" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "cihealth.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  parentRefs:
  - name: {{ .Values.httpRoute.gatewayName }}
    namespace: {{ .Values.httpRoute.gatewayNamespace }}
    sectionName: {{ .Values.httpRoute.sectionName }}
  hostnames:
  - {{ .Values.httpRoute.host | quote }}
  rules:
  {{- if .Values.httpRoute.blockReviewPath }}
  - matches:
    - path:
        type: PathPrefix
        value: /review
    - path:
        type: PathPrefix
        value: /api/review
    filters:
    - type: RequestRedirect
      requestRedirect:
        path:
          type: ReplaceFullPath
          replaceFullPath: /
        statusCode: 302
  {{- end }}
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: {{ include "cihealth.appName" . }}
      port: {{ .Values.app.service.port }}
{{- end }}
