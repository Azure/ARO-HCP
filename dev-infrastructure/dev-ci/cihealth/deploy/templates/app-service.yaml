apiVersion: v1
kind: Service
metadata:
  name: {{ include "cihealth.appName" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "cihealth.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  type: {{ .Values.app.service.type | quote }}
  ports:
    - name: http
      port: {{ .Values.app.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "cihealth.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: app
