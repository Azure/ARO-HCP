$schema: "pipeline.schema.v1"
serviceGroup: Microsoft.Azure.ARO.HCP.DevCI.Infra
rolloutName: Opstool Network and Cluster Rollout
resourceGroups:
- name: opstool
  resourceGroup: '{{ .svc.rg }}'
  subscription: '{{ .svc.subscription.key }}'
  steps:
  - name: network
    action: ARM
    template: ../../templates/opstool-network.bicep
    parameters: ../../configurations/opstool-network.tmpl.bicepparam
    deploymentLevel: ResourceGroup
  - name: cluster
    action: ARM
    template: ../../templates/opstool-cluster.bicep
    parameters: ../../configurations/opstool-cluster.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    automatedRetry:
      errorContainsAny:
      - "Internal server error"
      - "Resource is in Updating state"
      maximumRetryCount: 3
      durationBetweenRetries: 2m
    dependsOn:
    - resourceGroup: opstool
      step: network
  # Upgrade the AKS control plane and node pools to the configured Kubernetes
  # version. The `cluster` ARM step only moves the control plane; node pools
  # keep their orchestrator version on a managedCluster PUT, so an explicit
  # `az aks upgrade` (mirroring svc/mgmt) is required to roll the node pools.
  - name: upgrade-aks-cluster
    action: Shell
    command: ./upgrade-aks-cluster.sh
    workingDir: ../../scripts
    shellIdentity:
      input:
        resourceGroup: global
        step: global-identity
        name: globalMSIId
    variables:
    - name: CLUSTER_NAME
      configRef: opstool.aks.name
    - name: RESOURCE_GROUP
      configRef: svc.rg
    - name: KUBERNETES_VERSION
      configRef: opstool.aks.kubernetesVersion
    dependsOn:
    - resourceGroup: opstool
      step: cluster
    - resourceGroup: global
      step: global-identity
  - name: cluster-output
    action: ARM
    template: ../../templates/output-opstool-cluster.bicep
    parameters: ../../configurations/output-opstool-cluster.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
    dependsOn:
    - resourceGroup: opstool
      step: cluster
  # Placeholder kusto output for schema compatibility (opstool doesn't use kusto - a breaking fix)
  - name: kusto-placeholder
    action: ARM
    template: ../../templates/output-opstool-cluster.bicep
    parameters: ../../configurations/output-opstool-cluster.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
    dependsOn:
    - resourceGroup: opstool
      step: cluster-output
  - name: alerting
    action: ARM
    template: ../../templates/opstool-alerting.bicep
    parameters: ../../configurations/opstool-alerting.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    dependsOn:
    - resourceGroup: opstool
      step: cluster
  - name: prometheus
    aksCluster: '{{ .opstool.aks.name }}'
    action: Helm
    releaseName: 'arohcp-monitor'
    releaseNamespace: 'prometheus'
    namespaceFiles:
    - ../../../observability/prometheus/namespace.opstool.yaml
    chartDir: ../../../observability/prometheus/deploy
    valuesFile: ../../../observability/prometheus/values-opstool.yaml
    kustoEndpoint:
      resourceGroup: opstool
      step: kusto-placeholder
      name: kustoUri
    kustoDatabase: ''
    kustoTable: ''
    inputVariables:
      prometheusUAMIClientId:
        resourceGroup: opstool
        step: cluster-output
        name: prometheusUAMIClientId
      dcrRemoteWriteUrl:
        resourceGroup: opstool
        step: cluster-output
        name: dcrRemoteWriteUrl
    dependsOn:
    - resourceGroup: opstool
      step: kusto-placeholder
    identityFrom:
      resourceGroup: opstool
      step: cluster-output
      name: prometheusUAMIId
- name: global
  resourceGroup: '{{ .global.rg }}'
  subscription: '{{ .global.subscription.key }}'
  steps:
  # Expose the shared global rollout identity so the upgrade-aks-cluster Shell
  # step can assume it (same identity used by svc/mgmt upgrade steps).
  - name: global-identity
    action: ARM
    template: ../../templates/output-opstool-global-identity.bicep
    parameters: ../../configurations/output-opstool-global-identity.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
