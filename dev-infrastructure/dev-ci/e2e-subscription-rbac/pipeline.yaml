$schema: "pipeline.schema.v1"
serviceGroup: Microsoft.Azure.ARO.HCP.DevCI.E2ESubscriptionRBAC
rolloutName: Dev CI E2E Subscription RBAC Rollout
# NON-PRIVILEGED pipeline: only reconciles the CI bot Entra identities (Graph
# Application.ReadWrite.OwnedBy axis, not Azure RBAC) and rotates their Key Vault
# secrets (data-plane). None of these steps require Owner/User Access
# Administrator on any subscription, so this pipeline runs unattended as part of
# the Microsoft.Azure.ARO.HCP.DevCI.Unprivileged entrypoint (dev-ci postsubmit).
#
# The privileged subscription-scoped role definitions and role assignments are
# instead applied by the separate Microsoft.Azure.ARO.HCP.DevCI.Privileged
# entrypoint, which is run on demand by an OWNERS-group member
# (`make dev-ci-privileged-local-run`).
resourceGroups:
- name: mock-identities
  resourceGroup: '{{ .global.rg }}'
  subscription: '{{ .global.subscription.key }}'
  steps:
  - name: mock-identity-apps
    action: ARM
    template: ../../templates/mock-identity-apps.bicep
    parameters: ../../configurations/mock-identity-apps.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    automatedRetry:
      errorContainsAny:
      - "Failed to update one or more relationships in 'owners'"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  - name: mock-identity-rbac
    action: ARM
    template: ../../templates/mock-identity-rbac.bicep
    parameters: ../../configurations/mock-identity-rbac.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    automatedRetry:
      errorContainsAny:
      - "does not exist or one of its queried"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
    dependsOn:
    - resourceGroup: mock-identities
      step: mock-identity-apps
  - name: mock-identity-apps-int
    action: ARM
    template: ../../templates/mock-identity-apps.bicep
    parameters: ../../configurations/mock-identity-apps-int.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    automatedRetry:
      errorContainsAny:
      - "Failed to update one or more relationships in 'owners'"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  - name: mock-identity-rbac-int
    action: ARM
    template: ../../templates/mock-identity-rbac.bicep
    parameters: ../../configurations/mock-identity-rbac-int.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    automatedRetry:
      errorContainsAny:
      - "does not exist or one of its queried"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
    dependsOn:
    - resourceGroup: mock-identities
      step: mock-identity-apps-int
- name: ci-bots
  resourceGroup: '{{ .global.rg }}'
  subscription: '{{ .global.subscription.key }}'
  steps:
  - name: global-identity
    action: ARM
    template: ../../templates/output-opstool-global-identity.bicep
    parameters: ../../configurations/output-opstool-global-identity.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
  - name: ci-bot-identity
    action: ARM
    template: ../../templates/ci-bot-identity.bicep
    parameters: ../../configurations/ci-bot-identity.tmpl.bicepparam
    deploymentLevel: ResourceGroup
  - name: ci-bot-secret-int
    action: Shell
    command: ./ci-bot-ensure-secret.sh
    workingDir: ../../scripts
    shellIdentity:
      input:
        resourceGroup: ci-bots
        step: global-identity
        name: globalMSIId
    variables:
    - name: APP_NAME
      configRef: ci.int.bot.applicationName
    - name: ENV_NAME
      value: int
    - name: KEY_VAULT_NAME
      configRef: opstool.keyVault.name
    dependsOn:
    - resourceGroup: ci-bots
      step: ci-bot-identity
  - name: ci-bot-secret-stg
    action: Shell
    command: ./ci-bot-ensure-secret.sh
    workingDir: ../../scripts
    shellIdentity:
      input:
        resourceGroup: ci-bots
        step: global-identity
        name: globalMSIId
    variables:
    - name: APP_NAME
      configRef: ci.stg.bot.applicationName
    - name: ENV_NAME
      value: stg
    - name: KEY_VAULT_NAME
      configRef: opstool.keyVault.name
    dependsOn:
    - resourceGroup: ci-bots
      step: ci-bot-identity
  - name: ci-bot-secret-prod
    action: Shell
    command: ./ci-bot-ensure-secret.sh
    workingDir: ../../scripts
    shellIdentity:
      input:
        resourceGroup: ci-bots
        step: global-identity
        name: globalMSIId
    variables:
    - name: APP_NAME
      configRef: ci.prod.bot.applicationName
    - name: ENV_NAME
      value: prod
    - name: KEY_VAULT_NAME
      configRef: opstool.keyVault.name
    dependsOn:
    - resourceGroup: ci-bots
      step: ci-bot-identity
