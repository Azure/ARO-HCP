---
# Source: DefaultStorageClass/templates/unannotate-default.job.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: annotator
  namespace: 'default-sc'
---
# Source: DefaultStorageClass/templates/managed-csi-premiumv2.storageclass.yaml
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
  name: managed-csi-premiumv2
parameters:
  skuname: PremiumV2_LRS
provisioner: disk.csi.azure.com
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
---
# Source: DefaultStorageClass/templates/unannotate-default.job.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: annotator-cluster-role
rules:
- apiGroups:
  - storage.k8s.io
  resources:
  - storageclasses
  verbs:
  - get
  - patch
  - update
---
# Source: DefaultStorageClass/templates/unannotate-default.job.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: annotator-cluster-role-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: annotator-cluster-role
subjects:
- kind: ServiceAccount
  name: annotator
  namespace: 'default-sc'

---
# Source: DefaultStorageClass/templates/delete-sc-pre-upgrade.job.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: annotator-cluster-role
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-5"
rules:
- apiGroups:
  - storage.k8s.io
  resources:
  - storageclasses
  verbs:
  - get
  - delete
---
# Source: DefaultStorageClass/templates/delete-sc-pre-upgrade.job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: delete-sc-pre-upgrade
  namespace: 'default-sc'
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  activeDeadlineSeconds: 60
  backoffLimit: 3
  template:
    spec:
      containers:
      - command:
        - /bin/sh
        - -c
        - |
          CURRENT_SKU=$(kubectl get storageclass managed-csi-premiumv2 -o jsonpath='{.parameters.skuname}' 2>/dev/null || echo "")
          DESIRED_SKU="PremiumV2_LRS"
          if [ -z "$CURRENT_SKU" ]; then
            echo "StorageClass does not exist, nothing to delete"
          elif [ "$CURRENT_SKU" = "$DESIRED_SKU" ]; then
            echo "StorageClass skuname already matches ($CURRENT_SKU), skipping delete"
          else
            echo "StorageClass skuname mismatch: current=$CURRENT_SKU desired=$DESIRED_SKU, deleting"
            kubectl delete storageclass managed-csi-premiumv2
          fi
        image: "mcr.microsoft.com/aks/command/runtime@sha256:1234567890"
        name: delete-sc
      restartPolicy: OnFailure
      serviceAccountName: annotator
---
# Source: DefaultStorageClass/templates/unannotate-default.job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: unannotate-default-sc
  namespace: 'default-sc'
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
spec:
  activeDeadlineSeconds: 1800
  backoffLimit: 3
  template:
    spec:
      containers:
      - command:
        - /bin/sh
        - -c
        - |
          kubectl annotate storageclass default storageclass.kubernetes.io/is-default-class=false --overwrite
        image: "mcr.microsoft.com/aks/command/runtime@sha256:1234567890"
        name: finalize
      restartPolicy: OnFailure
      serviceAccountName: annotator
