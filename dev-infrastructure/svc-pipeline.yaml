#
# Purpose: Manage service cluster and supporting infra for its services
# Managed Resources:
# * AKS SVC cluster
# * SVC Key Vault with OneCert registration
# * MIs, CosmosDB containers and RBAC for the RP
# * MIs, Postgres DB, OIDC storage and RBAC for Cluster Service
# * MIs, Postgres DB, certificates and RBAC for the Maestro Server
# * MIs and RBAC for ACRPull
# * metrics collection
# Managed Processes:
# * Manage ACRPull
# * Configure and upgrade Istio
#
$schema: "pipeline.schema.v1"
serviceGroup: Microsoft.Azure.ARO.HCP.Service.Infra
rolloutName: Service Cluster Rollout
# Pre-build the Go helpers invoked by Shell steps before the rollout runs.
# The EV2 Shell runner image has no postgres client, so postgres-access grants
# database access in Go (see scripts/postgres-access).
buildStep:
  command: bash
  args:
  - -c
  - |
    set -euo pipefail
    tmp="$(mktemp ./scripts/postgres-access/postgres-access.XXXXXX)"
    trap 'rm -f "${tmp}"' EXIT
    CGO_ENABLED=0 go build -o "${tmp}" ./scripts/postgres-access
    chmod 0755 "${tmp}"
    mv "${tmp}" ./scripts/postgres-access/postgres-access
    trap - EXIT
resourceGroups:
# Query parameters from global deployment, e.g. ACR resource IDs
- name: global
  resourceGroup: '{{ .global.rg }}'
  subscription: '{{ .global.subscription.key }}'
  steps:
  - name: output
    action: ARM
    template: templates/output-global.bicep
    parameters: configurations/output-global.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
  - name: geneva-output
    action: ARM
    template: templates/entra-app-lookup.bicep
    parameters: configurations/geneva-identities-lookup.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
  - name: mise-output
    action: ARM
    template: templates/entra-app-lookup.bicep
    parameters: configurations/mise-identity-lookup.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
# Query parameters from regional deployment, e.g. Azure Monitor workspace ID
- name: regional
  resourceGroup: '{{ .regionRG }}'
  subscription: '{{ .svc.subscription.key }}'
  steps:
  - name: output
    action: ARM
    template: templates/output-region.bicep
    parameters: configurations/output-region.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
  - name: fleet-amw-permissions
    action: ARM
    template: templates/fleet-amw-permissions.bicep
    parameters: configurations/fleet-amw-permissions.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    dependsOn:
    - resourceGroup: service
      step: cluster
- name: auditLogs
  resourceGroup: '{{ .auditLogsEventHub.rg }}'
  subscription: '{{ .svc.subscription.key }}'
  steps:
  - name: output
    action: ARM
    template: templates/output-audit-logs-eventhub.bicep
    parameters: configurations/output-audit-logs-eventhub.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
- name: svcKV
  resourceGroup: '{{ .serviceKeyVault.rg }}'
  subscription: '{{ .serviceKeyVault.subscription.key }}'
  steps:
  - name: output
    action: ARM
    template: templates/subscription-lookup.bicep
    parameters: configurations/subscription-lookup.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
- name: kusto
  resourceGroup: '{{ .kusto.rg }}'
  subscription: '{{ .global.subscription.key }}'
  steps:
  - name: output
    action: ARM
    template: templates/kusto-lookup.bicep
    parameters: configurations/kusto-lookup.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
- name: service
  resourceGroup: '{{ .svc.rg }}'
  subscription: '{{ .svc.subscription.key }}'
  steps:
  # Expose the service subscription id for the postgres-access Shell steps.
  - name: subscription-output
    action: ARM
    template: templates/subscription-lookup.bicep
    parameters: configurations/subscription-lookup.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
  # TODO(ARO-28044): re-enable after ARO-28040
  # - name: grafana-monitoring-reader
  #   action: ARM
  #   template: templates/grafana-monitoring-reader.bicep
  #   parameters: configurations/grafana-monitoring-reader.tmpl.bicepparam
  #   deploymentLevel: Subscription
  #   variables:
  #   - name: grafanaPrincipalId
  #     input:
  #       resourceGroup: global
  #       step: output
  #       name: grafanaPrincipalId
  # Create SVC KV
  - name: infra
    action: ARM
    template: templates/svc-infra.bicep
    parameters: configurations/svc-infra.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    variables:
    - name: globalMSIId
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
    - name: serviceKeyVaultSubscription
      input:
        resourceGroup: svcKV
        step: output
        name: subscriptionId
  - name: infra-output
    action: ARM
    template: templates/svc-infra-lookup.bicep
    parameters: configurations/svc-infra-lookup.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
    dependsOn:
    - resourceGroup: service
      step: infra
    variables:
    - name: serviceKeyVaultSubscription
      input:
        resourceGroup: svcKV
        step: output
        name: subscriptionId
  # Configure certificate issuers for the SVC KV
  - name: oncert-private-kv-issuer
    action: SetCertificateIssuer
    secretKeyVault:
      configRef: ev2.assistedId.certificate.keyVault
    secretName:
      configRef: ev2.assistedId.certificate.name
    applicationId:
      configRef: ev2.assistedId.applicationId
    vaultBaseUrl:
      input:
        resourceGroup: service
        step: infra-output
        name: svcKeyVaultUrl
    issuer:
      value: OneCertV2-PrivateCA
  - name: oncert-public-kv-issuer
    action: SetCertificateIssuer
    secretKeyVault:
      configRef: ev2.assistedId.certificate.keyVault
    secretName:
      configRef: ev2.assistedId.certificate.name
    applicationId:
      configRef: ev2.assistedId.applicationId
    vaultBaseUrl:
      input:
        resourceGroup: service
        step: infra-output
        name: svcKeyVaultUrl
    issuer:
      value: OneCertV2-PublicCA
  # Create certificates
  - name: frontend-cert
    action: CreateCertificate
    secretKeyVault:
      configRef: ev2.assistedId.certificate.keyVault
    secretName:
      configRef: ev2.assistedId.certificate.name
    applicationId:
      configRef: ev2.assistedId.applicationId
    vaultBaseUrl:
      input:
        resourceGroup: service
        step: infra-output
        name: svcKeyVaultUrl
    certificateName:
      configRef: frontend.cert.name
    contentType:
      configRef: frontend.cert.contentType
    san:
      configRef: frontend.cert.san
    issuer:
      configRef: frontend.cert.issuer
    commonName:
      configRef: frontend.cert.san
    dependsOn:
    - resourceGroup: service
      step: infra-output
    - resourceGroup: service
      step: oncert-private-kv-issuer
    - resourceGroup: service
      step: oncert-public-kv-issuer
    automatedRetry:
      errorContainsAny:
      - "InternalServerError"
      - "ServiceUnavailable"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  - name: admin-api-cert
    action: CreateCertificate
    secretKeyVault:
      configRef: ev2.assistedId.certificate.keyVault
    secretName:
      configRef: ev2.assistedId.certificate.name
    applicationId:
      configRef: ev2.assistedId.applicationId
    vaultBaseUrl:
      input:
        resourceGroup: service
        step: infra-output
        name: svcKeyVaultUrl
    certificateName:
      configRef: adminApi.cert.name
    contentType:
      configRef: adminApi.cert.contentType
    san:
      configRef: adminApi.cert.san
    issuer:
      configRef: adminApi.cert.issuer
    commonName:
      configRef: adminApi.cert.san
    dependsOn:
    - resourceGroup: service
      step: infra-output
    - resourceGroup: service
      step: oncert-private-kv-issuer
    - resourceGroup: service
      step: oncert-public-kv-issuer
    automatedRetry:
      errorContainsAny:
      - "InternalServerError"
      - "ServiceUnavailable"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  - name: sessiongate-cert
    action: CreateCertificate
    secretKeyVault:
      configRef: ev2.assistedId.certificate.keyVault
    secretName:
      configRef: ev2.assistedId.certificate.name
    applicationId:
      configRef: ev2.assistedId.applicationId
    vaultBaseUrl:
      input:
        resourceGroup: service
        step: infra-output
        name: svcKeyVaultUrl
    certificateName:
      configRef: sessiongate.cert.name
    contentType:
      configRef: sessiongate.cert.contentType
    san:
      configRef: sessiongate.cert.san
    issuer:
      configRef: sessiongate.cert.issuer
    commonName:
      configRef: sessiongate.cert.san
    dependsOn:
    - resourceGroup: service
      step: infra-output
    - resourceGroup: service
      step: oncert-private-kv-issuer
    - resourceGroup: service
      step: oncert-public-kv-issuer
    automatedRetry:
      errorContainsAny:
      - "InternalServerError"
      - "ServiceUnavailable"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  - name: maestro-server-cert
    action: CreateCertificate
    secretKeyVault:
      configRef: ev2.assistedId.certificate.keyVault
    secretName:
      configRef: ev2.assistedId.certificate.name
    applicationId:
      configRef: ev2.assistedId.applicationId
    vaultBaseUrl:
      input:
        resourceGroup: service
        step: infra-output
        name: svcKeyVaultUrl
    certificateName:
      configRef: maestro.server.mqttClientName
    contentType:
      value: x-pkcs12
    san:
      configRef: maestro.server.certSAN
    issuer:
      configRef: maestro.certIssuer
    commonName:
      configRef: maestro.server.certCN
    dependsOn:
    - resourceGroup: service
      step: infra-output
    - resourceGroup: service
      step: oncert-private-kv-issuer
    - resourceGroup: service
      step: oncert-public-kv-issuer
    automatedRetry:
      errorContainsAny:
      - "InternalServerError"
      - "ServiceUnavailable"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  - name: fpa-cert
    action: CreateCertificate
    manage:
      configRef: firstPartyAppCertificate.manage
    secretKeyVault:
      configRef: ev2.assistedId.certificate.keyVault
    secretName:
      configRef: ev2.assistedId.certificate.name
    applicationId:
      configRef: ev2.assistedId.applicationId
    vaultBaseUrl:
      input:
        resourceGroup: service
        step: infra-output
        name: svcKeyVaultUrl
    certificateName:
      configRef: firstPartyAppCertificate.name
    contentType:
      configRef: firstPartyAppCertificate.contentType
    san:
      configRef: firstPartyAppCertificate.san
    issuer:
      configRef: firstPartyAppCertificate.issuer
    commonName:
      configRef: firstPartyAppCertificate.san
    dependsOn:
    - resourceGroup: service
      step: infra-output
    - resourceGroup: service
      step: oncert-private-kv-issuer
    - resourceGroup: service
      step: oncert-public-kv-issuer
    automatedRetry:
      errorContainsAny:
      - "InternalServerError"
      - "ServiceUnavailable"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  - name: geneva-rp-logs-cert
    action: CreateCertificate
    manage:
      configRef: geneva.logs.manage
    secretKeyVault:
      configRef: ev2.assistedId.certificate.keyVault
    secretName:
      configRef: ev2.assistedId.certificate.name
    applicationId:
      configRef: ev2.assistedId.applicationId
    vaultBaseUrl:
      input:
        resourceGroup: service
        step: infra-output
        name: svcKeyVaultUrl
    certificateName:
      configRef: geneva.logs.rp.secretName
    contentType:
      configRef: geneva.logs.contentType
    san:
      configRef: geneva.logs.rp.san
    issuer:
      configRef: geneva.logs.certificateIssuer
    commonName:
      configRef: geneva.logs.rp.san
    dependsOn:
    - resourceGroup: service
      step: infra-output
    - resourceGroup: service
      step: oncert-private-kv-issuer
    - resourceGroup: service
      step: oncert-public-kv-issuer
    automatedRetry:
      errorContainsAny:
      - "InternalServerError"
      - "ServiceUnavailable"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  # Create SVC cluster
  - name: cluster
    action: ARM
    template: templates/svc-cluster.bicep
    parameters: configurations/svc-cluster.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    variables:
    - name: globalMSIId
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
    - name: ocpAcrResourceId
      input:
        resourceGroup: global
        step: output
        name: ocpAcrResourceId
    - name: svcAcrResourceId
      input:
        resourceGroup: global
        step: output
        name: svcAcrResourceId
    - name: azureMonitoringWorkspaceId
      input:
        resourceGroup: regional
        step: output
        name: azureMonitoringWorkspaceId
    - name: rpCosmosDbAccountId
      input:
        resourceGroup: regional
        step: output
        name: rpCosmosDbAccountId
    - name: azureFrontDoorResourceId
      input:
        resourceGroup: global
        step: output
        name: azureFrontDoorResourceId
    - name: auditLogsEventHubAuthRuleId
      input:
        resourceGroup: auditLogs
        step: output
        name: auditLogsEventHubAuthRuleId
    - name: serviceKeyVaultSubscription
      input:
        resourceGroup: svcKV
        step: output
        name: subscriptionId
    dependsOn:
    - resourceGroup: service
      step: frontend-cert
    - resourceGroup: service
      step: admin-api-cert
    - resourceGroup: service
      step: sessiongate-cert
    - resourceGroup: service
      step: maestro-server-cert
    automatedRetry:
      errorContainsAny:
      - "DeploymentScriptACIProvisioningTimeout"
      - "InternalServerError"
      - "Internal server error"
      - "Resource is in Updating state"
      - "There was a problem communicating with the identity service"
      - "DeploymentScriptExceededMaxAllowedTime"
      - "was not found in the AAD tenant"
      # Transient Network Security Perimeter association failures against the RP
      # Cosmos DB account (exclusive-lock contention / backend retry exhaustion).
      - "AnmPreconditionFailedException"
      - "MaxRetryCountReached"
      - "ServiceUnavailable"
      maximumRetryCount: 3
      durationBetweenRetries: 2m
  - name: upgrade-aks-cluster
    action: Shell
    command: ./upgrade-aks-cluster.sh
    workingDir: ./scripts
    shellIdentity:
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
    variables:
    - name: CLUSTER_NAME
      configRef: svc.aks.name
    - name: RESOURCE_GROUP
      configRef: svc.rg
    - name: KUBERNETES_VERSION
      configRef: svc.aks.kubernetesVersion
    dependsOn:
    - resourceGroup: service
      step: cluster
  - name: cs-postgres-access
    action: Shell
    command: ./scripts/postgres-access/postgres-access
    workingDir: .
    shellIdentity:
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
    variables:
    - name: SUBSCRIPTION_ID
      input:
        resourceGroup: service
        step: subscription-output
        name: subscriptionId
    - name: RESOURCE_GROUP
      configRef: regionRG
    - name: MI_RESOURCE_GROUP
      configRef: svc.rg
    - name: PG_SERVER_NAME
      configRef: clustersService.postgres.name
    - name: DATABASE_NAME
      configRef: clustersService.postgres.databaseName
    - name: NEW_USER_NAME
      configRef: clustersService.managedIdentityName
    - name: ADMIN_USER_NAME
      configRef: global.globalMSIName
    - name: DEPLOY_POSTGRES
      configRef: clustersService.postgres.deploy
    dependsOn:
    - resourceGroup: service
      step: cluster
    - resourceGroup: service
      step: subscription-output
  - name: maestro-postgres-access
    action: Shell
    command: ./scripts/postgres-access/postgres-access
    workingDir: .
    shellIdentity:
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
    variables:
    - name: SUBSCRIPTION_ID
      input:
        resourceGroup: service
        step: subscription-output
        name: subscriptionId
    - name: RESOURCE_GROUP
      configRef: regionRG
    - name: MI_RESOURCE_GROUP
      configRef: svc.rg
    - name: PG_SERVER_NAME
      configRef: maestro.postgres.name
    - name: DATABASE_NAME
      configRef: maestro.postgres.databaseName
    - name: NEW_USER_NAME
      configRef: maestro.server.managedIdentityName
    - name: ADMIN_USER_NAME
      configRef: global.globalMSIName
    - name: DEPLOY_POSTGRES
      configRef: maestro.postgres.deploy
    dependsOn:
    - resourceGroup: service
      step: cluster
    - resourceGroup: service
      step: subscription-output
  - name: oidc-storage-setup
    action: Shell
    command: ./storage.sh
    workingDir: ./scripts
    variables:
    - name: StorageAccountName
      configRef: oidc.storageAccount.name
    dependsOn:
    - resourceGroup: service
      step: cluster
    shellIdentity:
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
  - name: cluster-output
    action: ARM
    template: templates/output-svc-cluster.bicep
    parameters: configurations/output-svc-cluster.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
    dependsOn:
    - resourceGroup: regional
      step: output
    - resourceGroup: service
      step: upgrade-aks-cluster
    - resourceGroup: service
      step: oidc-storage-setup
  - name: kusto-ingest-service-logs
    action: ARM
    template: templates/kusto-grant-ingest.bicep
    parameters: configurations/kusto-svc-ingest.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    variables:
    - name: clusterLogPrincipalId
      input:
        resourceGroup: service
        step: cluster-output
        name: clusterLogPrincipalId
    - name: kustoResourceId
      input:
        resourceGroup: kusto
        step: output
        name: kustoResourceId
    - name: adminApiPrincipalId
      input:
        resourceGroup: service
        step: cluster-output
        name: adminApiPrincipalId
    - name: exporterPrincipalId
      input:
        resourceGroup: service
        step: exporter-output
        name: exporterPrincipalId
    automatedRetry:
      errorContainsAny:
      - "AAD principal was not found"
      maximumRetryCount: 7
      durationBetweenRetries: 1m
    dependsOn:
    - resourceGroup: kusto
      step: output
    - resourceGroup: service
      step: cluster-output
  - name: prometheus
    # Deploy prometheus first since istio depends on it's CRDs
    aksCluster: '{{ .svc.aks.name }}'
    action: Helm
    timeout: 10m
    releaseName: 'arohcp-monitor'
    releaseNamespace: 'prometheus'
    namespaceFiles:
    - ../observability/prometheus/namespace.svc.yaml
    chartDir: ../observability/prometheus/deploy
    valuesFile: ../observability/prometheus/values-svc.yaml
    kustoEndpoint:
      resourceGroup: kusto
      step: output
      name: kustoUri
    kustoDatabase: '{{ .kusto.serviceLogsDatabase }}'
    kustoTable: 'containerLogs'
    inputVariables:
      dcrRemoteWriteUrl:
        resourceGroup: service
        step: cluster-output
        name: dcrRemoteWriteUrl
      hcpDcrRemoteWriteUrl:
        resourceGroup: service
        step: cluster-output
        name: hcpDcrRemoteWriteUrl
      prometheusUAMIClientId:
        resourceGroup: service
        step: cluster-output
        name: prometheusUAMIClientId
    dependsOn:
    - resourceGroup: service
      step: upgrade-aks-cluster
    - resourceGroup: service
      step: image-registry-policy
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    automatedRetry:
      errorContainsAny:
      - "500 Internal Server Error"
      - "Internal error occurred"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  - name: cleanup-prometheus-pvc
    aksCluster: '{{ .svc.aks.name }}'
    action: Shell
    command: ./cleanup-prometheus-pvc.sh
    workingDir: ./scripts
    dependsOn:
    - resourceGroup: service
      step: prometheus
    shellIdentity:
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
  - name: istio-config
    aksCluster: '{{ .svc.aks.name }}'
    action: Helm
    releaseName: 'istio'
    releaseNamespace: 'aks-istio-system'
    chartDir: ../istio/deploy
    valuesFile: ../istio/values.yaml
    namespaceFiles:
    - ../istio/mise.namespace.yaml
    kustoEndpoint:
      resourceGroup: kusto
      step: output
      name: kustoUri
    kustoDatabase: '{{ .kusto.serviceLogsDatabase }}'
    kustoTable: 'containerLogs'
    dependsOn:
    - resourceGroup: service
      step: istio-upgrade
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    inputVariables:
      genevaActionsAppId:
        resourceGroup: global
        step: geneva-output
        name: appId
      tenantId:
        resourceGroup: global
        step: geneva-output
        name: tenantId
      miseAppId:
        resourceGroup: global
        step: mise-output
        name: appId
    automatedRetry:
      errorContainsAny:
      - "500 Internal Server Error"
      - "Internal error occurred"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  - name: istio-upgrade
    aksCluster:
      configRef: svc.aks.name
    action: IstioUpgrade
    timeout: 30m
    dependsOn:
    - resourceGroup: service
      step: prometheus
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    automatedRetry:
      errorContainsAny:
      - "control plane unhealthy"
      - "retiring revision would orphan workloads"
      # TODO: add "ingress gateway unhealthy" — sentinel exists in ARO-Tools (ErrIngressUnhealthy), wire after INT validation
      maximumRetryCount: 3
      durationBetweenRetries: 2m
  - name: acrpull
    aksCluster: '{{ .svc.aks.name }}'
    action: Helm
    releaseName: acrpull
    releaseNamespace: acrpull
    chartDir: ./../acrpull/deploy
    valuesFile: ./../acrpull/deploy/values.yaml
    kustoEndpoint:
      resourceGroup: kusto
      step: output
      name: kustoUri
    kustoDatabase: '{{ .kusto.serviceLogsDatabase }}'
    kustoTable: 'containerLogs'
    dependsOn:
    - resourceGroup: service
      step: prometheus
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    automatedRetry:
      errorContainsAny:
      - "500 Internal Server Error"
      - "Internal error occurred"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  - name: service-lifecycle
    aksCluster: '{{ .svc.aks.name }}'
    action: Helm
    releaseName: service-lifecycle
    releaseNamespace: kube-system
    chartDir: ../service-lifecycle/deploy
    valuesFile: ../service-lifecycle/deploy/values.yaml
    kustoEndpoint:
      resourceGroup: kusto
      step: output
      name: kustoUri
    kustoDatabase: '{{ .kusto.serviceLogsDatabase }}'
    kustoTable: 'containerLogs'
    dependsOn:
    - resourceGroup: service
      step: cluster
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    automatedRetry:
      errorContainsAny:
      - "500 Internal Server Error"
      - "Internal error occurred"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  - name: image-registry-policy
    aksCluster: '{{ .svc.aks.name }}'
    action: Helm
    releaseName: image-registry-policy
    releaseNamespace: image-registry-policy
    chartDir: ./../image-registry-policy/deploy
    valuesFile: ./../image-registry-policy/values.yaml
    kustoEndpoint:
      resourceGroup: kusto
      step: output
      name: kustoUri
    kustoDatabase: '{{ .kusto.serviceLogsDatabase }}'
    kustoTable: 'containerLogs'
    dependsOn:
    - resourceGroup: service
      step: cluster
    - resourceGroup: service
      step: upgrade-aks-cluster
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    automatedRetry:
      errorContainsAny:
      - "500 Internal Server Error"
      - "Internal error occurred"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  - name: arobit-output
    action: ARM
    template: templates/arobit-lookup.bicep
    parameters: configurations/arobit-lookup.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
    dependsOn:
    - resourceGroup: service
      step: upgrade-aks-cluster
  - name: arobit
    aksCluster: '{{ .svc.aks.name }}'
    action: Helm
    releaseName: 'arobit'
    releaseNamespace: 'arobit'
    chartDir: ../observability/arobit/deploy
    valuesFile: ../observability/arobit/values-svc.yaml
    timeout: 10m
    kustoEndpoint:
      resourceGroup: kusto
      step: output
      name: kustoUri
    kustoDatabase: '{{ .kusto.serviceLogsDatabase }}'
    kustoTable: 'containerLogs'
    dependsOn:
    - resourceGroup: service
      step: prometheus
    inputVariables:
      tenantId:
        resourceGroup: service
        step: arobit-output
        name: tenantId
      msiClientId:
        resourceGroup: service
        step: arobit-output
        name: msiClientId
      kustoDataIngestionUri:
        resourceGroup: kusto
        step: output
        name: kustoDataIngestionUri
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    automatedRetry:
      errorContainsAny:
      - "500 Internal Server Error"
      - "Internal error occurred"
      - "arobit-forwarder not ready. status: InProgress"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  - name: kube-events
    aksCluster: '{{ .svc.aks.name }}'
    action: Helm
    releaseName: kube-events
    releaseNamespace: monitoring
    chartDir: ./../observability/kube-events/deploy
    valuesFile: ./../observability/kube-events/values.yaml
    kustoEndpoint:
      resourceGroup: kusto
      step: output
      name: kustoUri
    kustoDatabase: '{{ .kusto.serviceLogsDatabase }}'
    kustoTable: 'containerLogs'
    dependsOn:
    - resourceGroup: service
      step: upgrade-aks-cluster
    - resourceGroup: service
      step: image-registry-policy
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    automatedRetry:
      errorContainsAny:
      - "500 Internal Server Error"
      - "Internal error occurred"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  - name: mirror-exporter-image
    action: ImageMirror
    targetACR:
      configRef: 'acr.svc.name'
    sourceRegistry:
      configRef: customExporter.image.registry
    repository:
      configRef: customExporter.image.repository
    digest:
      configRef: customExporter.image.digest
    pullSecretKeyVault:
      configRef: global.keyVault.name
    pullSecretName:
      configRef: imageSync.ondemandSync.pullSecretName
    shellIdentity:
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
    automatedRetry:
      errorContainsAny:
      - "unknown_storage_failure"
      - "unexpected EOF"
      - "unauthorized: authentication required"
      maximumRetryCount: 5
      durationBetweenRetries: 1m
  - name: exporter-output
    action: ARM
    template: templates/exporter-lookup.bicep
    parameters: configurations/exporter-lookup.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
    dependsOn:
    - resourceGroup: service
      step: upgrade-aks-cluster
  - name: exporter-permissions
    action: ARM
    template: templates/exporter-permissions.bicep
    parameters: configurations/exporter-permissions.tmpl.bicepparam
    deploymentLevel: Subscription
    variables:
    - name: exporterPrincipalId
      input:
        resourceGroup: service
        step: exporter-output
        name: exporterPrincipalId
    dependsOn:
    - resourceGroup: service
      step: exporter-output
