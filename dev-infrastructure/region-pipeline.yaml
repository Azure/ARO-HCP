#
# Purpose: Manage regional resources for ARO HCP shared by SC and MC
# Managed Resources:
# * regional SVC and CX DNS zones and delegates them to the global ones
# * CosmosDB account for the RP
# * Eventgrid Namespaces MQTT for Maestro
# * regional replication for the OCP and SVC ACRs
# * regional Azure Monitor Workspace & linking into global Grafana
# * regional Azure Log Analytics Workspace
#
$schema: "pipeline.schema.v1"
serviceGroup: Microsoft.Azure.ARO.HCP.Region
rolloutName: Region Rollout
resourceGroups:
- name: global
  resourceGroup: '{{ .global.rg }}'
  subscription: '{{ .global.subscription.key }}'
  steps:
  # Query parameters from global deployment, e.g. DNS hzone and ACR resource IDs
  - name: output
    action: ARM
    template: templates/output-global.bicep
    parameters: configurations/output-global.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
  - name: ocp-acr-replication
    action: Shell
    command: ./manage-acr-replication.sh
    workingDir: ./scripts
    variables:
    - name: ACR_NAME
      configRef: acr.ocp.name
    - name: REPLICATION_REGION
      configRef: region
    shellIdentity:
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
  - name: svc-acr-replication
    action: Shell
    command: ./manage-acr-replication.sh
    workingDir: ./scripts
    variables:
    - name: ACR_NAME
      configRef: acr.svc.name
    - name: REPLICATION_REGION
      configRef: region
    shellIdentity:
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
  - name: add-grafana-datasource
    action: GrafanaDatasources
    omitFromServiceGroupCompletion: true
    automatedRetry:
      errorContainsAny:
      - "UpdateConflict"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
    grafanaName: "{{ .monitoring.grafanaName }}"
    grafanaResourceId:
      input:
        resourceGroup: global
        step: output
        name: grafanaResourceId
    # ADX datasource reconciliation. The triple-AND gate is intentional:
    # adxDatasourceEnabled is the feature flag, kusto.manageInstance is
    # the per-region "this region owns the geo's Kusto cluster" marker
    # (mirrors the per-region allowlist that the deleted geography-level
    # step encoded as executionConstraints), and arobit.kusto.enabled is
    # what kusto-lookup.bicep gates on for the kustoUri output. Today
    # exactly one region per geoShortId has manageInstance=true; if that
    # invariant ever changes, the geographies allowlist below would
    # need to be region-aware to avoid two regions racing to reconcile
    # the same global Grafana datasource.
    adx:
      enabled:
        value: "{{ and .monitoring.adxDatasourceEnabled .kusto.manageInstance .arobit.kusto.enabled }}"
      deleteWhenDisabled: true
      clusterUrl:
        input:
          resourceGroup: kusto
          step: output
          name: kustoUri
      defaultDatabase:
        configRef: kusto.serviceLogsDatabase
      datasourceName:
        value: "kusto-{{ .environmentName }}-{{ .azureGeoShortId }}"
      geographies:
        configRef: monitoring.adxDatasourceGeographies
      dataConsistency: strongconsistency
    # Retry signature matches any Grafana datasource API mutation in this
    # step (POST/PUT/DELETE on /api/datasources*), not only ADX. If
    # AzureMonitor reconcile is ever explicitly toggled here, the same
    # retry policy applies to those calls too.
    automatedRetry:
      errorContainsAny:
      - "grafana API POST /api/datasources"
      - "grafana API PUT /api/datasources/"
      - "grafana API DELETE /api/datasources/name/"
      - "failed with status 429"
      - "failed with status 500"
      - "failed with status 502"
      - "failed with status 503"
      - "failed with status 504"
      maximumRetryCount: 5
      durationBetweenRetries: 2m
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    dependsOn:
    - resourceGroup: regional
      step: output
    - resourceGroup: global
      step: output
    - resourceGroup: kusto
      step: output
- name: kusto
  resourceGroup: '{{ .kusto.rg }}'
  subscription: '{{ .global.subscription.key }}'
  steps:
  - name: output
    action: ARM
    template: templates/kusto-lookup.bicep
    parameters: configurations/kusto-lookup.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
  - name: kustoDataConnection
    action: ARM
    template: templates/audit-logs-data-connection.bicep
    parameters: configurations/audit-logs-data-connection.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    dependsOn:
    - resourceGroup: regional
      step: rpRegistration
    variables:
    - name: auditLogsEventHubId
      input:
        resourceGroup: auditLogs
        step: auditLogsEventHub
        name: auditLogsEventHubId
- name: auditLogs
  # In most regions this will be the same as the regional RG,
  # but in dev, we want to deploy the event hub to the shared RG
  resourceGroup: '{{ .auditLogsEventHub.rg }}'
  subscription: '{{ .svc.subscription.key }}'
  steps:
  - name: auditLogsEventHub
    action: ARM
    template: templates/audit-logs-eventhub.bicep
    parameters: configurations/audit-logs-eventhub.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    variables:
    - name: kustoPrincipalId
      input:
        resourceGroup: kusto
        step: output
        name: kustoPrincipalId
- name: regional
  resourceGroup: '{{ .regionRG }}'
  subscription: '{{ .svc.subscription.key }}'
  steps:
  - name: rpRegistration
    action: ProviderFeatureRegistration
    providerConfigRef: svc.subscription.providers
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    dependsOn:
    - resourceGroup: global
      step: svc-acr-replication
    - resourceGroup: global
      step: ocp-acr-replication
  - name: infra
    action: ARM
    template: templates/region.bicep
    parameters: configurations/region.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    automatedRetry:
      errorContainsAny:
      - "Internal error"
      maximumRetryCount: 4
      durationBetweenRetries: 2m
    variables:
    - name: globalMSIId
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
    - name: cxParentZoneResourceId
      input:
        resourceGroup: global
        step: output
        name: cxParentZoneResourceId
    - name: svcParentZoneResourceId
      input:
        resourceGroup: global
        step: output
        name: svcParentZoneResourceId
    - name: grafanaResourceId
      input:
        resourceGroup: global
        step: output
        name: grafanaResourceId
    dependsOn:
    - resourceGroup: regional
      step: rpRegistration
  - name: housekeeping
    action: Shell
    command: ./regional-housekeeping.sh
    workingDir: ./scripts
    variables:
    - name: REGIONAL_RESOURCE_GROUP
      configRef: regionRG
    dependsOn:
    - resourceGroup: regional
      step: infra
    shellIdentity:
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
  - name: output
    action: ARM
    template: templates/output-region.bicep
    parameters: configurations/output-region.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
    dependsOn:
    - resourceGroup: regional
      step: housekeeping
