$schema: pipeline.schema.v1
rolloutName: Geography Rollout
serviceGroup: Microsoft.Azure.ARO.HCP.Geography
resourceGroups:
- name: global
  resourceGroup: '{{ .global.rg }}'
  subscription: '{{ .global.subscription.key }}'
  steps:
  - name: output
    action: ARM
    template: templates/output-global.bicep
    parameters: configurations/output-global.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
- name: kusto-infra
  resourceGroup: '{{ .kusto.rg }}'
  subscription: '{{ .global.subscription.key }}'
  executionConstraints:
  - clouds:
    - public
    environments:
    - int
    regions:
    - uksouth
  - clouds:
    - public
    environments:
    - stg
    regions:
    - uksouth
  - clouds:
    - public
    environments:
    - prod
    regions:
    - australiaeast
    - brazilsouth
    - canadacentral
    - centralindia
    - eastus2
    - eastus2euap
    - westeurope
    - switzerlandnorth
    - uksouth
  steps:
  - name: deploy
    action: ARM
    template: templates/kusto.bicep
    parameters: configurations/kusto.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    variables:
    - name: grafanaResourceId
      input:
        resourceGroup: global
        step: output
        name: grafanaResourceId
    dependsOn:
    - resourceGroup: global
      step: output
  - name: adx-datasource
    action: GrafanaDatasources
    omitFromServiceGroupCompletion: true
    grafanaName: "{{ .monitoring.grafanaName }}"
    grafanaResourceId:
      input:
        resourceGroup: global
        step: output
        name: grafanaResourceId
    azureMonitor:
      enabled: false
    adx:
      enabled:
        value: "{{ and .monitoring.adxDatasourceEnabled .kusto.manageInstance }}"
      deleteWhenDisabled: true
      clusterUrl:
        input:
          resourceGroup: kusto-infra
          step: deploy
          name: kustoUri
      defaultDatabase:
        configRef: kusto.serviceLogsDatabase
      datasourceName:
        value: "kusto-{{ .environmentName }}-{{ .azureGeoShortId }}"
      geographies:
        configRef: monitoring.adxDatasourceGeographies
      dataConsistency: strongconsistency
    automatedRetry:
      errorContainsAny:
      - "grafana API POST /api/datasources"
      - "grafana API PUT /api/datasources/"
      - "grafana API DELETE /api/datasources/name/"
      - "failed with status 429"
      - "failed with status 500"
      - "failed with status 502"
      - "failed with status 503"
      - "failed with status 504"
      maximumRetryCount: 5
      durationBetweenRetries: 2m
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    dependsOn:
    - resourceGroup: global
      step: output
    - resourceGroup: kusto-infra
      step: deploy
