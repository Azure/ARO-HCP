$schema: pipeline.schema.v1
rolloutName: Geography Rollout
serviceGroup: Microsoft.Azure.ARO.HCP.Geography
resourceGroups:
- name: global
  resourceGroup: '{{ .global.rg }}'
  subscription: '{{ .global.subscription.key }}'
  steps:
  - name: output
    action: ARM
    template: templates/output-global.bicep
    parameters: configurations/output-global.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
- name: kusto-infra
  resourceGroup: '{{ .kusto.rg }}'
  subscription: '{{ .global.subscription.key }}'
  executionConstraints:
  - clouds:
    - public
    environments:
    - int
    regions:
    - uksouth
    - westus3
  - clouds:
    - public
    environments:
    - stg
    regions:
    - uksouth
  - clouds:
    - public
    environments:
    - prod
    regions:
    - australiaeast
    - brazilsouth
    - canadacentral
    - centralindia
    - eastus2
    - eastus2euap
    - westeurope
    - switzerlandnorth
    - uksouth
  steps:
  - name: deploy
    action: ARM
    template: templates/kusto.bicep
    parameters: configurations/kusto.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    variables:
    - name: globalMSIId
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
    dependsOn:
    - resourceGroup: global
      step: output
    automatedRetry:
      errorContainsAny:
      - "InternalServerError"
      - "Internal server error"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
  - name: entity-groups
    action: KustoEntityGroups
    entityGroups:
    - "AllServiceLogs:ServiceLogs"
    - "AllHostedControlPlaneLogs:HostedControlPlaneLogs"
    timeout: "10m"
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    dependsOn:
    - resourceGroup: kusto-infra
      step: deploy
