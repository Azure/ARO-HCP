      jsonPath: .status.startedAt
    - name: Completed
      type: string
      format: date-time
      jsonPath: .status.completedAt
    schema:
      openAPIV3Schema:
        description: |-
          HCPRecovery represents a disaster recovery operation for a Hosted Control Plane.
          It orchestrates the restoration of an HCP from a Velero backup, coordinating
          the pause of the HostedCluster, deletion and recreation of the HCP namespace,
          Velero restore execution, CAPI machine reconciliation, and post-restore health checks.
          The spec is immutable after creation — to change recovery parameters, delete and recreate.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              spec defines the desired recovery operation, including the target cluster
              and backup to restore from. This field is immutable after creation.
            properties:
              clusterId:
                description: |-
                  clusterId is the identifier of the Hosted Cluster to recover.
                  This is used to locate the HostedCluster and HCP resources
                  on the management cluster.
                type: string
              backupId:
                description: |-
                  backupId is the identifier of the Velero backup to restore from.
                  The controller validates that this backup exists and is in a
                  completed state before proceeding with the restore.
                type: string
            required:
            - clusterId
            - backupId
            type: object
            x-kubernetes-validations:
            - rule: "self == oldSelf"
              message: "spec is immutable"
          status:
            description: |-
              status contains the observed state of the recovery operation, including
              progress through each recovery step and timestamps.
            properties:
              conditions:
                description: |-
                  conditions represent the current state of the recovery operation.
                  Each condition corresponds to a step in the recovery process.
                  Known condition types are:
                  - "BackupValidated": The specified backup exists and is valid
                  - "HostedClusterPaused": The HostedCluster has been paused
                  - "CAPIMachinesBackedUp": CAPI Machine state has been captured
                  - "HCPNamespaceDeleted": The HCP namespace has been deleted
                  - "CloudFinalizersRemoved": Finalizers removed from cloud resources
                  - "DeploymentFinalizersRemoved": Finalizers removed from deployment resources
                  - "NamespaceFullyRemoved": Namespace and resources fully removed
                  - "VeleroRestoreCompleted": Velero restore has completed
                  - "CAPIMachinesReconciled": CAPI Machines reconciled with restored state
                  - "ManagedByReconciled": Ownership references reconciled
                  - "HostedClusterUnpaused": HostedCluster unpaused after restore
                  - "HealthChecked": Post-restore health checks passed
                items:
                  description: Condition contains details for one aspect of the current state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed. If that is not known, then using the
                        time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration
                        is 9, the condition is out of date with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              startedAt:
                description: |-
                  startedAt is the timestamp when the recovery operation began processing.
                format: date-time
                type: string
              completedAt:
                description: |-
                  completedAt is the timestamp when the recovery operation finished,
                  either successfully or with a terminal failure.
                format: date-time
                type: string
              restoredToTimestamp:
                description: |-
                  restoredToTimestamp is the point-in-time that the backup represents,
                  indicating the state the HCP has been restored to.
                format: date-time
                type: string
              capiMachineBackup:
                description: |-
                  capiMachineBackup is a reference to the stored CAPI Machine state
                  that was captured before the HCP namespace was deleted. This state
                  is used to reconcile machines after the Velero restore completes.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
