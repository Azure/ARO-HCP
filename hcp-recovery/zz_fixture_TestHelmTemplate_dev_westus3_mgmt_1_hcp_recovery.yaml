# Source: hcp-recovery/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hcp-recovery
  namespace: hcp-recovery
  labels:
    app.kubernetes.io/name: hcp-recovery
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: hcp-recovery
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hcp-recovery
        azure.workload.identity/use: "true"
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
      - command:
        - "/hcp-recovery"
        args:
        - controller
        - "-v=2"
        - "--leader-election-lease-duration=15s"
        - "--leader-election-renew-deadline=10s"
        - "--leader-election-retry-period=2s"
        image: "arohcpsvcdev.azurecr.io/arohcprecovery@sha256:1234567890"
        name: hcp-recovery-controller
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        ports:
        - containerPort: 8080
          protocol: TCP
          name: http
        securityContext:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
          readOnlyRootFilesystem: true
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
        volumeMounts: []
      volumes: []
      serviceAccountName: hcp-recovery
      terminationGracePeriodSeconds: 10
      nodeSelector:
---
