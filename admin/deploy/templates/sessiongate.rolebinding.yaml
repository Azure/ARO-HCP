apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: admin-api-sessiongate
  namespace: '{{ .Values.sessiongate.namespace }}'
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: admin-api-sessiongate
subjects:
- kind: ServiceAccount
  name: {{ .Values.serviceAccount.name }}
  namespace: '{{ .Release.Namespace }}'
