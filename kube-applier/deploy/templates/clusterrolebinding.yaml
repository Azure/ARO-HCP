apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-applier
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-applier
subjects:
- kind: ServiceAccount
  name: '{{ .Values.serviceAccount.name }}'
  namespace: '{{ .Release.Namespace }}'
