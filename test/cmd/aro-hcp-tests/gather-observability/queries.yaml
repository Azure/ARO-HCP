panels:
- title: "Frontend Metrics"
  queries:
  - title: "Frontend Request Latency"
    description: "Latency of frontend requests, measured as the 95th percentile of request duration. High latency indicates performance issues."
    query: |
      histogram_quantile(0.95,
        sum by (le, route, method) (
            rate(frontend_http_requests_duration_seconds_bucket[5m])
          )
      )
    unit: seconds
    workspace: svc
    step: "60s"
- title: "Backend Metrics"
  queries:
  - title: "Controller Workqueue Retry Ratio"
    description: "Ratio of items re-queued for retry vs items initially added, per controller workqueue. High ratios indicate controllers are repeatedly failing to reconcile. Each backend operation type (ClusterCreate, ClusterDelete, NodePoolCreate, etc.) has its own workqueue."
    query: |
      (
        sum by (name, cluster) (
          max without(prometheus_replica) (
            rate(workqueue_retries_total{namespace="aro-hcp"}[10m])
          )
        )
        /
        sum by (name, cluster) (
          max without(prometheus_replica) (
            rate(workqueue_adds_total{namespace="aro-hcp"}[10m])
          )
        )
      )
    unit: ratio
    workspace: svc
    step: "60s"
  - title: "Controller Workqueue Depth"
    description: "Number of items waiting to be processed in each controller workqueue. Sustained depth indicates the controller cannot keep up with incoming work items."
    query: |
      max by (name, cluster) (
        max without(prometheus_replica) (
          workqueue_depth{namespace="aro-hcp"}
        )
      )
    unit: items
    workspace: svc
    step: "60s"
  - title: "Controller Panic Rate"
    description: "Rate of panics caught by the runtime panic handler, per controller. Any non-zero rate indicates a controller is actively crashing and recovering via the panic handler."
    query: |
      sum by (controller, cluster) (
        rate(panic_total{namespace="aro-hcp"}[5m])
      )
    unit: /s
    workspace: svc
    step: "60s"
- title: "Maestro Metrics"
  queries:
  - title: "REST API Request Rate by Status"
    description: "Rate of REST API requests grouped by HTTP status code. Clusters-service and backend use this API for resource CRUD. Non-2xx codes indicate client errors (4xx) or server failures (5xx)."
    query: |
      sum by (code) (
        rate(rest_api_inbound_request_count{namespace="maestro"}[5m])
      )
    unit: /s
    workspace: svc
    step: "60s"
  - title: "gRPC Server Call Rate"
    description: "Rate of gRPC calls by type (publish/subscribe). Publish distributes resource specs to management cluster work agents. Subscribe receives status updates back. Shows communication volume between Maestro and its clients."
    query: |
      sum by (type) (
        rate(grpc_server_called_total{namespace="maestro"}[5m])
      )
    unit: /s
    workspace: svc
    step: "60s"
  - title: "gRPC Server Error Rate"
    description: "Rate of gRPC calls completed with non-OK status codes, by type and error code. Non-zero values indicate communication failures between Maestro and source clients or management cluster agents."
    query: |
      sum by (type, code) (
        rate(grpc_server_processed_total{namespace="maestro", code!="OK"}[5m])
      )
    unit: /s
    workspace: svc
    step: "60s"
  - title: "gRPC Registered Source Clients"
    description: "Number of source clients (clusters-service, backend) connected to the Maestro gRPC server. Source clients subscribe to resource status updates broadcast by Maestro when management cluster work agents report back."
    query: |
      sum by (cluster) (
        grpc_server_registered_source_clients{namespace="maestro"}
      )
    unit: clients
    workspace: svc
    step: "60s"
  - title: "Spec Controller Reconcile Rate"
    description: "Rate of spec controller reconciliations by status (success/error). The spec controller distributes resource specs to management cluster work agents via CloudEvents. Errors mean resources are not reaching their target clusters."
    query: |
      sum by (status) (
        rate(spec_controller_event_reconcile_total{namespace="maestro"}[5m])
      )
    unit: /s
    workspace: svc
    step: "60s"
  - title: "Status Controller Reconcile Rate"
    description: "Rate of status controller reconciliations by status (success/error). The status controller processes resource status updates received from management cluster work agents and broadcasts them to source clients."
    query: |
      sum by (status) (
        rate(status_controller_event_reconcile_total{namespace="maestro"}[5m])
      )
    unit: /s
    workspace: svc
    step: "60s"
  - title: "Resource Processing Rate"
    description: "Rate of resources processed by the Maestro server, broken down by action (create, update, delete). Incremented in the resource service each time a resource bundle is successfully applied."
    query: |
      sum by (action) (
        rate(resource_processed_total{namespace="maestro"}[5m])
      )
    unit: /s
    workspace: svc
    step: "60s"
  - title: "CloudEvents Flow"
    description: "Rate of CloudEvents sent from the Maestro server to work agents on management clusters, broken down by action and event type. Tracks the flow of resource spec updates (create, update, delete, resync) from the control plane to management clusters."
    query: |
      sum by (action, type) (
        rate(cloudevents_sent_total{namespace="maestro"}[5m])
      )
    unit: /s
    workspace: svc
    step: "60s"
  - title: "Advisory Lock Latency p99"
    description: "99th percentile of PostgreSQL advisory lock hold duration. Maestro uses advisory locks to prevent race conditions in resource operations and for leader election. Sustained high latency indicates database contention."
    query: |
      histogram_quantile(0.99,
        sum by (le) (
          rate(advisory_lock_duration_bucket{namespace="maestro"}[5m])
        )
      )
    unit: seconds
    workspace: svc
    step: "60s"
  - title: "Advisory Lock Rate"
    description: "Rate of advisory lock acquisitions by type (resources, resource_status, events, instances). Shows database locking activity patterns. High lock rates on a specific type may indicate contention."
    query: |
      sum by (type) (
        rate(advisory_lock_count{namespace="maestro"}[5m])
      )
    unit: /s
    workspace: svc
    step: "60s"
