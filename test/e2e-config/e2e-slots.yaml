version: 1

environments:
  dev:
    deploy_envs:
      - prow
      - ci01
    pools:
      - subscription_name: "ARO HCP E2E Hosted Clusters (EA Subscription)"
        region: westus3
        resource_type: aro-hcp-dev-shard0-westus3-slot
        slot_count: 15
        identity_container_prefix: aro-hcp-msi-container-dev
        identity_container_count: 20

