namespace: acrpull
image: "{{ .acrPull.image.registry }}/{{ .acrPull.image.repository }}@{{ .acrPull.image.digest }}"
ttlRotationFraction: 0.5
replicas: 2
resources:
  requests:
    memory: "{{ .acrPull.k8s.resources.requests.memory }}"
  limits:
    memory: "{{ .acrPull.k8s.resources.limits.memory }}"
