apiVersion: v1
kind: Service
metadata:
  name: mgmt-agent-metrics
  namespace: '{{ .Release.Namespace }}'
  labels:
    app.kubernetes.io/name: "mgmt-agent"
    port: metrics
spec:
  selector:
    app.kubernetes.io/name: mgmt-agent
  ports:
  - port: {{ .Values.health.port }}
    targetPort: {{ .Values.health.port }}
    protocol: TCP
    name: metrics
