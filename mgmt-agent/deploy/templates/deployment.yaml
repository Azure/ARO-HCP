apiVersion: apps/v1
kind: Deployment
metadata:
  name: mgmt-agent
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: mgmt-agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: mgmt-agent
  replicas: {{ .Values.deployment.replicas }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mgmt-agent
        azure.workload.identity/use: "true"
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
      - command:
        - "/mgmt-agent"
        args:
        - controller
        - "--health-address=:{{ .Values.health.port }}"
        - "--log-verbosity={{ .Values.logVerbosity }}"
        image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}@{{ .Values.image.digest }}"
        name: mgmt-agent-controller
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: AZURE_TOKEN_CREDENTIALS
          value: "WorkloadIdentityCredential"
        ports:
        - containerPort: {{ .Values.health.port }}
          protocol: TCP
          name: health
        securityContext:
          runAsNonRoot: true
          runAsUser: 65532
          runAsGroup: 65532
          seccompProfile:
            type: RuntimeDefault
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
          readOnlyRootFilesystem: true
        livenessProbe:
          httpGet:
            path: /healthz
            port: {{ .Values.health.port }}
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: {{ .Values.health.port }}
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: {{ .Values.deployment.requests.cpu }}
            memory: {{ .Values.deployment.requests.memory }}
        volumeMounts: []
      volumes: []
      serviceAccountName: {{ .Values.serviceAccount.name }}
      terminationGracePeriodSeconds: 10
      nodeSelector:
      {{- with .Values.nodeSelector }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
