name: "CodeQL Analysis"
on:
  pull_request:
    branches:
    - main
  push:
    branches:
    - main
  schedule:
  # Run at 2:00 AM UTC every day
  - cron: '0 2 * * *'
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ['go', 'python']
    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Set up Go
      if: matrix.language == 'go'
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.work'
        cache-dependency-path: '**/go.sum'
    # Initializes the CodeQL tools for scanning
    - name: Initialize CodeQL
      uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
      with:
        languages: ${{ matrix.language }}
        # Use default CodeQL query packs
        # For custom queries, add: queries: security-and-quality
    # Autobuild attempts to build any compiled languages (Go, C/C++, C#, Java, etc.)
    - name: Autobuild
      uses: github/codeql-action/autobuild@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
      with:
        category: "/language:${{matrix.language}}"
