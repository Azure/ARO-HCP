name: ARO HCP Dev Environment Continuous Deployment
env:
  DEPLOY_ENV: dev
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  PRINCIPAL_ID: ${{ secrets.GHA_PRINCIPAL_ID }}
  PERSIST: true
on:
  workflow_call:
    inputs:
      push:
        description: 'Push to the registry'
        required: true
        type: boolean
      cancel-in-progress:
        description: 'Cancel in-progress runs'
        required: false
        type: boolean
        default: false
    secrets:
      AZURE_CLIENT_ID:
        description: 'Azure Client ID'
        required: false
      AZURE_TENANT_ID:
        description: 'Azure Tenant ID'
        required: false
      AZURE_SUBSCRIPTION_ID:
        description: 'Azure Subscription ID'
        required: false
concurrency:
  group: ${{ github.workflow }}-service-ci
  cancel-in-progress: ${{ inputs.cancel-in-progress }}
jobs:
  build_push:
    permissions:
      id-token: 'write'
      contents: 'read'
    runs-on: 'ubuntu-latest'
    strategy:
      fail-fast: false
      matrix:
        include:
        - name: aro-hcp-exporter
          dir: tooling/aro-hcp-exporter
          push_target: push
          setup_go: false
          skip_build_on_push: false
        - name: frontend
          dir: frontend
          push_target: build-and-push
          setup_go: true
          skip_build_on_push: false
        - name: backend
          dir: backend
          push_target: build-and-push
          setup_go: true
          skip_build_on_push: false
        - name: admin-api
          dir: admin
          push_target: build-and-push
          setup_go: true
          skip_build_on_push: true
        - name: sessiongate
          dir: sessiongate
          push_target: build-and-push
          setup_go: true
          skip_build_on_push: true
        - name: oc-mirror
          dir: image-sync/oc-mirror
          push_target: push
          setup_go: false
          skip_build_on_push: false
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      with:
        fetch-depth: 1
    - uses: actions/setup-go@v6
      if: matrix.setup_go
      with:
        go-version-file: 'go.work'
    - name: Build ${{ matrix.name }} container image
      if: ${{ !matrix.skip_build_on_push || inputs.push == false }}
      run: |
        cd ${{ matrix.dir }}
        make image
    - name: "install azure-cli"
      if: inputs.push == true
      uses: "Azure/ARO-HCP@main"
    - name: 'Az CLI login'
      if: inputs.push == true
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    - name: Push ${{ matrix.name }} container image
      if: inputs.push == true
      run: |
        cd ${{ matrix.dir }}
        for attempt in 1 2 3; do
          echo "Push attempt ${attempt}/3"
          if make ${{ matrix.push_target }}; then
            exit 0
          fi
          echo "Attempt ${attempt} failed, retrying in 30s..."
          sleep 30
        done
        echo "All push attempts failed"
        exit 1
  verify_images:
    if: inputs.push == true
    needs:
    - build_push
    permissions:
      id-token: 'write'
      contents: 'read'
    runs-on: 'ubuntu-latest'
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      with:
        fetch-depth: 1
    - name: "install azure-cli"
      uses: "Azure/ARO-HCP@main"
    - name: 'Az CLI login'
      uses: azure/login@a65d910e8af852a8061c627c456678983e180302 # v2.2.0
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    - name: Verify all images are available
      env:
        ACR_NAME: arohcpsvcdev
        MAX_RETRIES: "5"
        RETRY_DELAY: "60"
      run: |
        set -euo pipefail

        TAG=$(./generate-tag.sh)
        COMMIT=$(git rev-parse --short=7 HEAD)
        echo "Verifying images for tag=${TAG} commit=${COMMIT}"

        az acr login --name "${ACR_NAME}"

        IMAGES=(
          "arohcpfrontend"
          "arohcpbackend"
          "arohcpadminapi"
          "arohcpsessiongate"
          "arohcpmetrics"
          "image-sync/oc-mirror"
        )
        REGISTRY="${ACR_NAME}.azurecr.io"

        failed=()
        for image in "${IMAGES[@]}"; do
          echo "---"
          echo "Checking ${REGISTRY}/${image}:${TAG}"

          found=false
          for attempt in $(seq 1 "${MAX_RETRIES}"); do
            if docker manifest inspect "${REGISTRY}/${image}:${TAG}" > /dev/null 2>&1; then
              echo "Found ${image}:${TAG} (attempt ${attempt}/${MAX_RETRIES})"
              found=true
              break
            fi

            if [ "${attempt}" -eq "${MAX_RETRIES}" ]; then
              echo "FAILED: ${image}:${TAG} not found after ${MAX_RETRIES} attempts"
              failed+=("${image}")
            else
              echo "  Attempt ${attempt}/${MAX_RETRIES}: not found yet, retrying in ${RETRY_DELAY}s..."
              sleep "${RETRY_DELAY}"
            fi
          done
        done

        echo "---"
        if [ ${#failed[@]} -gt 0 ]; then
          echo "FAILED: The following images were not found:"
          printf '  - %s\n' "${failed[@]}"
          exit 1
        fi
        echo "All images verified for commit ${COMMIT} (tag ${TAG})"
