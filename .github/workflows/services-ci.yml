name: ARO HCP Dev Environment Continuous Deployment
env:
  DEPLOY_ENV: dev
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  PRINCIPAL_ID: ${{ secrets.GHA_PRINCIPAL_ID }}
  PERSIST: true
on:
  workflow_call:
    inputs:
      push:
        description: 'Push to the registry'
        required: true
        type: boolean
      cancel-in-progress:
        description: 'Cancel in-progress runs'
        required: false
        type: boolean
        default: false
    secrets:
      AZURE_CLIENT_ID:
        description: 'Azure Client ID'
        required: false
      AZURE_TENANT_ID:
        description: 'Azure Tenant ID'
        required: false
      AZURE_SUBSCRIPTION_ID:
        description: 'Azure Subscription ID'
        required: false
concurrency:
  group: ${{ github.workflow }}-service-ci
  cancel-in-progress: ${{ inputs.cancel-in-progress }}
jobs:
  build_push:
    permissions:
      id-token: 'write'
      contents: 'read'
    runs-on: 'ubuntu-latest'
    strategy:
      fail-fast: false
      matrix:
        include:
        - name: aro-hcp-exporter
          dir: tooling/aro-hcp-exporter
          push_target: push
          setup_go: false
          skip_build_on_push: false
          acr_image: arohcpmetrics
        - name: frontend
          dir: frontend
          push_target: build-and-push
          setup_go: true
          skip_build_on_push: false
          acr_image: arohcpfrontend
        - name: backend
          dir: backend
          push_target: build-and-push
          setup_go: true
          skip_build_on_push: false
          acr_image: arohcpbackend
        - name: admin-api
          dir: admin
          push_target: build-and-push
          setup_go: true
          skip_build_on_push: true
          acr_image: arohcpadminapi
        - name: sessiongate
          dir: sessiongate
          push_target: build-and-push
          setup_go: true
          skip_build_on_push: true
          acr_image: arohcpsessiongate
        - name: oc-mirror
          dir: image-sync/oc-mirror
          push_target: push
          setup_go: false
          skip_build_on_push: false
          acr_image: image-sync/oc-mirror
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      with:
        fetch-depth: 1
    - uses: actions/setup-go@v6
      if: matrix.setup_go
      with:
        go-version-file: 'go.work'
    - name: Build ${{ matrix.name }} container image
      if: ${{ !matrix.skip_build_on_push || inputs.push == false }}
      run: |
        cd ${{ matrix.dir }}
        make image
    - name: "install azure-cli"
      if: inputs.push == true
      uses: "Azure/ARO-HCP@main"
    - name: 'Az CLI login'
      if: inputs.push == true
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    - name: Push ${{ matrix.name }} container image
      if: inputs.push == true
      run: |
        cd ${{ matrix.dir }}
        for attempt in 1 2 3; do
          echo "Push attempt ${attempt}/3"
          if make ${{ matrix.push_target }}; then
            exit 0
          fi
          echo "Attempt ${attempt} failed, retrying in 30s..."
          sleep 30
        done
        echo "All push attempts failed"
        exit 1
    - name: Verify ${{ matrix.name }} image in ACR
      if: inputs.push == true
      env:
        ACR_NAME: arohcpsvcdev
      run: |
        TAG=$(./generate-tag.sh)
        echo "Verifying ${{ matrix.acr_image }}:${TAG} in ${ACR_NAME}"
        az acr manifest show \
          --registry "${ACR_NAME}" \
          --name "${{ matrix.acr_image }}" \
          --tag "${TAG}" \
          --output none
        echo "Verified ${{ matrix.acr_image }}:${TAG}"
