$schema: "pipeline.schema.v1"
serviceGroup: Microsoft.Azure.ARO.HCP.HolmesGPT.Svc
rolloutName: HolmesGPT Svc Rollout
resourceGroups:
- name: global
  resourceGroup: '{{ .global.rg }}'
  subscription: '{{ .global.subscription.key }}'
  steps:
  - name: output
    action: ARM
    template: templates/output-global.bicep
    parameters: ../dev-infrastructure/configurations/output-global.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
- name: kusto
  resourceGroup: '{{ .kusto.rg }}'
  subscription: '{{ .global.subscription.key }}'
  steps:
  - name: kusto-lookup
    action: ARM
    template: ../dev-infrastructure/templates/kusto-lookup.bicep
    parameters: ../dev-infrastructure/configurations/kusto-lookup.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
- name: service
  resourceGroup: '{{ .svc.rg }}'
  subscription: '{{ .svc.subscription.key }}'
  steps:
  - name: output
    action: ARM
    template: ../dev-infrastructure/templates/holmesgpt-lookup.bicep
    parameters: ../dev-infrastructure/configurations/holmesgpt-svc-lookup.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
  - name: deploy
    aksCluster: '{{ .svc.aks.name }}'
    action: Helm
    releaseName: 'holmesgpt-svc'
    releaseNamespace: 'aro-holmesgpt'
    chartDir: ./deploy-svc
    valuesFile: ./svc-values.yaml
    namespaceFiles:
    - namespace.yaml
    kustoEndpoint:
      resourceGroup: kusto
      step: kusto-lookup
      name: kustoUri
    kustoDatabase: '{{ .kusto.serviceLogsDatabase }}'
    kustoTable: 'containerLogs'
    inputVariables:
      holmesgptSvcMsiClientId:
        resourceGroup: service
        step: output
        name: holmesgptMsiClientId
      tenantId:
        resourceGroup: service
        step: output
        name: tenantId
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
