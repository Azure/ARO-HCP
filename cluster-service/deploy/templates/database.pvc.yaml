{{- if not .Values.useAzureDB }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: '{{ .Values.databaseServiceName }}'
  namespace: '{{ .Release.Namespace }}'
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: '{{ .Values.databaseVolumeCapacity }}'
{{- end }}
