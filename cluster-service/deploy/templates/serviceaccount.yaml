apiVersion: v1
kind: ServiceAccount
metadata:
  name: '{{ .Values.serviceAccountName }}'
  namespace: '{{ .Release.Namespace }}'
  labels:
    app: clusters-service
  annotations:
    azure.workload.identity/client-id: '{{ .Values.azureCsMiClientId }}'
    azure.workload.identity/tenant-id: '{{ .Values.tenantId }}'
