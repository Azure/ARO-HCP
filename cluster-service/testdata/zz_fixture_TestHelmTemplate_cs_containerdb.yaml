kind: ConfigMap
metadata:
  name: cloud-resources-config
  namespace: 'clusters-service'
---
# Source: clusters-service/templates/cluster-proxy-service-config.configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-proxy-service-config
  namespace: 'clusters-service'
data:
  config.yaml: |
    # Hosts that should be added to noProxy for all clusters
    noProxy: []
    # Hosts that should be added to noProxy for AWS clusters
    noProxy_aws: []
    # Hosts that should be added to noProxy for GCP clusters
    noProxy_gcp: []
    # Readiness endpoints that verify proxy connectivity
    readinessEndpoints:
      - "https://api.openshift.com"
---
# Source: clusters-service/templates/region-constraints-config.configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: region-constraints-config
  namespace: 'clusters-service'
data:
  config.yaml: |
    cloud_providers:
    - name: azure
      regions:
        - name: 'westus3'
          version_constraints:
            min_version: 4.11.0
---
# Source: clusters-service/templates/database.pvc.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: 'ocm-cs-db'
  namespace: 'clusters-service'
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: '512Mi'
---
# Source: clusters-service/templates/database.service.yaml
apiVersion: v1
kind: Service
metadata:
  name: 'ocm-cs-db'
  namespace: 'clusters-service'
spec:
  ports:
  - name: postgresql
    nodePort: 0
    port: 5432
    protocol: TCP
    targetPort: 5432
  selector:
    name: 'ocm-cs-db'
  sessionAffinity: None
  type: ClusterIP
---
# Source: clusters-service/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: clusters-service
  namespace: 'clusters-service'
