$schema: "pipeline.schema.v1"
serviceGroup: Microsoft.Azure.ARO.HCP.ClusterService
rolloutName: Cluster Service Rollout
resourceGroups:
- name: global
  resourceGroup: '{{ .global.rg }}'
  subscription: '{{ .global.subscription.key }}'
  steps:
  - name: output
    action: ARM
    template: templates/output-global.bicep
    parameters: ../dev-infrastructure/configurations/output-global.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
  - name: mirror-image
    action: ImageMirror
    targetACR:
      configRef: 'acr.svc.name'
    sourceRegistry:
      configRef: clustersService.image.registry
    repository:
      configRef: clustersService.image.repository
    digest:
      configRef: clustersService.image.digest
    pullSecretKeyVault:
      configRef: global.keyVault.name
    pullSecretName:
      configRef: imageSync.ondemandSync.pullSecretName
    shellIdentity:
      input:
        resourceGroup: global
        step: output
        name: globalMSIId
    automatedRetry:
      errorContainsAny:
      - "unknown_storage_failure"
      - "unexpected EOF"
      - "unauthorized: authentication required"
      maximumRetryCount: 5
      durationBetweenRetries: 1m
- name: kusto
  resourceGroup: '{{ .kusto.rg }}'
  subscription: '{{ .global.subscription.key }}'
  steps:
  - name: kusto-lookup
    action: ARM
    template: ../dev-infrastructure/templates/kusto-lookup.bicep
    parameters: ../dev-infrastructure/configurations/kusto-lookup.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
- name: service
  resourceGroup: '{{ .svc.rg }}'
  subscription: '{{ .svc.subscription.key }}'
  steps:
  - name: output
    action: ARM
    template: ../dev-infrastructure/modules/cluster-service/cluster-service-lookup.bicep
    parameters: ../dev-infrastructure/configurations/cluster-service-lookup.tmpl.bicepparam
    deploymentLevel: ResourceGroup
    outputOnly: true
  - name: deploy
    action: Helm
    aksCluster: '{{ .svc.aks.name }}'
    releaseName: 'cluster-service'
    releaseNamespace: '{{ .clustersService.k8s.namespace }}'
    chartDir: ./helm-charts/cluster-service
    valuesFile: './helm-charts/cluster-service/values.yaml'
    namespaceFiles:
    - namespace.yaml
    kustoDatabase: '{{ .kusto.serviceLogsDatabase }}'
    kustoTable: 'containerLogs'
    kustoEndpoint:
      resourceGroup: kusto
      step: kusto-lookup
      name: kustoUri
    inputVariables:
      ocpAcrResourceUrl:
        resourceGroup: global
        step: output
        name: ocpAcrLoginServer
      ocpAcrResourceId:
        resourceGroup: global
        step: output
        name: ocpAcrResourceId
      azureCsMiClientId:
        resourceGroup: service
        step: output
        name: csMsiClientId
      databaseAuthMethod:
        resourceGroup: service
        step: output
        name: databaseAuthMethod
      databaseDisableTls:
        resourceGroup: service
        step: output
        name: databaseDisableTls
      databaseHost:
        resourceGroup: service
        step: output
        name: databaseHost
      databaseName:
        resourceGroup: service
        step: output
        name: databaseName
      databasePassword:
        resourceGroup: service
        step: output
        name: databasePassword
      databaseUser:
        resourceGroup: service
        step: output
        name: databaseUser
      deployLocalDatabase:
        resourceGroup: service
        step: output
        name: deployLocalDatabase
      imagePullerMsiClientId:
        resourceGroup: service
        step: output
        name: imagePullerMsiClientId
      oidcIssuerBaseUrl:
        resourceGroup: service
        step: output
        name: oidcIssuerBaseUrl
      oidcIssuerBlobServiceUrl:
        resourceGroup: service
        step: output
        name: oidcIssuerBlobServiceUrl
      tenantId:
        resourceGroup: service
        step: output
        name: tenantId
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    dependsOn:
    - resourceGroup: service
      step: output
    - resourceGroup: global
      step: mirror-image
    automatedRetry:
      errorContainsAny:
      - "500 Internal Server Error"
      - "Internal error occurred"
      maximumRetryCount: 3
      durationBetweenRetries: 1m
    timeout: 10m
  - name: deploy-cs-debug-jobs
    action: Helm
    aksCluster: '{{ .svc.aks.name }}'
    releaseName: 'cs-debug-jobs'
    releaseNamespace: '{{ .clustersService.k8s.namespace }}'
    chartDir: ./helm-charts/cs-debug-jobs
    valuesFile: './helm-charts/cs-debug-jobs/values.yaml'
    kustoDatabase: '{{ .kusto.serviceLogsDatabase }}'
    kustoTable: 'containerLogs'
    kustoEndpoint:
      resourceGroup: kusto
      step: kusto-lookup
      name: kustoUri
    identityFrom:
      resourceGroup: global
      step: output
      name: globalMSIId
    dependsOn:
    - resourceGroup: service
      step: deploy

